model = "gpt-5.3-codex"
model_reasoning_effort = "medium"
profile = "yolo"
suppress_unstable_features_warning = true

[projects."/xkagent_infra/groups/system/agents/agent-system_dashboard_test_engineer"]
trust_level = "trusted"

[profiles.yolo]
approval_policy = "never"
sandbox_mode = "danger-full-access"
model = "gpt-5.3-codex"
model_reasoning_effort = "medium"

[features]
unified_exec = true
shell_snapshot = true
steer = true
multi_agent = true
apps = false

[mcp_servers.mcp-brain_ipc_c]
command = "/brain/bin/mcp/mcp-brain_ipc_c"
args = []
env = { BRAIN_AGENT_NAME = "agent-system_dashboard_test_engineer", BRAIN_TMUX_SESSION = "agent-system_dashboard_test_engineer", BRAIN_DAEMON_AUTOSTART = "0" }

[mcp_servers.mcp-brain_google_api]
command = "/brain/bin/mcp/mcp-brain_google_api"
args = []
env = { GOOGLE_CREDENTIALS_PATH = "/brain/secrets/brain_google_api/credentials.json" }
