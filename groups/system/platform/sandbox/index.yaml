sandbox_platform_index:
  group_id: "system"
  version: "1.0"
  default_provider: "docker_container"
  roots:
    templates: "/xkagent_infra/groups/system/platform/sandbox/templates"
    providers: "/xkagent_infra/groups/system/platform/sandbox/providers"
    instances: "/xkagent_infra/groups/system/platform/sandbox/instances"
    payloads: "/xkagent_infra/groups/system/platform/sandbox/payloads"
    archives: "/xkagent_infra/groups/system/platform/sandbox/archives"
    registry: "/xkagent_infra/groups/system/platform/sandbox/registry"
  save_model:
    host_persisted:
      - "metadata"
      - "payload manifests"
      - "archives"
      - "provider/template assets"
    runtime_only:
      - "active writable worktrees"
      - "running agent homes"
      - "ephemeral process state"
  note: "sandbox 活跃开发在容器/volume 内执行；host 只保存可追溯记录和模板资产"

