# Brain Sandbox - Testing Environment Compose
# 用途: 自动化测试（只读挂载、测试完成后自动停止）
# 路径: /xkagent_infra/groups/brain/platform/sandbox/test/compose.yaml

name: ${SANDBOX_NAME:-sandbox-test}

services:
  sandbox:
    build:
      context: .
      dockerfile: Dockerfile
    image: brain-sandbox-test:${SANDBOX_VERSION:-2.1.0}
    container_name: ${CONTAINER_NAME}
    hostname: ${HOSTNAME}

    working_dir: /workspace/project

    volumes:
      # 项目源码（只读）
      - ${PROJECT_ROOT}:/workspace/project:ro
      # 数据目录
      - sandbox_data_${INSTANCE_ID}:/workspace/data
      # 日志目录
      - sandbox_logs_${INSTANCE_ID}:/workspace/logs

    environment:
      - SANDBOX_MODE=full
      - SANDBOX_TYPE=testing
      - SANDBOX_INSTANCE_ID=${INSTANCE_ID}
      - SANDBOX_PROJECT=${PROJECT_NAME}
      - SANDBOX_GROUP=${GROUP_NAME}
      - TESTING=true
      - PYTEST_CURRENT_TEST=1
      - PROJECT_ROOT=/workspace/project
      - BRAIN_PATH=/brain
      - BRAIN_IPC_SOCKET=/tmp/brain_ipc.sock

    networks:
      - ${NETWORK_NAME}

    ports:
      - "${HOST_PORT_APP:-28080}:8080"

    deploy:
      resources:
        limits:
          cpus: '${CPU_LIMIT:-1.0}'
          memory: ${MEMORY_LIMIT:-1G}
        reservations:
          cpus: '0.25'
          memory: 256M

    restart: "no"

    labels:
      - "brain.sandbox=true"
      - "brain.sandbox.type=testing"
      - "brain.group=${GROUP_NAME}"
      - "brain.project=${PROJECT_NAME}"
      - "brain.instance=${INSTANCE_ID}"

volumes:
  sandbox_data_${INSTANCE_ID}:
    driver: local
  sandbox_logs_${INSTANCE_ID}:
    driver: local

networks:
  ${NETWORK_NAME}:
    driver: bridge
    labels:
      - "brain.sandbox.network=true"
      - "brain.sandbox.type=testing"
