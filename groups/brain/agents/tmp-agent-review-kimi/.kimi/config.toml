default_model = "kimi-k2.5"
default_thinking = true
default_yolo = false

[models."kimi-k2.5"]
provider = "managed:kimi-code"
model = "kimi-k2.5"
max_context_size = 262144
capabilities = ["video_in", "image_in", "thinking"]

[providers."managed:kimi-code"]
type = "kimi"
base_url = "https://api.kimi.com/coding/v1"
api_key = ""

[providers."managed:kimi-code".oauth]
storage = "file"
key = "oauth/kimi-code"

[loop_control]
max_steps_per_turn = 100
max_retries_per_step = 3
max_ralph_iterations = 0
reserved_context_size = 50000

[mcp.client]
tool_call_timeout_ms = 60000

[mcp.servers.mcp-brain_ipc_c]
command = "/brain/bin/mcp/mcp-brain_ipc_c"
args = []
env = { BRAIN_AGENT_NAME = "tmp-agent-review-kimi", BRAIN_TMUX_SESSION = "tmp-agent-review-kimi", BRAIN_DAEMON_AUTOSTART = "0" }

[mcp.servers.mcp-brain_google_api]
command = "/brain/bin/mcp/mcp-brain_google_api"
args = []
env = { GOOGLE_CREDENTIALS_PATH = "/brain/secrets/brain_google_api/credentials.json" }
