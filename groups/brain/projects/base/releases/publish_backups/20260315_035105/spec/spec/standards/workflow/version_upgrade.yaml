# 版本化升级规范
# G-VERSION-UPGRADE 的详细执行指南

principle: 升级必须可回退，禁止直接覆盖

scope:
  - spec 文档
  - code 代码
  - config 配置

structure:
  pattern: "{path}/v1/, {path}/v2/"
  example:
    spec: /brain/.../spec/v1/, /brain/.../spec/v2/
    code: /brain/.../src/daemon/v1/, /brain/.../src/daemon/v2/

workflow:
  S1: mkdir v1/ && mv current/* v1/
  S2: mkdir v2/ && develop new version
  S3: test v2
  S4: switch to v2
  S5: v1 保留（默认不删除）

rollback:
  when: v2 验证失败或生产问题
  how: 切换回 v1，v2 标记 failed
