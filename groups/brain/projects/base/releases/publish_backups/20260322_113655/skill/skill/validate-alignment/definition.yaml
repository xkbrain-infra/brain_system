skill:
  id: "validate-brain-app-alignment"
  name: "Brain-App 对齐验证"
  version: "1.0"
  category: "diagnostic"
  priority: "high"

  description: |
    验证 Brain spec 与实际代码的一致性，检测常见的架构错误。
    应在以下场景使用：
    1. 接手一个已有项目时
    2. 发现 Brain 文档与实际代码不一致时
    3. 完成代码重构后
    4. 定期系统健康检查

  inputs:
    group_name:
      type: "string"
      required: true
      example: "xkquant_group"

    project_name:
      type: "string"
      required: true
      example: "py_datasource_fetcher"

    workbench:
      type: "string"
      required: false
      default: "xkquant_workbench"
      description: "工作台名称，默认从 group 推导"

  outputs:
    validation_report:
      type: "markdown"
      path: "memory/validation_report_{timestamp}.md"

    status:
      type: "enum"
      values: ["PASS", "WARNING", "CRITICAL"]

    issues:
      type: "list"
      items: "validation_issue"

validation_checks:

  check_1_brain_paths:
    id: "VAL-001"
    name: "Brain 路径纯净性检查"
    severity: "CRITICAL"

    description: "确保 Brain 层不包含代码文件或目录"

    commands:
      - cmd: "find /brain/groups/{group_name}/projects/{project_name} -type f \\( -name '*.py' -o -name '*.js' -o -name '*.go' -o -name '*.rs' \\)"
        expect: "无输出"
        error_msg: "Brain 层不应包含代码文件"

      - cmd: "find /brain/groups/{group_name}/projects/{project_name} -type d \\( -name 'src' -o -name 'source' -o -name 'lib' \\)"
        expect: "无输出"
        error_msg: "Brain 层不应包含代码目录"

    remediation: |
      如果发现代码文件：
      1. 确认这些文件应该在 /app/groups/{group}/{workbench}/domain/{project}/
      2. 移动文件到正确位置
      3. 删除 Brain 层的代码副本

  check_2_projects_yaml_paths:
    id: "VAL-002"
    name: "projects.yaml 路径映射验证"
    severity: "CRITICAL"

    description: "验证 projects.yaml 中定义的路径与实际目录一致"

    steps:
      - step: 1
        action: "读取 projects.yaml"
        command: "cat /brain/groups/{group_name}/spec/projects.yaml | grep -A 10 'id: \"PRJ-.*-{PROJECT_NAME_UPPER}\"'"

      - step: 2
        action: "提取 codebase 路径"
        parse: "codebase: \"(.+)\""

      - step: 3
        action: "验证实际路径存在"
        command: "ls /app/groups/{group_name}/{workbench}/{codebase_path}"
        expect: "目录存在"
        error_msg: "projects.yaml 中的 codebase 路径不存在"

      - step: 4
        action: "验证 container_root 路径"
        parse: "container_root: \"(.+)\""
        validate: "路径格式应为 /app/... 且与 codebase 对应"

    remediation: |
      如果路径不匹配：
      1. 检查实际代码位置：ls /app/groups/{group}/{workbench}/
      2. 更新 projects.yaml 的 codebase 路径
      3. 同步更新 container_root 路径

  check_3_code_directory_naming:
    id: "VAL-003"
    name: "代码目录命名规范检查"
    severity: "WARNING"

    description: "检查代码目录是否遵循语言规范"

    language_standards:
      python:
        expected: "src/"
        anti_patterns: ["source/", "lib/", "app/"]

      go:
        expected: "cmd/, pkg/, internal/"
        anti_patterns: ["src/"]

      nodejs:
        expected: "src/, lib/"
        anti_patterns: ["source/"]

    commands:
      - cmd: "ls /app/groups/{group_name}/{workbench}/domain/{project_name}/ | grep -E '^(src|source)$'"
        for_language: "python"
        expect_match: "^src$"
        warning_if: "^source$"

    remediation: |
      如果使用非标准命名（如 source/）：
      1. 评估重命名成本
      2. 执行：mv source src
      3. 批量替换导入语句：sed -i 's/from source\./from src./g'
      4. 更新 Dockerfile PYTHONPATH
      5. 更新 Brain spec 中的引用

  check_4_brain_spec_accuracy:
    id: "VAL-004"
    name: "Brain spec 准确性检查"
    severity: "HIGH"

    description: "验证 Brain 的技术方案文档是否反映实际代码结构"

    steps:
      - step: 1
        action: "读取 tech_solution.md"
        path: "/brain/groups/{group_name}/projects/{project_name}/spec/tech_solution.md"

      - step: 2
        action: "检查是否描述了实际目录结构"
        check_contains: "实际代码结构 or 实际目录结构"
        warning_if_missing: "tech_solution.md 可能描述的是理想化架构"

      - step: 3
        action: "对比实际目录"
        command: "tree -L 2 /app/groups/{group}/{workbench}/domain/{project}/src/"

      - step: 4
        action: "提示 Agent 对比"
        message: "请人工对比 tech_solution.md 描述与实际目录是否一致"

    remediation: |
      如果 Brain spec 与实际不符：
      1. 生成 gap_analysis.md
      2. 评估：实际代码是否有独特价值
      3. 决策：修正 Brain（推荐）或重构代码
      4. 更新 tech_solution.md 反映实际结构

  check_5_import_consistency:
    id: "VAL-005"
    name: "导入语句一致性检查"
    severity: "HIGH"

    description: "检查代码中的导入语句是否与目录命名一致"

    commands:
      - cmd: "grep -r 'from source\\.' /app/groups/{group}/{workbench}/domain/{project}/ --include='*.py' | head -5"
        expect: "无输出（如果目录是 src/）"
        error_msg: "代码中使用 'from source.' 但目录是 src/"

      - cmd: "grep -r 'from src\\.' /app/groups/{group}/{workbench}/domain/{project}/src/ --include='*.py' | head -1"
        expect: "有输出（确认使用正确的导入）"

    remediation: |
      如果导入不一致：
      1. 确认目录名（ls 查看）
      2. 批量替换：
         find . -name "*.py" -exec sed -i 's/from source\./from src./g' {} \;
      3. 验证：grep -r "from source" --include="*.py" | wc -l
         期望：0

  check_6_dockerfile_pythonpath:
    id: "VAL-006"
    name: "Dockerfile PYTHONPATH 检查"
    severity: "HIGH"

    description: "验证 Dockerfile 中的 PYTHONPATH 与代码目录一致"

    steps:
      - step: 1
        action: "定位 Dockerfile"
        paths:
          - "/app/groups/{group}/{workbench}/domain/{project}/Dockerfile"
          - "/app/groups/{group}/{workbench}/platform/docker/base/services/{project}/Dockerfile"

      - step: 2
        action: "提取 PYTHONPATH"
        command: "grep 'ENV PYTHONPATH' {dockerfile_path}"

      - step: 3
        action: "验证包含正确路径"
        expected_contains: "/src" or "/source"
        must_not_contain: "错误的目录名"

      - step: 4
        action: "检查是否与实际目录一致"
        validate: "PYTHONPATH 中的目录名应与实际代码目录名一致"

    remediation: |
      如果 PYTHONPATH 错误：
      1. 确认实际目录名（src 还是 source）
      2. 更新 Dockerfile：
         ENV PYTHONPATH=/app/domain/{project}:/app/domain/{project}/src
      3. 重新构建镜像

execution_flow:
  1_collect_info:
    - "读取 /brain/groups/{group}/spec/projects.yaml"
    - "提取项目的 brain 路径、codebase 路径"
    - "确定实际代码位置"

  2_run_checks:
    - "按顺序执行 6 个验证检查"
    - "记录每个检查的结果（PASS/WARNING/FAIL）"
    - "收集错误消息和建议修复方案"

  3_generate_report:
    - "生成 validation_report.md"
    - "包含：检查结果、发现的问题、修复建议"
    - "计算总体评分"

  4_output:
    - "返回验证报告路径"
    - "返回总体状态（PASS/WARNING/CRITICAL）"
    - "高亮需要立即修复的 CRITICAL 问题"

report_template: |
  # Brain-App 对齐验证报告

  **项目**: {group_name}/{project_name}
  **执行时间**: {timestamp}
  **总体状态**: {status}

  ## 检查结果汇总

  | 检查项 | 状态 | 严重性 |
  |--------|------|--------|
  {check_results_table}

  ## 详细发现

  ### ✅ 通过的检查
  {passed_checks}

  ### ⚠️ 警告
  {warnings}

  ### ❌ 失败的检查
  {failed_checks}

  ## 修复建议

  {remediation_steps}

  ## 总体评估

  - **对齐度**: {alignment_score}%
  - **关键问题数**: {critical_count}
  - **需要修复**: {needs_fix}

  ---
  **生成者**: Brain-App 对齐验证工具 v1.0

usage_examples:
  - scenario: "接手新项目"
    command: "validate-alignment --group xkquant_group --project py_datasource_fetcher"
    expected: "生成完整验证报告，识别所有不一致"

  - scenario: "完成重构后验证"
    command: "validate-alignment --group xkquant_group --project py_datasource_fetcher"
    expected: "确认所有检查通过（status: PASS）"

  - scenario: "定期健康检查"
    command: "validate-alignment --all-projects"
    expected: "批量验证所有项目"

integration:
  workflows:
    - "可集成到 Spec Design Process 的 verification 阶段"
    - "可作为 LEP 的预检查步骤"
    - "可添加到 CI/CD pipeline"

  auto_trigger:
    - "检测到 Brain spec 修改时"
    - "检测到代码目录重命名时"
    - "projects.yaml 更新时"
