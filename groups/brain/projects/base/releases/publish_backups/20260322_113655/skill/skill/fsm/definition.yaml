skill:
  id: "SKILL-FSM-SUITE"
  name: "FSM Workflow Suite"
  version: "1.0"
  description: "Core logic for state machine execution and recursive task dispatching."

actions:
  - name: "advance_state"
    description: "Advances the workflow to the next state if gates pass."
    parameters:
      type: "object"
      required: ["project_root"]
      properties:
        project_root: { type: "string" }
    implementation:
      runtime: "python"
      path: "src/core.py"

  - name: "create_sub_workflow"
    description: "Initialize a micro-spec project for a task."
    parameters:
      type: "object"
      required: ["parent_root", "task_id", "assignee"]
      properties:
        parent_root: { type: "string" }
        task_id: { type: "string" }
        assignee: { type: "string" }
    implementation:
      runtime: "python"
      path: "src/dispatcher.py"
