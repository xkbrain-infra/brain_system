# Data Errors - 数据错误
# 数据验证、编码、重复问题

category: "data_errors"
version: "1.0"
last_updated: "2026-01-17"

problems:
  - id: "DATA-001"
    category: "data_errors"
    keywords: ["validation", "format", "invalid", "malformed"]
    error_patterns:
      - "ValueError"
      - "ValidationError"
      - "Invalid format"
    description: "Data validation failure due to unexpected format"

    solutions:
      - id: "DATA-001-SOL-A"
        description: "Log invalid record and continue with valid data"
        confidence: "high"
        risk_level: "low"
        reversible: true

        prerequisites:
          - "batch_operation == true"
          - "failure_rate < 0.01"

        steps:
          - "Log the invalid record with details"
          - "Skip the invalid record"
          - "Continue processing valid records"
          - "Report summary at end"

        expected_outcome: "Valid records processed successfully, invalid records logged"

      - id: "DATA-001-SOL-B"
        description: "Apply data transformation/normalization"
        confidence: "medium"
        risk_level: "medium"
        reversible: true

        steps:
          - "Identify the format mismatch"
          - "Apply appropriate transformation"
          - "Validate transformed data"
          - "Retry processing"

        expected_outcome: "Data is normalized and processed successfully"

  - id: "DATA-002"
    category: "data_errors"
    keywords: ["duplicate", "unique constraint", "already exists"]
    error_patterns:
      - "IntegrityError"
      - "UNIQUE constraint failed"
      - "Duplicate entry"
    description: "Duplicate data insertion violating unique constraints"

    solutions:
      - id: "DATA-002-SOL-A"
        description: "Use UPSERT (INSERT ... ON CONFLICT UPDATE)"
        confidence: "high"
        risk_level: "low"
        reversible: false

        steps:
          - "Change INSERT to UPSERT"
          - "Define conflict resolution strategy"
          - "Retry the operation"

        code_example: |
          # PostgreSQL
          INSERT INTO table (id, data) VALUES (%s, %s)
          ON CONFLICT (id) DO UPDATE SET data = EXCLUDED.data

          # SQLite
          INSERT OR REPLACE INTO table (id, data) VALUES (?, ?)

        expected_outcome: "Data inserted or updated without error"

  - id: "DATA-003"
    category: "data_errors"
    keywords: ["encoding", "unicode", "decode", "charset"]
    error_patterns:
      - "UnicodeDecodeError"
      - "UnicodeEncodeError"
      - "'utf-8' codec can't decode"
    description: "Character encoding/decoding error"

    solutions:
      - id: "DATA-003-SOL-A"
        description: "Detect and handle encoding automatically"
        confidence: "high"
        risk_level: "low"
        reversible: true

        steps:
          - "Use chardet library to detect encoding"
          - "Decode with detected encoding"
          - "Re-encode to UTF-8 if needed"

        code_example: |
          import chardet

          with open(file_path, 'rb') as f:
              raw_data = f.read()
              detected = chardet.detect(raw_data)
              encoding = detected['encoding']
              content = raw_data.decode(encoding)

        expected_outcome: "File decoded successfully"
