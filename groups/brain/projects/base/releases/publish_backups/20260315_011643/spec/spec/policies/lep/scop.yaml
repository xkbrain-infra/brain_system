gate_id: G-GATE-SCOP
name: Scope Locking
applies_to: [write, delete, move, git]
rule: 操作必须在允许的路径内
protected: /brain/**

enforcement:
  stage: pre_tool_use
  method: c_binary
  binary: lep_check
  priority: CRITICAL

  triggers:
    tools: [Write, Edit, Bash]
    check_type: protected

  protected_paths:
    - /brain/
    - /xkagent_infra/brain/

  block_message: |
    🚫 /brain/ 是发布态，禁止直接修改 (G-GATE-SCOP)
    路径: {file_path}

    /brain/** 只能通过发布流程写入，不是开发工作区。

    如需修改 brain/base 内容，请走 pending 流程：
    1. 创建批次目录：/xkagent_infra/runtime/update_brain/pending/<YYYYMMDD_描述>/base/
    2. 在批次目录内按 /brain/base/ 目录结构放置修改文件
    3. 编写 CHANGELOG.md 说明变更内容
    4. 提交 PMO 审批，由 brain-manager 合并发布

    参考：/brain/base/spec/policies/deployment/pending_workflow.yaml
bindings:
  hooks:
    stage: pre_tool_use
    trigger_tools: [Write, Edit, Bash]
  mcp_tools: []
  related_skills: []
