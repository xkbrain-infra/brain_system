gate_id: G-GATE-SPEC-SYNC
name: Spec Synchronization
applies_to: [write]
rule: 项目代码改动后必须同步更新对应 spec (index、路径、状态等)
scope: /app/groups/**
target: /brain/groups/**/projects/**/spec/**

enforcement:
  stage: pre_tool_use
  method: python_inline
  priority: MEDIUM
  note: "推荐性检查 - 提醒同步 spec，不强制阻塞"

  triggers:
    tools: [Write, Edit]
    patterns:
      code_files:
        - "/app/groups/**/projects/**/*.py"
        - "/app/groups/**/projects/**/*.js"
        - "/app/groups/**/projects/**/*.ts"
        - "/app/groups/**/projects/**/*.cpp"
        - "/app/groups/**/projects/**/*.yaml"

  rules:
    remind_spec_update:
      description: "代码改动后提醒更新 spec"
      spec_fields:
        - code_location
        - status
        - version
        - last_updated
        - dependencies

  warn_message: |
    💡 提醒更新 spec (G-SPEC-SYNC)

    代码文件: {file_path}

    项目代码改动后，请记得同步更新对应的 spec：
    - 更新 code_location（如有路径变更）
    - 更新 status（开发中/测试中/已部署）
    - 更新 version（版本号）
    - 更新 last_updated（时间戳）
    - 更新 dependencies（依赖变更）

    Spec 位置:
    - /brain/groups/**/projects/**/spec/**/*.yaml
    - /brain/groups/**/projects/**/index.yaml

    这是推荐性检查，不阻塞操作。

    参考：/brain/base/spec/core/lep.yaml (G-SPEC-SYNC)
bindings:
  hooks:
    stage: post_tool_use
    trigger_tools: [Write, Edit]
  mcp_tools: []
  related_skills: []
