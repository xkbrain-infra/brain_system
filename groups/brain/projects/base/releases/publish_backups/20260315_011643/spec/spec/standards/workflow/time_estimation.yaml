# Agent 工作模式时间估算指南
# 附录：workflow.yaml 的补充文档

meta:
  version: 1.0
  created_at: 2026-02-14
  purpose: 定义 Agent 工作模式下的时间估算标准
  applies_to: 所有 SPEC、项目计划、任务估算

# ============================================
# Agent 工作模式时间估算指南
# ============================================
agent_time_estimation:
  principle: |
    Agent 工作速度远快于人工开发，所有时间估算必须基于 Agent 实际工作效率：

    ✓ Agent 优势：
    - 无需休息、睡眠、会议
    - 代码生成：分钟级（vs 人工小时级）
    - 并行执行：多 agent 同时工作
    - 自动化测试：秒级完成
    - 文档生成：即时输出

    ✗ Agent 限制：
    - 需要用户审批（墙上时间）
    - 调试复杂问题需要迭代
    - 外部 API 调用有延迟
    - 生产验证需要等待时间

  estimation_by_step:
    S1_S2_pmo:
      human_time: 1-2 天
      agent_time: 1-2 小时
      speedup: 8-12x
      note: PMO 思考和协调，agent 快速产出 YAML 文档

    S3_S5_architect:
      human_time: 2-3 天
      agent_time: 2-4 小时
      speedup: 12-18x
      note: |
        - 调研：并行读取多个文档（分钟级）
        - 对比：自动生成对比表格（分钟级）
        - 设计：代码框架自动生成（10-30 分钟）

    S6_pmo:
      human_time: 0.5-1 天
      agent_time: 30-60 分钟
      speedup: 8-12x
      note: 任务分解可自动化，YAML 生成快速

    implementation_devops:
      human_time: 3-5 天
      agent_time: 4-8 小时
      speedup: 6-10x
      note: |
        - 代码生成：极快（分钟级）
        - 配置文件：自动生成
        - 测试调试：需要时间（主要耗时）
        - 部署验证：需要等待

    S7_qa:
      human_time: 1-2 天
      agent_time: 1-2 小时
      speedup: 8-12x
      note: 自动化测试脚本生成，快速执行验证

    S8_pmo:
      human_time: 0.5-1 天
      agent_time: 30 分钟
      speedup: 12-24x
      note: 归档和总结文档自动生成

  complexity_based_estimation:
    low:
      definition: 配置修改、简单功能添加、文档更新
      examples:
        - 修改配置参数
        - 添加新的 YAML 配置
        - 更新文档
      s1_s8_total: 2-4 小时
      implementation: 2-4 小时
      total_agent_time: 4-8 小时
      wall_time: 0.5-1 工作日（含审批）

    medium:
      definition: 新模块开发、数据库集成、API 开发
      examples:
        - 新增 MCP tool
        - 数据库 schema 设计和实施
        - Git hook 开发
      s1_s8_total: 4-6 小时
      implementation: 6-12 小时
      total_agent_time: 10-18 小时
      wall_time: 1-2 工作日（含审批、测试）

    high:
      definition: 系统架构重构、分布式系统、复杂算法
      examples:
        - 微服务架构迁移
        - 向量搜索系统
        - 实时同步系统
      s1_s8_total: 8-12 小时
      implementation: 16-24 小时
      total_agent_time: 24-36 小时
      wall_time: 3-4 工作日（含审批、测试、验证）

  parallel_optimization:
    description: Agent 可并行执行，总时间可压缩

    strategies:
      - name: 设计与实施重叠
        savings: 20-30%
        example: architect 完成 S5 后，devops 立即开始部分实施，不等 S6

      - name: 多 agent 并行
        savings: 30-40%
        example: dev1 写后端，dev2 写前端，qa 同步编写测试

      - name: 自动化测试并行
        savings: 50-70%
        example: 代码生成的同时，自动化测试已在后台运行

    formula: |
      并行优化后总时间 = 顺序总时间 × (1 - 优化系数)
      优化系数: 0.3 - 0.5 (取决于任务可并行度)

  speedup_factors:
    code_generation:
      factor: 5-10x
      note: Agent 生成代码速度极快，但需要人工 review

    documentation:
      factor: 3-5x
      note: 自动生成文档，格式规范

    testing:
      factor: 2-3x
      note: 自动化测试脚本快速生成和执行

    debugging:
      factor: 1-2x
      note: 复杂问题仍需迭代调试

    deployment:
      factor: 2-4x
      note: 配置自动生成，但验证需要时间

  mandatory_rules:
    rule_1: |
      ❌ 禁止使用人工时间估算
      示例：❌ "开发时间 3-5 天"

    rule_2: |
      ✓ 必须使用 Agent 工作时间
      示例：✓ "Agent 工作时间 6-8h，墙上时间 1-2 工作日"

    rule_3: |
      ✓ 必须区分 Agent 时间和墙上时间
      - Agent 时间：纯工作时间（无等待）
      - 墙上时间：包含审批、等待、验证

    rule_4: |
      ✓ 必须标注并行优化可能性
      示例：✓ "顺序 12h，并行优化后 8h"

  estimation_template: |
    # 项目时间估算（Agent 模式）

    complexity: medium  # low | medium | high

    timeline:
      S1_S2_pmo: 1-2h
      S3_S5_architect: 2-4h
      S6_pmo: 30min-1h
      implementation: 6-12h
      S7_qa: 1-2h
      S8_pmo: 30min

      total_sequential: 10-18h
      total_parallel: 8-14h (并行优化 30%)
      wall_time: 1-2 工作日（含用户审批、测试等待）

    speedup_analysis:
      vs_human_development: 6-10x faster
      reason: 代码生成快、并行执行、自动化测试

  benchmark_data:
    description: 实际项目时间统计（供参考）

    projects:
      BS_011_lep_index_first:
        complexity: medium
        s1_s8: 4h (实际)
        implementation: 6h (实际)
        total: 10h
        wall_time: 1 工作日

      BS_013_doc_database:
        complexity: medium-high
        s1_s8: 6h (估算)
        implementation: 8h (估算)
        total: 14h
        wall_time: 1-2 工作日
