role: 四域之一：经验沉淀、故障案例、调研报告、可复用认知
registry:
  file: /brain/base/knowledge/registry.yaml
  total_documents: 12
  categories:
  - ARCHITECTURE
  - TROUBLESHOOT
  - GUIDE
  keywords: 32
  usage: '快速查找: registry.yaml → quick_lookup[keyword] → 获取文档 ID 和路径

    示例: quick_lookup[''troubleshoot''] → 7 个故障排查文档

    示例: quick_lookup[''ipc''] → [IPC Guide, IPC Troubleshooting]

    '
  note: registry.yaml 提供更完整的索引，下方 quick_lookup 表保留用于兼容
structure:
  troubleshooting/:
    _index.yaml: 分类索引和快速查找
    network_errors.yaml: 网络、超时、HTTP 错误
    data_errors.yaml: 数据验证、编码问题
    authentication_errors.yaml: 认证、权限错误
    resource_errors.yaml: 磁盘、内存不足
    configuration_errors.yaml: 配置缺失
    dependency_errors.yaml: 依赖、导入错误
    ipc_troubleshooting.yaml: IPC 通信故障排查 SOP
  architecture/:
    README.md: 架构索引
    process_management.md: 进程管理、supervisord、Agent 启动层级
    ipc_guide.md: IPC 通信系统使用指南
  guides/:
    kimi_agent/: Kimi Agent 设置和快速开始指南
    agent_abilities_build.md: agent_abilities 构建系统使用指南
  research/:
    note: Base 层定义 schema，实际报告存在 /brain/groups/org/{group}/knowledge/research/
  brian_system/:
    _index.yaml: 目录索引
    spec_stats.yaml: Spec/LEP/Hooks 覆盖统计（build stats 自动生成）
four_domain_refs:
  spec: /brain/base/spec/index.yaml
  workflow: /brain/base/workflow/index.yaml
  evolution: /brain/base/evolution/index.yaml
  governance: /brain/base/workflow/governance.yaml
sources:
- 故障复盘 → troubleshooting/
- 架构经验 → architecture/
- Researcher 调研 → groups/{group}/knowledge/research/
- 项目关闭沉淀 → 对应 group 的 knowledge
evolution_trigger: '当 knowledge 中的 lessons_learned 指向系统性问题时，

  应通知 PMO 评估是否启动 Evolution 评估。

  参考: /brain/base/evolution/cycle.yaml (EVO-TRG-KNOWLEDGE)

  '
load:
  trigger:
  - 错误
  - error
  - 故障
  - timeout
  - exception
  sequence:
    1: troubleshooting/_index.yaml
    2: 根据 quick_lookup 匹配具体文件
  trigger_architecture:
  - supervisor
  - 进程
  - 启动
  - daemon
  - orchestrator
  - agent启动
  sequence_architecture:
    1: architecture/README.md
    2: 根据关键词匹配具体文件
  trigger_ipc:
  - ipc
  - ipc_send
  - ipc_recv
  - ipc_ack
  - 消息
  - 通信
  - message
  - send
  - recv
  sequence_ipc:
    1: architecture/ipc_guide.md
  trigger_ipc_trouble:
  - 收不到消息
  - ipc故障
  - tmux_notify
  - daemon故障
  - deadletter
  - ipc_recv返回0
  - agent不在线
  sequence_ipc_trouble:
    1: troubleshooting/ipc_troubleshooting.yaml
quick_lookup:
  timeout: troubleshooting/network_errors.yaml
  connection_refused: troubleshooting/network_errors.yaml
  404: troubleshooting/network_errors.yaml
  401: troubleshooting/authentication_errors.yaml
  403: troubleshooting/authentication_errors.yaml
  disk_full: troubleshooting/resource_errors.yaml
  oom: troubleshooting/resource_errors.yaml
  import_error: troubleshooting/dependency_errors.yaml
  encoding: troubleshooting/data_errors.yaml
  duplicate: troubleshooting/data_errors.yaml
  ipc: architecture/ipc_guide.md
  ipc_send: architecture/ipc_guide.md
  ipc_recv: architecture/ipc_guide.md
  message: architecture/ipc_guide.md
  收不到消息: troubleshooting/ipc_troubleshooting.yaml
  ipc故障: troubleshooting/ipc_troubleshooting.yaml
  tmux_notify: troubleshooting/ipc_troubleshooting.yaml
  deadletter: troubleshooting/ipc_troubleshooting.yaml
  spec统计: brian_system/spec/spec_stats.md
  lep覆盖: brian_system/spec/spec_stats.md
  hooks覆盖: brian_system/spec/spec_stats.md
  spec_stats: brian_system/spec/spec_stats.md
  build指南: guides/agent_abilities_build.md
  agent_abilities构建: guides/agent_abilities_build.md
  怎么build: guides/agent_abilities_build.md
  build操作: guides/agent_abilities_build.md
