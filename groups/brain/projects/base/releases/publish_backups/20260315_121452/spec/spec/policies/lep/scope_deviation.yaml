gate_id: G-GATE-SCOPE-DEVIATION
name: No Silent Scope Reduction
applies_to: [write, delete, move, git]
rule: 禁止静默缩减执行范围，偏差必须通知 PMO
on_violation: notify_pmo

enforcement:
  stage: pre_tool_use
  method: python_inline
  priority: HIGH

  triggers:
    tools: [Write, Edit, Bash]

  rules:
    scope_check:
      description: "Agent 不得静默缩减任务执行范围"
      actions:
        - "检测到范围偏差时通知 PMO"
        - "记录偏差原因和影响"
        - "等待 PMO 确认后继续"
bindings:
  hooks:
    stage: post_tool_use
    trigger_tools: [Write, Edit]
  mcp_tools: []
  related_skills: []
