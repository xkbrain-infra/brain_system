# 量化交易行业 Type Profiles

category: TP-CAT-QUANT-TRADING
version: "1.0"

profiles:

  strategist:
    description: "策略研发，量化模型设计与优化"
    default: TP-QT-STRATEGIST-CLAUDE-OPUS
    variants:
      - id: TP-QT-STRATEGIST-CLAUDE-OPUS
        agent_type: claude
        model: claude-opus-4-6
        reason: "策略设计需要深度数学推理"

  data-engineer:
    description: "行情数据采集、清洗、存储"
    default: TP-QT-DATA-ENG-CLAUDE-SONNET
    variants:
      - id: TP-QT-DATA-ENG-CLAUDE-SONNET
        agent_type: claude
        model: claude-sonnet-4-6
        reason: "数据管道需要工具调用能力"

  backtester:
    description: "回测执行，策略验证"
    default: TP-QT-BACKTESTER-CODEX-HIGH
    variants:
      - id: TP-QT-BACKTESTER-CODEX-HIGH
        agent_type: codex
        model: gpt-5.3-codex
        reason: "回测需要大量计算和代码执行"

  risk-controller:
    description: "风控监控，仓位管理，异常告警"
    default: TP-QT-RISK-CLAUDE-HAIKU
    variants:
      - id: TP-QT-RISK-CLAUDE-HAIKU
        agent_type: claude
        model: claude-haiku-4-5
        reason: "风控需要快速响应，规则判断为主"

  researcher:
    description: "市场研究，宏观/微观分析，alpha 因子挖掘"
    default: TP-QT-RESEARCHER-CODEX-HIGH
    variants:
      - id: TP-QT-RESEARCHER-CODEX-HIGH
        agent_type: codex
        model: gpt-5.3-codex
        reason: "研究需要大量数据分析和文档处理"
