# Agent 时间估算模板
# 用于所有 SPEC 和项目计划中的时间估算

meta:
  version: 1.0
  created_at: 2026-02-14
  purpose: 统一 Agent 工作模式下的时间估算标准

# ============================================
# 项目信息
# ============================================
project:
  name: "{project_name}"
  spec_id: "{spec_id}"
  complexity: low | medium | high  # 必填

# ============================================
# 时间估算（Agent 模式）
# ============================================
time_estimation:
  # 按步骤估算
  breakdown:
    S1_S2_pmo:
      agent_time: 1-2h
      human_equivalent: 1-2 天
      speedup: 8-12x

    S3_S5_architect:
      agent_time: 2-4h
      human_equivalent: 2-3 天
      speedup: 12-18x

    S6_pmo:
      agent_time: 30min-1h
      human_equivalent: 0.5-1 天
      speedup: 8-12x

    implementation:
      agent_time: 4-8h  # 根据复杂度调整
      human_equivalent: 3-5 天
      speedup: 6-10x

    S7_qa:
      agent_time: 1-2h
      human_equivalent: 1-2 天
      speedup: 8-12x

    S8_pmo:
      agent_time: 30min
      human_equivalent: 0.5-1 天
      speedup: 12-24x

  # 总计
  total:
    sequential: "{sum of all steps}h"
    parallel: "{sequential × 0.6-0.7}h"  # 并行优化 30-40%
    wall_time: "{X-Y} 工作日（含审批、等待）"

  # 并行策略
  parallel_strategy:
    enabled: true
    optimization_factor: 0.3  # 30% 时间节省
    description: |
      - S3-S5 和部分实施可重叠
      - 多 agent 并行工作
      - 测试与开发并行

  # 加速分析
  speedup_analysis:
    overall_speedup: 6-10x
    factors:
      - code_generation: 5-10x
      - documentation: 3-5x
      - testing: 2-3x
    reason: Agent 代码生成快、并行执行、自动化测试

# ============================================
# 按复杂度的参考估算
# ============================================
complexity_reference:
  low:
    definition: 配置修改、简单功能添加、文档更新
    examples:
      - 修改配置参数
      - 添加新的 YAML 配置
      - 更新文档
      - 简单 bug 修复

    estimation:
      s1_s8_total: 2-4h
      implementation: 2-4h
      total_agent_time: 4-8h
      wall_time: 0.5-1 工作日
      speedup_vs_human: 8-12x

    breakdown:
      S1_S2: 30min-1h
      S3_S5: 1-2h
      S6: 30min
      implementation: 2-4h
      S7: 30min-1h
      S8: 30min

  medium:
    definition: 新模块开发、数据库集成、API 开发
    examples:
      - 新增 MCP tool
      - 数据库 schema 设计和实施
      - Git hook 开发
      - RESTful API 开发

    estimation:
      s1_s8_total: 4-6h
      implementation: 6-12h
      total_agent_time: 10-18h
      wall_time: 1-2 工作日
      speedup_vs_human: 6-10x

    breakdown:
      S1_S2: 1-2h
      S3_S5: 2-4h
      S6: 30min-1h
      implementation: 6-12h
      S7: 1-2h
      S8: 30min

  high:
    definition: 系统架构重构、分布式系统、复杂算法
    examples:
      - 微服务架构迁移
      - 向量搜索系统
      - 实时同步系统
      - 性能优化（大规模）

    estimation:
      s1_s8_total: 8-12h
      implementation: 16-24h
      total_agent_time: 24-36h
      wall_time: 3-4 工作日
      speedup_vs_human: 5-8x

    breakdown:
      S1_S2: 2-3h
      S3_S5: 4-6h
      S6: 1-2h
      implementation: 16-24h
      S7: 2-3h
      S8: 1h

# ============================================
# 墙上时间（Wall Time）说明
# ============================================
wall_time_factors:
  description: |
    墙上时间 = Agent 工作时间 + 等待时间

  waiting_time_sources:
    - user_approval: 用户审批 SPEC、代码（可能数小时到 1 天）
    - external_api: 外部 API 调用延迟（OpenAI, 数据库等）
    - production_verification: 生产环境验证、监控观察
    - testing_wait: 集成测试、性能测试运行时间
    - dependency_wait: 等待其他 agent 或服务

  typical_ratio:
    agent_time_to_wall_time: "1h agent ≈ 2-4h wall time"
    example: "8h agent 工作 ≈ 1-2 工作日 wall time"

# ============================================
# 估算检查清单
# ============================================
estimation_checklist:
  before_estimate:
    - "□ 已明确项目复杂度（low/medium/high）"
    - "□ 已识别关键技术挑战"
    - "□ 已评估外部依赖（API、数据库等）"
    - "□ 已考虑并行执行可能性"

  during_estimate:
    - "□ 使用 Agent 工作时间（小时）而非人工时间（天）"
    - "□ 区分顺序执行和并行执行时间"
    - "□ 标注墙上时间（含审批、等待）"
    - "□ 说明加速因子来源"

  after_estimate:
    - "□ 与复杂度参考对比，确认合理性"
    - "□ 与历史项目对比（benchmark）"
    - "□ 评审时间分配（各步骤占比）"
    - "□ 记录假设和风险"

# ============================================
# 常见错误和纠正
# ============================================
common_mistakes:
  mistake_1:
    wrong: "开发时间：3-5 天"
    correct: "Agent 工作时间：6-12h，墙上时间 1-2 工作日"
    reason: 未使用 Agent 时间，未区分工作时间和墙上时间

  mistake_2:
    wrong: "很快就能完成"
    correct: "预计 2-4h（Agent 工作时间）"
    reason: 时间表述模糊，无法追踪

  mistake_3:
    wrong: |
      timeline:
        total: 10h
    correct: |
      timeline:
        total_sequential: 10h
        total_parallel: 7h (并行优化 30%)
        wall_time: 1 工作日
    reason: 未标注并行优化和墙上时间

  mistake_4:
    wrong: "估计需要 1 周"
    correct: |
      complexity: high
      agent_time: 24-32h
      wall_time: 3-4 工作日
      speedup: 5-8x vs 人工
    reason: 未说明复杂度、加速因子

# ============================================
# 使用示例
# ============================================
example_estimation:
  project: "文档数据库系统（BS-013）"
  complexity: medium-high

  timeline:
    S1_S2_pmo: 1-2h
    S3_S5_architect: 2-4h (已完成 30min)
    S6_pmo: 1h
    implementation_devops: 6-8h
    S7_qa: 1-2h
    S8_pmo: 30min

    total_sequential: 11-17h
    total_parallel: 8-12h (并行优化 30%)
    wall_time: 1-2 工作日（含用户审批、测试验证）

  speedup_analysis:
    overall: 6-10x vs 人工开发
    factors:
      - code_generation: 10x (MCP server, ORM 模型自动生成)
      - schema_design: 5x (DDL 自动生成)
      - documentation: 5x (自动生成文档)
      - testing: 3x (自动化测试脚本)

  assumptions:
    - PostgreSQL 环境已部署
    - OpenAI API 可访问
    - 无重大技术障碍

  risks:
    - OpenAI API 不稳定可能延迟 2-4h
    - 数据导入调试可能额外 1-2h
    - 生产验证等待可能延长墙上时间到 2-3 天

# ============================================
# Benchmark 数据（实际项目参考）
# ============================================
benchmark:
  BS_011_lep_index_first:
    complexity: medium
    actual_time:
      s1_s8: 4h
      implementation: 6h
      total: 10h
      wall_time: 1 工作日
    speedup: 8x vs 人工估算

  BS_013_doc_database:
    complexity: medium-high
    estimated_time:
      s1_s8: 6h
      implementation: 8h
      total: 14h
      wall_time: 1-2 工作日
    speedup: 6-10x vs 人工估算
