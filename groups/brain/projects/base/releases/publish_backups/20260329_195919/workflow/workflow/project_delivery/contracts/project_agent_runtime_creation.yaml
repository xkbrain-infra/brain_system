legacy_notice:
  status: "deprecated_compatibility_copy"
  canonical_contract: "/brain/base/workflow/orchestrator_project_coding/contracts/project_agent_runtime_creation.yaml"

project_agent_runtime_creation:
  id: "MWF-AGENT-RUNTIME-001"
  version: "0.2"
  intent: "定义 sandboxctl create --with-agent orchestrator 驱动的 project-scoped agent runtime bridge、provider bootstrap 与启动校验契约"

positioning:
  note:
    - "project-scoped agent 的 runtime home 必须在 host runtime bridge 中物化，并作为 sandbox 可见路径挂载到容器内"
    - "Agent 生命周期仍必须遵守 G-GATE-AGENT-LIFECYCLE，由 agentctl 接管 start/stop/restart"
    - "现有 agentctl add 缺少 path/cwd override，因此 bootstrap 必须先生成 sandbox-local registry bridge，再通过 agentctl start 接管生命周期"

source_references:
  - "/brain/base/spec/policies/lep/agent_lifecycle.yaml"
  - "/brain/base/spec/policies/agents/agents_registry_spec.yaml"
  - "/brain/base/spec/policies/agents/agent_protocol.yaml"
  - "/brain/base/spec/templates/agent/index.yaml"
  - "/brain/base/spec/templates/agent/mcp_template.json"
  - "/brain/base/spec/templates/agent/codex_template.toml"
  - "/brain/base/workflow/orchestrator_project_coding/config/sandbox_config.template.yaml"

bootstrap_entrypoint:
  canonical_command: "sandboxctl create <project_id> --type development --with-agent orchestrator [--pending-id <pending_id>] [--model <provider/model>]"
  guarantees:
    - "容器已创建并 healthy/running"
    - "sandbox-local agents_registry bridge 已生成"
    - "orchestrator runtime 已物化到 /xkagent_infra/runtime/sandbox/{sandbox_id}/agents/{agent_id}"
    - "provider bootstrap 状态已准备完成"
    - "agentctl start 已成功，tmux session 可见"

required_inputs:
  - "project_agent_provision_plan"
  - "project_agent_roster"
  - "project_agent_template_bundle_ref"
  - "brain_workspace_root"
  - "project_workspace_root"
  - "sandbox_id"
  - "sandbox_runtime_root"
  - "orchestrator_id"

runtime_paths:
  runtime_root: "/xkagent_infra/runtime/sandbox/{sandbox_id}"
  agent_runtime_root: "/xkagent_infra/runtime/sandbox/{sandbox_id}/agents"
  template_bundle_root: "/xkagent_infra/runtime/sandbox/{sandbox_id}/template_bundles/agents"
  registry_bridge_root: "/xkagent_infra/runtime/sandbox/{sandbox_id}/config/agentctl"
  registry_bridge_file: "/xkagent_infra/runtime/sandbox/{sandbox_id}/config/agentctl/agents_registry.yaml"

creation_phases:
  - id: "phase_1_materialize_host_runtime_bridge"
    actions:
      - "mkdir runtime_home for every bootstrap agent under /xkagent_infra/runtime/sandbox/{sandbox_id}/agents/{agent_id}"
      - "copy/import template bundle into sandbox template bundle root"
      - "render provider-specific config into runtime_home"
      - "write runtime_meta.yaml and .brain/agent_runtime.json"
      - "write sandbox-local agents_registry.yaml with cwd/path pointing to /xkagent_infra/runtime/sandbox/{sandbox_id}/agents/{agent_id}"
      - "sync rendered runtime bridge into container before agentctl start"
  - id: "phase_2_prepare_provider_bootstrap_state"
    actions:
      - "prepare provider bootstrap state required to avoid first-run onboarding blockers"
      - "when provider uses brain proxy, write container-reachable ANTHROPIC_BASE_URL and client-bound model/token into settings.local.json"
      - "when provider uses Claude Code CLI, copy host /root/.claude/ and /root/.claude.json into container and preseed project trust/onboarding for runtime cwd"
  - id: "phase_3_lifecycle_start"
    actions:
      - "invoke agentctl start --apply {agent_id} --no-config-gen"
      - "repeat for bootstrap roster in deterministic order"
  - id: "phase_4_online_verification"
    actions:
      - "verify agent appears in tmux and agent runtime metadata exists"
      - "verify provider bootstrap did not stop on theme/trust prompt"
      - "verify proxy-reachable settings are present when provider uses brain proxy"
      - "record failure if session does not appear within timeout"

provider_rendering:
  common:
    proxy_bridge_contract:
      rules:
        - "如果 sandbox agent 通过 brain proxy 访问上游 provider，容器内不要求原始 MINIMAX_API_KEY/KIMI_API_KEY 等上游密钥"
        - "brain proxy 模式必须写入 ANTHROPIC_BASE_URL、ANTHROPIC_AUTH_TOKEN 与 ANTHROPIC_MODEL"
        - "container 内的 ANTHROPIC_BASE_URL 必须可达 host proxy（例如 http://host.docker.internal:8210）"
  claude:
    required_files:
      - ".claude/settings.local.json"
      - ".mcp.json"
      - "CLAUDE.md"
      - ".brain/agent_runtime.json"
    bootstrap_state:
      required_user_files:
        - "/root/.claude/"
        - "/root/.claude.json"
      required_project_state:
        - "projects[{runtime cwd}].hasTrustDialogAccepted=true"
        - "projects[{runtime cwd}].hasCompletedProjectOnboarding=true"
      rules:
        - "仅复制 runtime_home 内的 .claude/ 配置不足以跳过首次启动引导"
        - "若 provider 使用 Claude Code CLI，bootstrap 必须为当前 sandbox workspace 预写 project-scoped trust/onboarding 状态"
        - "若缺少上述状态并导致 theme/trust prompt 阻塞，则视为 bootstrap 未完成"
    required_env:
      - "BRAIN_AGENT_NAME"
      - "BRAIN_AGENT_ROLE"
      - "BRAIN_AGENT_GROUP"
      - "BRAIN_PROJECT_ID"
      - "BRAIN_SANDBOX_ID"
      - "BRAIN_SCOPE_PATH"
      - "ANTHROPIC_BASE_URL"
      - "ANTHROPIC_AUTH_TOKEN"
      - "ANTHROPIC_MODEL"
    launch_contract:
      - "由 agentctl start 接管"
      - "runtime cwd 必须是 /xkagent_infra/runtime/sandbox/{sandbox_id}/agents/{agent_id}"
  codex:
    required_files:
      - ".codex/config.toml"
      - ".mcp.json"
      - "AGENTS.md"
      - ".brain/agent_runtime.json"
    required_env:
      - "BRAIN_AGENT_NAME"
      - "BRAIN_TMUX_SESSION"
      - "BRAIN_PROJECT_ID"
      - "BRAIN_SANDBOX_ID"
      - "ANTHROPIC_BASE_URL"
      - "ANTHROPIC_AUTH_TOKEN"
      - "ANTHROPIC_MODEL"
    launch_contract:
      - "由 agentctl start 接管"
      - "runtime cwd 必须是 /xkagent_infra/runtime/sandbox/{sandbox_id}/agents/{agent_id}"

registry_bridge_contract:
  required_agent_fields:
    - "name"
    - "scope"
    - "group"
    - "project"
    - "path"
    - "cwd"
    - "agent_type"
    - "model"
    - "tmux_session"
    - "desired_state"
    - "status"
  required_values:
    scope: "project"
  rules:
    - "registry bridge 只存在于 sandbox runtime bridge 内，不得回写宿主机全局 registry"
    - "registry bridge 中的 cwd/path 必须指向 /xkagent_infra/runtime/sandbox/{sandbox_id}/agents/{agent_id}"

verification_contract:
  required_checks:
    - "runtime_home exists"
    - "provider-specific config exists"
    - "provider bootstrap state exists for runtime cwd"
    - "registry bridge contains agent entry"
    - "agentctl start succeeded"
    - "tmux session exists"
    - "proxy base URL is container-reachable when provider uses brain proxy"
  timeout_policy:
    startup_timeout_seconds: 60
    online_timeout_seconds: 30

forbidden_patterns:
  - "call tmux new-session directly from project bootstrap script"
  - "skip agentctl and treat process spawn as compliant lifecycle management"
  - "write project-scoped runtime entries into host global agents_registry"
  - "point sandbox registry bridge back to host /xkagent_infra/groups/*/agents"

rules:
  - "runtime bridge materialization 与 lifecycle start 是两步，不得混淆"
  - "agentctl 负责生命周期；bootstrap 负责 runtime bridge、provider bootstrap state 与 sandbox-local registry"
  - "provider 首启阻塞（例如 Claude Code 的 theme/trust prompt）属于 bootstrap failure，不得留给人工首登处理"
  - "没有 registry bridge、provider bootstrap state 与 online verification 的 sandbox，不得声称 BOOTSTRAP_COMPLETE"
