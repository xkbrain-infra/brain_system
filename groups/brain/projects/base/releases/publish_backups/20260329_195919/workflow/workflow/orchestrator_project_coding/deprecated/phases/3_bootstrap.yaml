# Phase 3: BOOTSTRAP — 创建 sandbox 容器、启动 orchestrator、spawn workers
# 来源: workflow_core.yaml → meta.phase_files.bootstrap
# steps: 3_1 (plan_sandbox), 3_2 (create_sandbox_container),
#         3_3 (create_agent_runtimes), 3_4 (start_agents),
#         3_5 (handover_to_orchestrator)

# ═══════════════════════════════════════════════════════════════════════════════
# PHASE 3: BOOTSTRAP — 创建 sandbox 容器、启动 orchestrator、spawn workers
# ═══════════════════════════════════════════════════════════════════════════════
#
# 执行者: brain_infra / brain_devops（不是 orchestrator 自己！orchestrator 是被创建的）
# 工具链: Docker + agentctl + supervisord
# 基础镜像: brain-sandbox-base:latest (FROM 已统一)
#

  # ── 3.1 规划 sandbox ───────────────────────────────────────────────────────
  - step_id: "MWF-OPC:3_1:plan_sandbox"
    phase: bootstrap
    who:
      executor: brain_devops
      profile: infra
      context: "在 brain infra 主机上执行"
    purpose: "根据 intake 和 research 结果，生成完整的 sandbox provision plan"

    do:
      - action: "读取 intake.yaml 的 requested_roles 和 baseline_image"
        tool: "file_read state/intake.yaml"
      - action: "为每个 requested_role 解析 agent 配置"
        tool: "LLM reasoning + file_read provider_profiles.yaml + group agent templates"
        details: |
          对每个 role:
            1. 查找 group agent 模板:
               /xkagent_infra/groups/{group_id}/agents/agent-{group}_{role}/
            2. 从 provider_profiles.yaml 解析 profile:
               role_profile_map[role_key] → profile_key
               profiles[profile_key] → provider + model + agent_type
               检查 intake.yaml.profile_overrides 是否有覆盖
               ┌──────────────┬──────────────┬──────────────────────────────────┐
               │ role_key      │ profile      │ 默认 provider/model (可覆盖)     │
               ├──────────────┼──────────────┼──────────────────────────────────┤
               │ orchestrator  │ coordinator  │ 由 provider_profiles.yaml 决定   │
               │ researcher    │ researcher   │ 由 provider_profiles.yaml 决定   │
               │ architect     │ architect    │ 由 provider_profiles.yaml 决定   │
               │ developer     │ coder        │ 由 provider_profiles.yaml 决定   │
               │ dev_ui        │ ui_dev       │ 由 provider_profiles.yaml 决定   │
               │ dev_api       │ coder        │ 由 provider_profiles.yaml 决定   │
               │ qa            │ coder        │ 由 provider_profiles.yaml 决定   │
               │ devops        │ infra        │ 由 provider_profiles.yaml 决定   │
               │ auditor       │ auditor      │ 由 provider_profiles.yaml 决定   │
               │ pmo           │ coordinator  │ 由 provider_profiles.yaml 决定   │
               └──────────────┴──────────────┴──────────────────────────────────┘
            3. 确定 ipc_method: ipc_method_by_provider[resolved_provider]
            4. 生成 project-scoped agent_id:
               agent_{group_id}_{project_key}_{role_key}_{slot:02d}
      - action: "冻结 brain runtime 版本"
        tool: "bash"
        command: "cd /xkagent_infra/brain && git rev-parse HEAD"
      - action: "写 sandbox_plan"
        tool: "file_write"
        target: "state/sandbox_plan.yaml"

    artifact: "state/sandbox_plan.yaml"
    artifact_schema:
      project_id: string
      group_id: string
      sandbox_id: "sandbox_{group}_{project}_{seq:02d}"
      base_image: "brain-sandbox-base:latest"
      brain_source_revision: "git commit hash"
      agent_roster:
        - agent_id: string
          role_key: string
          profile: "profile key (引用 provider_profiles.yaml)"
          agent_type: "claude | codex | copilot | gemini (由 profile 解析)"
          model: "具体 model_id (由 profile 解析)"
          template_source_ref: "宿主机 group agent 模板路径"
          required: bool
      workspace_layout:
        # Deprecated: 本文件已废弃，路径已更新为新架构
        # 正确路径定义见 workflow_core.yaml
        brain_root: "/xkagent_infra/brain"
        project_root: "/xkagent_infra/groups/{gid}/projects/{pid}"
        agent_runtime_root: "{project_root}/runtime/agents"
        template_bundle_root: "{project_root}/runtime/template_bundles/agents"
        registry_bridge_path: "/xkagent_infra/runtime/config/agentctl/agents_registry.yaml"
      compose_environment:
        PROJECT_ID: string
        GROUP_ID: string
        SANDBOX_ID: string
        BRAIN_SOURCE_REVISION: string

    check: "agent_roster 至少包含 orchestrator; base_image 已确定; brain_source_revision 已冻结"
    on_success: "MWF-OPC:3_2:create_sandbox_container"
    on_retry: "模板来源不可用 → 确认后重试"
    on_blocked: "无可用 base image → escalate"

  # ── 3.2 创建 sandbox 容器 ──────────────────────────────────────────────────
  - step_id: "MWF-OPC:3_2:create_sandbox_container"
    phase: bootstrap
    who:
      executor: brain_devops
      profile: infra
      context: "在 brain infra 主机上执行 Docker 命令"
    purpose: "用 Docker 创建隔离 sandbox 容器并初始化 workspace"

    do:
      - action: "渲染项目 compose.yaml 和 .env"
        tool: "file_write"
        details: |
          从内置模板骨架渲染:
            /brain/platform/docker/compose.yaml → 项目 compose
            叠加: service_name, container_name, ports, volumes, environment
          写 .env:
            PROJECT_ID, GROUP_ID, SANDBOX_ID, BRAIN_SOURCE_REVISION,
            SEED_BRAIN_PATH=/xkagent_infra/brain,
            BRAIN_WORKTREE=/xkagent_infra/brain,
            PROJECT_ROOT=/xkagent_infra/groups/{gid}/projects/{pid}

      - action: "启动容器"
        tool: "bash"
        command: "docker compose -f {project_compose_path} up -d --build --force-recreate"
        timeout: 300s

      - action: "容器内初始化"
        tool: "docker exec {container_name} bash -c '...'"
        commands:
          - "bash /brain/platform/docker/scripts/container_bootstrap.sh"
          # 旧路径已废弃，使用正确的 xkagent_infra 路径
          - "mkdir -p /xkagent_infra/groups/{gid}/projects/{pid}"
          - "mkdir -p /xkagent_infra/groups/{gid}/projects/{pid}/runtime/agents"
          - "mkdir -p /xkagent_infra/groups/{gid}/projects/{pid}/runtime/template_bundles/agents"
          - "mkdir -p /xkagent_infra/runtime/config/agentctl"
          - "mkdir -p /xkagent_infra/groups/{gid}/projects/{pid}/artifacts"
          - "mkdir -p /xkagent_infra/groups/{gid}/projects/{pid}/logs"
          - "mkdir -p /xkagent_infra/groups/{gid}/projects/{pid}/memory"
          - "cp project_payload → /xkagent_infra/groups/{gid}/projects/{pid}/"
          - "初始化 task_manager.yaml"

      - action: "健康检查"
        tool: "docker exec {container_name} bash /brain/platform/docker/scripts/healthcheck.sh"
        expected: |
          /xkagent_infra/brain 存在
          /xkagent_infra/groups/{gid}/projects/{pid} 存在
          baseline revision evidence 存在
          /xkagent_infra/groups/{gid}/projects/{pid}/logs 可写

    artifact: "state/sandbox_record.yaml"
    artifact_schema:
      sandbox_id: string
      container_name: string
      container_id: string
      image_tag: string
      workspace_status: "ready | failed"
      healthcheck_status: "pass | fail"
      provision_result: "success | failed"

    check: "provision_result=success AND healthcheck_status=pass"
    on_success: "MWF-OPC:3_3:create_agent_runtimes"
    on_retry: "healthcheck 失败 → docker exec 修复后重试"
    on_blocked: "容器启动失败 → docker compose down, escalate"

  # ── 3.3 在 sandbox 内创建 agent runtime ────────────────────────────────────
  # ── 3.3 在 sandbox 内构造每个 agent（重点: orchestrator 的构造）──────────────
  - step_id: "MWF-OPC:3_3:create_agent_runtimes"
    phase: bootstrap
    who:
      executor: brain_devops
      profile: infra
      context: "通过 docker exec 在 sandbox 容器内操作"
    purpose: "为每个 project agent 构造完整运行时: 目录 → 配置 → prompt → tools → registry"

    # ─────────────────────────────────────────────────────────────────────────
    # MODEL 选型决策框架
    # ─────────────────────────────────────────────────────────────────────────
    #
    # Provider/model 不在此处硬编码。
    # 完整选型逻辑见 provider_profiles.yaml。
    #
    # 解析流程:
    #   1. 读 provider_profiles.yaml 的 role_profile_map[role_key] → profile_key
    #   2. 读 profiles[profile_key] → 默认 provider + model
    #   3. 检查 intake.yaml.profile_overrides → 项目级覆盖
    #   4. 最终 provider 决定 agent_type 和 ipc_method
    #
    # 覆盖规则:
    #   - 项目可以在 intake.yaml 中通过 profile_overrides 覆盖默认选型
    #   - 也可以选择 preset (all_anthropic / all_copilot / mixed_default)
    #   - 覆盖时必须说明理由，记录在 sandbox_plan.yaml
    #   - coordinator profile 的 provider 必须支持精确 tool use
    #

    do:
      # ═══════════════════════════════════════════════════════════════════════
      # STEP A: 构造 Orchestrator（最关键，展开说明）
      # ═══════════════════════════════════════════════════════════════════════
      - action: "构造 orchestrator agent runtime"
        tool: "docker exec {container} bash"
        details: |

          # A1. 创建目录
          ORCH_ID={orchestrator_agent_id}
          mkdir -p /xkagent_infra/groups/{gid}/projects/{pid}/runtime/agents/$ORCH_ID/.claude
          mkdir -p /xkagent_infra/groups/{gid}/projects/{pid}/runtime/template_bundles/agents/$ORCH_ID

          # A2. 从宿主机导入 template bundle
          docker cp {template_source_ref}/ {container}:/xkagent_infra/groups/{gid}/projects/{pid}/runtime/template_bundles/agents/$ORCH_ID/

          # A3. 渲染 .claude/settings.local.json
          #     这决定了 orchestrator 可以用什么工具、什么权限
          cat > /xkagent_infra/groups/{gid}/projects/{pid}/runtime/agents/$ORCH_ID/.claude/settings.local.json << 'SETTINGS'
          {
            "permissions": {
              "allow": [
                "Read",
                "Write",
                "Edit",
                "Bash(*)",
                "Glob",
                "Grep",
                "Agent",
                "mcp__brain_ipc__*",
                "mcp__task_manager__*"
              ],
              "deny": []
            },
            "model": "{resolved_model}",
            "contextWindow": 200000
          }
          SETTINGS

          # A4. 渲染 .mcp.json
          #     这决定了 orchestrator 连接哪些 MCP server
          cat > /xkagent_infra/groups/{gid}/projects/{pid}/runtime/agents/$ORCH_ID/.mcp.json << 'MCP'
          {
            "mcpServers": {
              "brain_ipc": {
                "command": "node",
                "args": ["/xkagent_infra/brain/services/ipc/mcp_bridge.js"],
                "env": {
                  "BRAIN_AGENT_NAME": "{orchestrator_agent_id}",
                  "BRAIN_PROJECT_ID": "{project_id}",
                  "BRAIN_SANDBOX_ID": "{sandbox_id}"
                }
              },
              "task_manager": {
                "command": "node",
                "args": ["/xkagent_infra/brain/services/task_manager/mcp_bridge.js"],
                "env": {
                  "PROJECT_ID": "{project_id}"
                }
              },
              "filesystem": {
                "command": "npx",
                "args": ["-y", "@anthropic-ai/mcp-server-filesystem", "/xkagent_infra/groups/{gid}/projects/{pid}"]
              }
            }
          }
          MCP

          # A5. 渲染 AGENTS.md — orchestrator 的核心 prompt
          #     来源: orchestrator_agents_md_template.md 模板
          #     渲染时替换所有 {variable} 占位符
          cat > /xkagent_infra/groups/{gid}/projects/{pid}/runtime/agents/$ORCH_ID/AGENTS.md << 'PROMPT'

          # Project Orchestrator

          你是 {project_id} 项目的 Project Orchestrator。
          sandbox: {sandbox_id}
          runtime_home: /xkagent_infra/groups/{gid}/projects/{pid}/runtime/agents/{orchestrator_agent_id}

          ## 你的执行模板

          你的 workflow 定义在:
            /xkagent_infra/brain/workflow/project_delivery/orchestrator_project_coding.yaml

          启动后:
            1. 读 state/project_snapshot.yaml 的 current_step
            2. 如果没有 → 从 define_plan 开始
            3. 读 workflow 中该 step 的 do 列表
            4. 按顺序执行每个 action
            5. 每个 action 完成后检查 check 条件
            6. 写 step_result 到 state/step_results/{step_id}_{timestamp}.yaml
            7. 按 routing_map 进入 next_step

          ## Routing 机制

          routing_map 是硬编码在 workflow 中的跳转表:
            每个 step 有 on_success → next_step
            每个 step 有 on_retry → 重试当前 step
            每个 step 有 on_blocked → escalate

          你的决策逻辑:
            执行完 step 的所有 action →
            评估 check 条件 →
            如果 check 全部满足 → status=success, next_step=routing_map[step_id].success
            如果部分不满足但可重试 → status=need_retry, next_step=当前 step_id
            如果无法推进 → status=blocked, next_step=escalate

          这不是你"选择"去哪，而是 check 条件决定你去哪。

          ## 你管理的 workers

          {渲染 agent_roster 表格: agent_id | role | model | runtime_home}

          ## 派发 task 的 SOP

          见 worker_task_protocol.yaml — IPC TASK_ASSIGN 格式。

          ## 核心规则

          - 一次只推一个 step，落盘后再下一跳
          - 先写后发（dispatch_log 先于 IPC）
          - worker 只 propose，你 decide task 状态
          - checklist 不能静默关闭
          - 每个控制循环必须有 step_result

          PROMPT

          # A6. 渲染 workflow.yaml 符号链接或副本
          #     让 orchestrator 能直接读取 workflow
          ln -sf /xkagent_infra/brain/workflow/project_delivery/orchestrator_project_coding.yaml \
                 /xkagent_infra/groups/{gid}/projects/{pid}/runtime/agents/$ORCH_ID/workflow.yaml

          # A7. 写 runtime_meta.yaml
          cat > /xkagent_infra/groups/{gid}/projects/{pid}/runtime/agents/$ORCH_ID/runtime_meta.yaml << META
          agent_id: {orchestrator_agent_id}
          role_key: orchestrator
          profile: coordinator
          agent_type: {resolved_agent_type}
          provider: {resolved_provider}
          model: {resolved_model}
          model_selection_reason: "{profile.description}"
          project_id: {project_id}
          sandbox_id: {sandbox_id}
          orchestrator_id: {orchestrator_agent_id}  # 自引用
          template_bundle_ref: /xkagent_infra/groups/{gid}/projects/{pid}/runtime/template_bundles/agents/{orchestrator_agent_id}
          runtime_home: /xkagent_infra/groups/{gid}/projects/{pid}/runtime/agents/{orchestrator_agent_id}
          created_at: {ISO8601}
          META

      # ═══════════════════════════════════════════════════════════════════════
      # STEP B: 构造 Worker Agents（同样的流程，按角色差异渲染）
      # ═══════════════════════════════════════════════════════════════════════
      - action: "对 agent_roster 中每个 worker agent 构造 runtime"
        tool: "docker exec {container} bash"
        details: |
          对每个 worker agent 执行:

          # B1. 创建目录
          AGENT_ID={agent_id}
          mkdir -p /xkagent_infra/groups/{gid}/projects/{pid}/runtime/agents/$AGENT_ID
          mkdir -p /xkagent_infra/groups/{gid}/projects/{pid}/runtime/template_bundles/agents/$AGENT_ID

          # B2. 导入 template bundle
          docker cp {template_source_ref}/ {container}:/xkagent_infra/groups/{gid}/projects/{pid}/runtime/template_bundles/agents/$AGENT_ID/

          # B3. 渲染 provider-specific 配置

          如果 agent_type = claude:
            # .claude/settings.local.json
            mkdir -p /xkagent_infra/groups/{gid}/projects/{pid}/runtime/agents/$AGENT_ID/.claude
            {
              "permissions": {
                "allow": ["Read", "Write", "Edit", "Bash(*)", "Glob", "Grep",
                          "mcp__brain_ipc__*"],
                "deny": []
              },
              "model": "{model}"   # e.g. "sonnet" for dev_ui/devops
            }

          如果 agent_type = codex:
            # .codex/config.toml
            mkdir -p /xkagent_infra/groups/{gid}/projects/{pid}/runtime/agents/$AGENT_ID/.codex
            [agent]
            model = "{model}"      # e.g. "gpt-5.3-codex"
            sandbox = "none"       # 已在 docker sandbox 内

          # B4. 渲染 IPC 通信配置（按 agent_type 分支）
          #
          # 关键区别:
          #   claude agent → 使用 .mcp.json (MCP 协议原生支持)
          #   codex agent  → 不支持 MCP，使用 CLI wrapper 脚本
          #
          # codex 的 IPC 通信通过 shell wrapper 实现:
          #   /xkagent_infra/brain/services/ipc/ipc_cli.sh send --to {target} --message {msg}
          #   /xkagent_infra/brain/services/ipc/ipc_cli.sh recv --agent {agent_id} --max 10
          #   /xkagent_infra/brain/services/ipc/ipc_cli.sh ack --ids {msg_ids}
          #
          # codex agent 的 AGENTS.md 中会包含 CLI 用法说明，
          # 替代 claude agent 的 MCP tool call。

          如果 agent_type = claude:
            # .mcp.json (MCP 协议)
            {
              "mcpServers": {
                "brain_ipc": {
                  "command": "node",
                  "args": ["/xkagent_infra/brain/services/ipc/mcp_bridge.js"],
                  "env": {
                    "BRAIN_AGENT_NAME": "{agent_id}",
                    "BRAIN_PROJECT_ID": "{project_id}"
                  }
                }
              }
            }

          如果 agent_type = codex:
            # 不写 .mcp.json — codex 不支持 MCP
            # 写 ipc_env.sh — codex 通过 shell 调用 IPC
            cat > /xkagent_infra/groups/{gid}/projects/{pid}/runtime/agents/$AGENT_ID/ipc_env.sh << 'IPC_ENV'
            export BRAIN_AGENT_NAME="{agent_id}"
            export BRAIN_PROJECT_ID="{project_id}"
            export IPC_CLI="/xkagent_infra/brain/services/ipc/ipc_cli.sh"
            # 用法:
            #   source ipc_env.sh
            #   $IPC_CLI send --to orchestrator --message '{"message_type":"TASK_COMPLETE",...}'
            #   $IPC_CLI recv --max 10
            #   $IPC_CLI ack --ids msg_id_1,msg_id_2
            IPC_ENV

          # B5. 渲染 AGENTS.md（worker 版本 — 引用 worker_task_protocol）
          来源: worker_task_protocol.yaml 中的 role_specific_prompts.{role_key}.AGENTS_md_snippet
          渲染时替换: {project_id}, {project_root}, {sandbox_id}, {agent_id}
          追加: worker_task_protocol.yaml 中的 receive_task / execute_task / report_result SOP

          # B6. 写 runtime_meta.yaml
          agent_id, role_key, profile, agent_type, provider, model,
          model_selection_reason (= profile.description),
          ipc_method (= ipc_method_by_provider[provider]),
          project_id, sandbox_id, orchestrator_id, template_bundle_ref, created_at

      # ═══════════════════════════════════════════════════════════════════════
      # STEP C: 构建 Registry Bridge
      # ═══════════════════════════════════════════════════════════════════════
      - action: "构建 sandbox-local registry bridge"
        tool: "docker exec {container} bash"
        details: |
          写 /xkagent_infra/runtime/config/agentctl/agents_registry.yaml:

          对每个 agent（包括 orchestrator）写一条 entry:
            - name: {agent_id}
              scope: project
              group: {group_id}
              project: {project_id}
              path: /xkagent_infra/groups/{gid}/projects/{pid}/runtime/agents/{agent_id}
              cwd: /xkagent_infra/groups/{gid}/projects/{pid}/runtime/agents/{agent_id}
              agent_type: claude | codex
              model: {model}
              tmux_session: {agent_id}
              desired_state: running
              status: pending

          设置环境:
            export AGENTCTL_CONFIG_DIR=/xkagent_infra/runtime/config/agentctl

          注意: registry bridge 只存在于 sandbox 内，不回写宿主机

    artifact: "state/agent_runtimes.yaml"
    artifact_schema:
      agents:
        - agent_id: string
          role_key: string
          profile: "profile key"
          agent_type: "claude | codex | copilot | gemini"
          provider: string
          model: string
          model_selection_reason: string
          ipc_method: "mcp | cli"
          runtime_home: string
          config_files_created:
            - ".claude/settings.local.json 或 .codex/config.toml"
            - ".mcp.json"
            - "AGENTS.md"
            - "runtime_meta.yaml"
            - "workflow.yaml (仅 orchestrator)"
          mcp_servers: ["brain_ipc", "task_manager (仅 orchestrator)", "filesystem (仅 orchestrator)"]
          materialization_status: "ready | failed"
      registry_bridge_status: "ready | failed"

    check: |
      所有 agent materialization_status=ready AND
      registry_bridge_status=ready AND
      orchestrator 的 AGENTS.md 包含 workflow 路径 AND
      orchestrator 的 .mcp.json 包含 task_manager MCP AND
      每个 worker 的 AGENTS.md 包含 task protocol SOP
    on_success: "MWF-OPC:3_4:start_agents"
    on_retry: "部分 agent 创建失败 → 检查模板后重试"
    on_blocked: "模板解析失败 → escalate"

  # ── 3.4 启动所有 agents 并验证 ─────────────────────────────────────────────
  - step_id: "MWF-OPC:3_4:start_agents"
    phase: bootstrap
    who:
      executor: brain_devops
      profile: infra
      context: "通过 docker exec 在 sandbox 容器内执行 agentctl 命令"
    purpose: "用 agentctl 启动所有 project agents，验证 online 和 IPC 通信"

    do:
      - action: "先启动 orchestrator（必须第一个）"
        tool: "docker exec {container} bash"
        command: |
          export AGENTCTL_CONFIG_DIR=/workspace/runtime/config/agentctl
          agentctl start --apply {orchestrator_agent_id}
        timeout: 60s
        verify: "agentctl status {orchestrator_agent_id} → running"

      - action: "逐个启动 worker agents"
        tool: "docker exec {container} bash"
        command_per_agent: |
          agentctl start --apply {worker_agent_id}
        timeout: 30s_per_agent
        verify: "agentctl status {agent_id} → running"

      - action: "启动 supervisor 管理的辅助进程"
        tool: "docker exec {container} bash"
        command: "supervisord -c /xkagent_infra/groups/{gid}/projects/{pid}/runtime/project_supervisor.conf"
        optional: true

      - action: "验证通信链路"
        tool: "docker exec {container} bash"
        checks:
          - "agentctl list → 所有 agent 显示 online"
          - "ipc_list_agents → 可见所有注册 agent"
          - "orchestrator 可写 task_manager (测试 TASK_CREATE)"
          - "orchestrator 可发心跳到 brain infra"
        注意: "必须通过 agentctl 启动，禁止直接 tmux new-session"

    artifact: "state/bootstrap_report.yaml"
    artifact_schema:
      sandbox_id: string
      container_id: string
      orchestrator:
        agent_id: string
        status: "online | failed"
        model: string
      agent_roster:
        - agent_id: string
          role_key: string
          profile: string
          agent_type: string
          model: string
          status: "online | failed"
      connectivity:
        ipc_status: "ok | failed"
        task_manager_write: "ok | failed"
        brain_registration: "ok | failed"
      bootstrap_decision: "PASS | HOLD"

    check: |
      orchestrator.status=online AND
      所有 required agent status=online AND
      ipc_status=ok AND task_manager_write=ok AND
      bootstrap_decision=PASS
    on_success: "MWF-OPC:3_5:handover_to_orchestrator"
    on_retry: |
      agent 启动失败:
        1. agentctl logs {failed_agent_id}
        2. 检查 runtime_home 下 config 是否完整
        3. agentctl restart --apply {failed_agent_id}
    on_blocked: |
      orchestrator 无法启动 → BOOTSTRAP_HOLD:
        docker compose down → 回到 create_sandbox_container
        或 escalate 给 brain_infra

  # ── 3.5 控制权交接 ───────────────────────────────────────────────────────────
  - step_id: "MWF-OPC:3_5:handover_to_orchestrator"
    phase: bootstrap
    who:
      executor: brain_devops
      profile: infra
      context: "在 brain infra 主机上执行，完成后控制权移交给 sandbox 内 orchestrator"
    purpose: "显式将项目控制权从 brain_devops 移交给 sandbox 内的 project_orchestrator"

    do:
      - action: "将 intake/research/decisions 等 state 文件注入 sandbox"
        tool: "docker cp"
        details: |
          docker cp state/intake.yaml {container}:/xkagent_infra/groups/{gid}/projects/{pid}/runtime/agents/{orchestrator_agent_id}/state/
          docker cp state/decisions.yaml {container}:/xkagent_infra/groups/{gid}/projects/{pid}/runtime/agents/{orchestrator_agent_id}/state/
          docker cp state/research.yaml {container}:/xkagent_infra/groups/{gid}/projects/{pid}/runtime/agents/{orchestrator_agent_id}/state/
          docker cp state/sandbox_plan.yaml {container}:/xkagent_infra/groups/{gid}/projects/{pid}/runtime/agents/{orchestrator_agent_id}/state/
          docker cp state/bootstrap_report.yaml {container}:/xkagent_infra/groups/{gid}/projects/{pid}/runtime/agents/{orchestrator_agent_id}/state/
          docker cp state/agent_runtimes.yaml {container}:/xkagent_infra/groups/{gid}/projects/{pid}/runtime/agents/{orchestrator_agent_id}/state/

      - action: "初始化 project_snapshot.yaml（orchestrator 的入口点）"
        tool: "docker exec {container} bash"
        details: |
          cat > /xkagent_infra/groups/{gid}/projects/{pid}/runtime/agents/{orchestrator_agent_id}/state/project_snapshot.yaml << SNAP
          project_id: {project_id}
          group_id: {group_id}
          sandbox_id: {sandbox_id}
          current_phase: planning
          current_step: "MWF-OPC:4_1:define_plan"
          project_status: PLANNING
          task_summary: {total: 0, ready: 0, active: 0, review: 0, done: 0, blocked: 0, failed: 0}
          milestone_summary: []
          checklist_summary: {total_items: 0, done_items: 0, coverage_percentage: 0}
          active_blockers: []
          last_step_result_ref: ""
          updated_at: {ISO8601}
          SNAP

      - action: "通知 orchestrator 启动决策循环"
        tool: "IPC → {orchestrator_agent_id}"
        message: |
          [HANDOVER] Bootstrap 完成。你是 {project_id} 的 project orchestrator。
          state 文件已就位: state/project_snapshot.yaml
          请从 current_step=MWF-OPC:4_1:define_plan 开始执行 workflow。

      - action: "通知 brain_pmo 交接完成"
        tool: "IPC → brain_pmo"
        message: "[bootstrap] {project_id} sandbox 启动完成，控制权已移交 {orchestrator_agent_id}"

    artifact: "state/handover_record.yaml"
    artifact_schema:
      project_id: string
      sandbox_id: string
      orchestrator_agent_id: string
      state_files_injected: [string]
      project_snapshot_initialized: bool
      orchestrator_notified: bool
      pmo_notified: bool
      handover_status: "completed | failed"
      handover_timestamp: "ISO8601"

    check: "state 文件全部注入成功 AND project_snapshot 已初始化 AND orchestrator 已收到 HANDOVER 消息"
    on_success: "MWF-OPC:4_1:define_plan"
    on_retry: "state 注入失败 → 检查 docker cp 后重试"
    on_blocked: "orchestrator 未响应 HANDOVER → 检查 agent 状态后 escalate"

