# Phase 6: RELEASE — deploy + verify + rollback control
# 来源: workflow_core.yaml → meta.phase_files.release
# steps: 6_1 (drive_release)

# ═══════════════════════════════════════════════════════════════════════════════
# PHASE 6: RELEASE — deploy + verify + rollback control
# ═══════════════════════════════════════════════════════════════════════════════

  - step_id: "MWF-OPC:6_1:drive_release"
    phase: release
    who:
      coordinator: project_orchestrator
      profile: coordinator
      participants:
        - role: devops
          profile: infra
          responsibilities: ["部署操作", "环境配置", "回滚执行"]
        - role: qa
          profile: coder
          responsibilities: ["staging 验证", "prod smoke test"]
      approver: brain_pmo
    purpose: "冻结候选版本 → staging → prod approval → deploy → smoke"

    features:
      human_approval_required: true    # 生产部署需人工审批
      multi_agent_review: true
      review_agents: [qa, devops]
      timeout_minutes: 120

    do:
      - action: "TASK_UPDATE: in_progress"
        action_id: "MWF-OPC:6_1:drive_release:A01"
        tool: "task_manager API"
        call: |
          event_type: TASK_UPDATE
          task_id:    "MWF-OPC:6_1:drive_release"
          status:     in_progress

      - action: "冻结候选版本"
        action_id: "MWF-OPC:6_1:drive_release:A02"
        tool: "IPC → devops"
        details: "冻结 artifact versions、git revision，写 release_candidate.yaml"

      - action: "部署 staging"
        action_id: "MWF-OPC:6_1:drive_release:A03"
        tool: "IPC TASK_ASSIGN → devops"
        task_packet:
          instruction: "部署到 staging 环境"
          completion_checks: ["staging 部署成功", "staging 服务可访问"]

      - action: "staging 验证"
        action_id: "MWF-OPC:6_1:drive_release:A04"
        tool: "IPC TASK_ASSIGN → qa"
        task_packet:
          instruction: "执行 staging 验证: 核心路径测试 + 回归测试"
          completion_checks: ["所有 staging test 通过"]

      - action: "请求 prod 审批"
        action_id: "MWF-OPC:6_1:drive_release:A05"
        tool: "IPC → brain_pmo"
        details: "PMO 审批生产发布"

      - action: "部署 production"
        action_id: "MWF-OPC:6_1:drive_release:A06"
        tool: "IPC TASK_ASSIGN → devops"
        task_packet:
          instruction: "部署到 production"
          completion_checks: ["production 部署成功"]
          rollback_plan: "如果失败，执行回滚到上一版本"

      - action: "prod smoke test"
        action_id: "MWF-OPC:6_1:drive_release:A07"
        tool: "IPC TASK_ASSIGN → qa"
        task_packet:
          instruction: "执行 production smoke test"
          completion_checks: ["smoke test 全部通过"]

      - action: "写 release 决策"
        action_id: "MWF-OPC:6_1:drive_release:A08"
        tool: "file_write"
        target: "state/release_record.yaml"

      - action: "cross_model_validation: 验证 state/release_record.yaml"
        action_id: "MWF-OPC:6_1:drive_release:A09"
        type: "cross_model_validation"
        strategy_ref: "workflow_core.yaml → audit_strategy.cross_model_validation"
        execution_flow:
          "1_write_request":
            path: "{project_root}/state/step_results/MWF-OPC_6_1_drive_release/validation_request.yaml"
            content:
              step_id: "MWF-OPC:6_1:drive_release"
              validator_model_rule: "不同于 orchestrator 当前模型"
              artifact: "state/release_record.yaml"
              check_items:
                - {id: "CHK-01", type: "file_exists",  target: "state/release_record.yaml"}
                - {id: "CHK-02", type: "field_assert", field: "staging_result",        assert: "== pass"}
                - {id: "CHK-03", type: "field_assert", field: "prod_approval",         assert: "== approved"}
                - {id: "CHK-04", type: "field_assert", field: "prod_deploy_result",    assert: "== success"}
                - {id: "CHK-05", type: "field_assert", field: "smoke_result",          assert: "== pass"}
                - {id: "CHK-06", type: "field_assert", field: "release_decision",      assert: "== RELEASED"}
                - {id: "CHK-07", type: "field_assert", field: "release_candidate_version", assert: "非空字符串"}
          "2_spawn_validator":
            command: "agentctl start --role step_validator --model {validator_model} --ephemeral"
            note: "validator_model 由 model_selection 规则确定，与 orchestrator 不同"
          "3_wait_result":
            wait_for: "IPC: VALIDATE_COMPLETE"
            timeout: "120s"
            on_timeout: "fallback → same_model_isolated (见 workflow_core.yaml)"
          "4_write_completion_check":
            path: "{project_root}/state/step_results/MWF-OPC_6_1_drive_release/completion_check.yaml"
        on_fail:
          action: "TASK_UPDATE(blocked) + IPC notify brain_pmo"
          payload: "completion_check.yaml path + failed check_items"

      - action: "TASK_UPDATE: completed + SPEC_PROGRESS（phase 6 完成）"
        action_id: "MWF-OPC:6_1:drive_release:A10"
        tool: "task_manager API"
        call: |
          # 标记 step task 完成
          event_type: TASK_UPDATE
          task_id:    "MWF-OPC:6_1:drive_release"
          status:     completed

          # Phase 6 (release) 完成 → 推进 spec stage 到 S7_verification
          event_type:    SPEC_PROGRESS
          spec_id:       "{project_id}"
          target_stage:  S7_verification

    artifact: "state/release_record.yaml"
    artifact_schema:
      release_candidate_version: string
      staging_result: "pass | fail"
      prod_approval: "approved | rejected"
      prod_deploy_result: "success | failed | rolled_back"
      smoke_result: "pass | fail"
      release_decision: "RELEASED | ROLLED_BACK | HOLD"

    check: "release_decision = RELEASED"
    on_success: "MWF-OPC:7_1:run_audit"
    on_retry: "staging 或 smoke 失败 → fix → 重新部署"
    on_blocked: "prod 审批被拒或回滚也失败 → CRITICAL escalate"

