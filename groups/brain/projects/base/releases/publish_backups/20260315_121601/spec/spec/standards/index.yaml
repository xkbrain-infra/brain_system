mandatory: []
on_demand:
  infra:
    docker:
      trigger:
      - Dockerfile
      - compose.yaml
      - 容器
      - 部署
      - deploy
      files:
      - infra/docker/docker.yaml
      - infra/docker/deployment.yaml
    database:
      trigger:
      - 数据库
      - migration
      - pg_dump
      - backup
      files:
      - infra/database/operation.yaml
      key_rules:
      - 先备份再操作
      - 新老并存
      - 提供回滚
    agent_abilities_build:
      trigger:
      - build
      - build.sh
      - stats
      - agent_abilities
      - deploy hooks
      files:
      - infra/agent_abilities_build.yaml
      key_rules:
      - current symlink = build gate
      - dual output yaml+md
      - Rule 列命名
      - 流水线顺序 diff→merge→build→deploy
    service_project_structure:
      trigger:
      - 新建服务
      - 服务目录
      - service project
      - README.md
      - 接口文档
      - interfaces.md
      - 项目结构
      - src 分层
      files:
      - infra/service_project_structure.yaml
      key_rules:
      - 必须有 README.md
      - 必须有 docs/interfaces.md
      - src/ 按模块分层
      - config 在 infrastructure/config/
      - data 在 runtime/data/
  workflow:
    verification:
      trigger:
      - git commit
      - 测试
      - build
      files:
      - workflow/verification.yaml
    problem_solving:
      trigger:
      - 错误
      - error
      - 故障
      files:
      - workflow/problem_solving.yaml
  coding:
    cpp:
      trigger:
      - '*.cpp'
      - '*.hpp'
      - C++
      files:
      - coding/cpp.yaml
  file_management:
    organization:
      trigger:
      - 创建文件
      - 目录组织
      - 文件分类
      - Write
      - 路径规范
      files:
      - file_organization.yaml
      key_rules:
      - 必须选择组织模式
      - 禁止顶级目录创建
      - 使用完整路径
  agents:
    third_party_llm:
      trigger:
      - 第三方LLM
      - KIMI
      - MiniMax
      - settings.local.json
      - ANTHROPIC_BASE_URL
      - agent配置
      files:
      - agents/third_party_llm_template.yaml
      key_rules:
      - 禁止export
      - 使用settings.local.json
      - 统一模型配置
      - 正确MCP路径
quick_lookup:
  Dockerfile: infra.docker
  compose.yaml: infra.docker
  pg_dump: infra.database
  git commit: workflow.verification
  error: workflow.problem_solving
  '*.cpp': coding.cpp
  Write: file_management.organization
  创建文件: file_management.organization
  KIMI: agents.third_party_llm
  MiniMax: agents.third_party_llm
  settings.local.json: agents.third_party_llm
  第三方LLM: agents.third_party_llm
  build.sh: infra.agent_abilities_build
  agent_abilities: infra.agent_abilities_build
  新建服务: infra.service_project_structure
  README.md: infra.service_project_structure
  接口文档: infra.service_project_structure
  interfaces.md: infra.service_project_structure
