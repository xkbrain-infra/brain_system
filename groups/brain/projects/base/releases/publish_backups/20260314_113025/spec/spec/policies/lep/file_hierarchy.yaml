gate_id: G-GATE-FILE-HIERARCHY
name: Global File Hierarchy Enforcement
applies_to: [write, move]
rule: 全局文件落盘必须遵循四域层级与组织规范，禁止路径散落
hierarchy_rule: 顶层只允许架构目录，业务产物必须落到对应子层级目录

enforcement:
  stage: pre_tool_use
  method: python_checker
  checker: file_org_checker
  priority: HIGH
  note: "全局 gate，复用 file_org_checker 执行层级与命名校验"

  triggers:
    tools: [Write, Edit, NotebookEdit]

  block_message: |
    🚫 文件层级规范违规 (G-GATE-FILE-HIERARCHY)

    文件路径: {file_path}
    违规原因: {reason}

    要求：
    1. 必须归入 base/、groups/、infrastructure/、runtime/ 合法层级
    2. 禁止在 /brain/ 顶层直接落盘业务文件
    3. 项目产物应归入 groups/org/{{group}}/projects|tasks|spec 子目录

    参考：
    - /brain/base/spec/core/layers.yaml
    - /brain/base/spec/policies/lep/file_org.yaml
bindings:
  hooks:
    stage: pre_tool_use
    trigger_tools: [Write, Edit, NotebookEdit]
  mcp_tools: []
  related_skills: []
