id: G-STD-BUILD-MERGE-CONFLICT
title: Build Merge Conflict Resolution Protocol
scope: G
category: STANDARD
priority: CRITICAL
applies_to: [build.sh, cmd_merge, cmd_build, cmd_deploy, cmd_publish]

description: |
  当 build.sh 的 merge 步骤产生冲突时的检测、拦截和解决流程。
  冲突 = src 和 base 相对于 ancestor (releases/current/) 都有变更，
  且 git merge-file 无法自动合并，写入了 <<<<<<< 冲突标记。

merge_strategy:
  tool: "git merge-file"
  ancestor: "releases/current/{target}/ — 上次发布快照"
  three_way_logic:
    only_base_changed: "base → src（自动合入）"
    only_src_changed: "保留 src（不动）"
    both_changed_no_conflict: "git merge-file 自动合并（两边改了不同位置）"
    both_changed_conflict: "写入 <<<<<<< 冲突标记，需要人工解决"
    new_in_base_only: "复制到 src"
    new_in_src_only: "保留 src"

conflict_detection:
  marker: "<<<<<<<"
  scan_scope: "src/{target}/ 目录下所有文本文件"
  file_types: ["*.yaml", "*.yml", "*.md", "*.json", "*.py", "*.sh", "*.toml", "*.txt"]
  command: "build.sh conflicts [target]"

gate:
  name: "G-GATE-MERGE-CONFLICT"
  rule: "src 目录中存在 <<<<<<< 冲突标记时，禁止 build / deploy / publish"
  enforcement:
    - point: cmd_build
      action: "fail — 打印冲突文件列表，要求先 resolve"
    - point: cmd_publish
      action: "fail — merge 后检测到冲突，要求先 resolve"
  error_message: |
    unresolved merge conflicts — run 'build.sh resolve {target}' first

resolution:
  strategies:
    accept_src:
      command: "build.sh resolve {target} --accept-src"
      behavior: "保留 src 侧内容，丢弃 base 侧变更"
      use_when: "src 是最新正确版本（开发者刚改过 src）"
    accept_base:
      command: "build.sh resolve {target} --accept-base"
      behavior: "保留 base 侧内容，丢弃 src 侧变更"
      use_when: "base 是最新正确版本（agent 在线上改过 base）"
    manual:
      command: "手动编辑文件，删除 <<<<<<< / ======= / >>>>>>> 标记"
      behavior: "人工决定每处冲突保留哪边或合并两边"
      use_when: "两边的变更都需要保留（最常见）"

workflow:
  steps:
    - step: 1
      action: "build.sh merge {target}"
      result: "git merge-file 尝试自动合并"
    - step: 2
      action: "如果有冲突，build.sh 输出冲突文件列表"
      result: "merge 完成但有 <<<<<<< 标记"
    - step: 3
      action: "build.sh conflicts {target} — 确认冲突列表"
      result: "列出所有含冲突标记的文件"
    - step: 4
      action: "选择解决策略（accept-src / accept-base / manual）"
      result: "冲突标记被清除"
    - step: 5
      action: "build.sh conflicts {target} — 再次确认无冲突"
      result: "确认通过"
    - step: 6
      action: "build.sh build {target} — 继续构建"
      result: "构建通过"

escalation:
  rule: |
    如果 agent 无法判断应该 accept-src 还是 accept-base：
    1. 列出冲突文件和内容差异
    2. 通过 IPC 上报 architect 或 PMO
    3. 等待人工决策
    4. 禁止自行选择 accept-src/accept-base 后静默继续

examples:
  - scenario: "knowledge 域 merge 后有 2 个文件冲突"
    commands:
      - "build.sh merge knowledge"
      - "# 输出: 2 conflicts detected"
      - "build.sh conflicts knowledge"
      - "# 输出: guides/workflow/tasks_guide.md, guides/workflow/solution_guide.md"
      - "build.sh resolve knowledge --accept-src"
      - "# 或手动编辑后: build.sh conflicts knowledge → 0 conflicts"
      - "build.sh build knowledge"
