# Code Verification Standard
# 代码验证标准 - 所有代码项目的强制验证流程

id: POL-VERIFY-001
version: "1.0"
enforcement: MANDATORY

principles:
  - Build First: 提交前必须编译成功
  - Test Always: 所有测试必须通过
  - No Critical Warnings: 不允许严重警告
  - Verify Before Commit: commit 前完成验证

# 验证阶段
stages:
  V1-STATIC:
    name: 静态检查
    required: false
    tools:
      cpp: [clang-tidy, cppcheck]
      python: [pylint, mypy]
      rust: [clippy]

  V2-BUILD:
    name: 编译构建
    required: true
    commands:
      cpp: cmake --build build -j$(nproc)
      python: python -m py_compile **/*.py
      rust: cargo build --release
    pass: exit_code == 0

  V3-UNIT-TEST:
    name: 单元测试
    required: true
    commands:
      cpp: cd build && ctest --output-on-failure
      python: pytest tests/ -v
      rust: cargo test
    pass: tests.failed == 0

  V4-INTEGRATION:
    name: 集成测试
    required: false

# 检查点
checkpoints:
  before_commit:
    trigger: git commit
    required: [V2-BUILD, V3-UNIT-TEST]
    on_fail: BLOCK_COMMIT

  before_push:
    trigger: git push
    required: [V2-BUILD, V3-UNIT-TEST]

# 通过标准
pass_criteria:
  build:
    exit_code: 0
    errors: 0
  tests:
    executed: true
    failed: 0
    skipped_ratio: "< 10%"

# 失败处理
on_failure:
  build_failure:
    action: BLOCK_COMMIT
    message: "编译失败，禁止提交。请修复编译错误后重试。"
  test_failure:
    action: BLOCK_COMMIT
    message: "测试失败，禁止提交。请修复测试错误后重试。"

# 例外情况
exceptions:
  - id: EX-HOTFIX
    condition: 生产环境严重故障
    requires_approval: true
    requires_post_verification: true
  - id: EX-DRAFT
    condition: commit message 包含 [WIP] 或 [DRAFT]
    requires_post_verification: true

# 语言特定
language_specific:
  cpp:
    compiler: [GCC 11+, Clang 16+]
    standard: C++20
    test_framework: GoogleTest
  python:
    version: "3.8+"
    test_framework: pytest
    coverage: ">= 80%"
  rust:
    version: "1.70+"
    test_framework: cargo test
