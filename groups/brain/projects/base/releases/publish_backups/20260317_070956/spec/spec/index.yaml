# /brain/base/spec/index.yaml
# Agent 读取此文件了解 spec 结构和加载策略

# 快速查找文档 (推荐)
registry:
  file: /brain/base/spec/registry.yaml
  total_documents: 69
  categories: [CORE, POLICY, STANDARD, TEMPLATE]
  usage: |
    读取 registry.yaml → quick_lookup[keyword] → 获取文档 ID → 读取文档
    示例: quick_lookup['ipc'] → [G-SPEC-POLICY-IPC-MESSAGE-FORMAT, ...]

load:
  mandatory:  # 启动必读
    - core/lep.yaml
    - core/layers.yaml
    - core/workflow.yaml
  on_demand:  # 按需加载
    - policies/**
    - standards/**
    - templates/**

structure:
  core/: # 核心规范，必读（仅 3 个文件）
    lep.yaml: 门控规则 - universal_gates(12) + domain_gates 引用
    layers.yaml: 四层架构定义（base/groups/infrastructure/runtime）
    workflow.yaml: 全员任务执行规范（TaskID/Plan/验证/记录）
  policies/: # 执行政策（按领域分子目录）
    agents/: Agent 协作协议
    lep/: LEP Gates 实现索引 (31 gates)
    ipc/: IPC 通信规范（message_format, priority, reliability_design）
    creation/: 项目/Group 创建规范（project_creation, group, project）
    config/: 双层配置管理规范
    secrets/: 敏感数据管理规范
    memory/: Agent 会话记录持久化规范
    estimation/: 时间估算模板
  standards/: # 技术标准 (按需)
    organization/: 文件组织规范
    infra/docker/: Docker、部署
    infra/database/: 数据库操作
    workflow/: 验证、问题解决、时间估算、版本升级
    coding/: 代码规范（C++）
  templates/: # 模板
    spec/: Spec 流程 DSL
    agent/: Agent CLAUDE.md 模板 + 角色模板（8 个角色）

quick_ref:
  写代码前: core/lep.yaml
  架构设计: core/layers.yaml
  任务执行规范: core/workflow.yaml
  Spec设计流程: /brain/base/workflow/spec_design.yaml
  Agent协作: policies/agents/agent_protocol.yaml
  PMO事件循环: /brain/base/workflow/index.yaml
  演进引擎: /brain/base/evolution/index.yaml
  四域审核: /brain/base/workflow/governance.yaml
  Docker: standards/infra/docker/docker.yaml
  数据库: standards/infra/database/operation.yaml
  代码验证: standards/workflow/verification.yaml
  密钥管理: policies/secrets/secrets_management.yaml
  配置管理: policies/config/config_management.yaml
  文件组织: standards/organization/file_organization.yaml
