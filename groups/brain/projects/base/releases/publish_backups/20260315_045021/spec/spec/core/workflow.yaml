# Core Workflow — 全员任务执行规范
# 所有 Agent 执行任何任务都必须遵守

# ============================================
# 原则：无 TaskID 不动手，无 Plan 不执行，无记录不算完
# ============================================

task_registration:
  rule: 任何任务执行前必须获取 TaskID
  process:
    1: 确认任务所属项目组
    2: 向对应项目组 PMO 报备任务，并在 service-task_manager 记录
    3: PMO 审核后分配 TaskID（写入 task_manager 作为 SSOT）
  constraints:
    - TaskID 只能由 PMO 角色生成
    - 无 TaskID 的任务禁止执行
    - 跨组任务需向目标组 PMO 申请

plan_before_execution:
  rule: 获取 TaskID 后，必须先制定 Plan 再执行
  process:
    1: 基于任务目标制定执行计划
    2: Plan 需明确：做什么、改哪些文件、预期结果
    3: Plan 提交 PMO 审批后方可执行
  constraints:
    - 禁止跳过 Plan 直接动手
    - Plan 变更需重新审批

task_verification:
  rule: 任务完成前必须测试通过
  process:
    1: 根据任务类型确定验证方式（编译、单测、集成测试、人工验收）
    2: 执行验证，记录测试结果
    3: 测试不通过禁止标记任务完成
  constraints:
    - 无测试结果的任务不能关闭
    - 测试失败必须修复后重新验证

task_documentation:
  rule: 任务的描述、过程、决策、结论必须记录在案
  required_records:
    - description: 任务描述（做什么、为什么）
    - process: 执行过程（步骤、操作）
    - decisions: 关键决策（选了什么、为什么选）
    - conclusion: 结论（结果、遗留问题）
  constraints:
    - 记录必须落盘，不能只存在于 IPC 消息中
    - 任务完成后向 PMO 回报结论

memory_persistence:
  rule: 所有 Agent 的会话输出必须持久化到 /xkagent_infra/runtime/memory/
  mechanism: agentctl 启动 agent 时自动配置 tmux pipe-pane
  structure: /xkagent_infra/runtime/memory/{date}/{agent_name}/
  detail: policies/memory/persistence.yaml
  constraints:
    - Agent 自身无需处理，由 agentctl 强制保证
    - audit 日志和 session 日志统一写入 memory 根目录
    - 无项目关联的对话写入 {date}/tmp/
