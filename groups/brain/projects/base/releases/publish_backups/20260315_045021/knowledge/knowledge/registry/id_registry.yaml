# Brain 全局 ID 注册表
# 所有 base/ 下 YAML 中使用的 id 字段必须在此注册
# 构建时检查：无重复 ID、所有 ID 有前缀
#
# 前缀分配表见底部 prefix_allocation
# 新增 ID 前先查此表确认前缀可用且 ID 不重复

