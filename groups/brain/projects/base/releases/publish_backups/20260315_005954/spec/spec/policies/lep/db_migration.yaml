gate_id: G-GATE-DB-MIGRATION
name: Database Migration Parallel
applies_to: [write, delete, move]
rule: 数据库迁移必须新老并存，不直接替换

enforcement:
  stage: pre_tool_use
  method: python_inline
  priority: HIGH

  triggers:
    tools: [Bash]

  patterns:
    migration_commands:
      - pattern: "pg_dump"
        message: "检测到 pg_dump 操作"
      - pattern: "pg_restore"
        message: "检测到 pg_restore 操作"
      - pattern: "psql.*CREATE\\s+TABLE"
        message: "检测到 CREATE TABLE 操作"
      - pattern: "psql.*ALTER\\s+TABLE"
        message: "检测到 ALTER TABLE 操作"
      - pattern: "psql.*DROP\\s+TABLE"
        message: "检测到 DROP TABLE 操作"
      - pattern: "alembic\\s+upgrade"
        message: "检测到 alembic upgrade 操作"
      - pattern: "django.*migrate"
        message: "检测到 django migrate 操作"

  warn_message: |
    ⚠️ 数据库迁移需要新老并存 (G-DB-MIGRATION)

    {message}

    建议迁移步骤：
    1. 创建新表/列（不删除旧的）
    2. 双写：同时写入新旧表
    3. 验证数据一致性（24-48h）
    4. 切流量到新表
    5. 废弃旧表（保留备份）

  block_message: |
    ⚠️ 数据库迁移规范 (G-DB-MIGRATION)

    命令: {command}

    原则：新老并存，逐步切换

    禁止：
    - ❌ 直接 DROP TABLE
    - ❌ 直接 ALTER TABLE DROP COLUMN
    - ❌ 不经验证的结构变更

    推荐：
    1. 创建新表 table_v2
    2. 双写模式（写 table + table_v2）
    3. 验证 24h
    4. 切流量到 table_v2
    5. 归档 table

    参考：/brain/base/spec/core/lep.yaml (G-DB-MIGRATION)
bindings:
  hooks:
    stage: pre_tool_use
    trigger_tools: [Bash]
    patterns: [alter_table, drop_column]
  mcp_tools: []
  related_skills: []
