gate_id: G-GATE-APPROVAL-DELEGATION
name: Approval Delegation to PMO
applies_to: [write, delete, move, git]
rule: |
  Agent 需要审批时，不直接等待用户，而是发送 APPROVAL_REQUEST 给组内 PMO。
  PMO 是组内操作的全权审批代理：
  - PMO 可自行批准常规操作
  - PMO 可自行拒绝不合规操作
  - PMO 认为需要用户介入时，通过 frontdesk 转发给用户
  - 用户保留最终覆盖权（可随时通过 frontdesk 下达指令）
ipc_message:
  type: APPROVAL_REQUEST
  required_fields: [task_id, agent, action_type, target, plan_summary, risk_level]
  target: "agent_{group}_pmo"
pmo_response:
  type: APPROVAL_RESPONSE
  fields: [task_id, decision, reason]
  decision_enum: [approved, rejected, escalated_to_user]

enforcement:
  stage: ipc_message_check
  method: message_routing_validation
  priority: MEDIUM
  note: "需要 IPC 拦截支持 - 当前为推荐性检查"

  triggers:
    tools: [AskUserQuestion]

  rules:
    delegate_to_pmo:
      description: "审批请求应该先发给 PMO"
      approval_routing:
        - "Agent 需要审批 → 发 APPROVAL_REQUEST 给 PMO"
        - "PMO 决策 → 批准/拒绝/升级给用户"
        - "禁止 Agent 直接使用 AskUserQuestion 等待用户"

  warn_message: |
    💡 建议委派审批给 PMO (G-APPROVAL-DELEGATION)

    检测到使用 AskUserQuestion

    建议的审批流程：
    1. Agent 发送 APPROVAL_REQUEST 给 group PMO
    2. PMO 评估并决策（批准/拒绝/升级）
    3. 如需用户介入，PMO 通过 frontdesk 转发

    IPC 消息示例：
    ```python
    ipc_send(
        to="agent-system_pmo",
        message_type="request",
        message={
            "type": "APPROVAL_REQUEST",
            "task_id": "task-123",
            "agent": "agent-system_architect",
            "action_type": "modify_core_spec",
            "target": "/brain/base/spec/core/lep.yaml",
            "plan_summary": "添加新的 gate",
            "risk_level": "medium"
        }
    )
    ```

    PMO 响应格式:
    ```python
    {
        "type": "APPROVAL_RESPONSE",
        "task_id": "task-123",
        "decision": "approved",
        "reason": "符合规范，批准"
    }
    ```

    这是推荐性检查（需要 IPC 集成）。

    参考：/brain/base/spec/core/lep.yaml (G-APPROVAL-DELEGATION)
bindings:
  hooks:
    stage: pre_tool_use
    trigger_tools: [Write, Edit, Bash]
  mcp_tools: []
  related_skills: []
