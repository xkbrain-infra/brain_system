gate_id: G-GATE-SCOP
name: Scope Locking
applies_to: [write, delete, move, git]
rule: 操作必须在允许的路径内
protected: /brain/**

enforcement:
  stage: pre_tool_use
  method: c_binary
  binary: lep_check
  priority: CRITICAL

  triggers:
    tools: [Write, Edit, Bash]
    check_type: protected

  protected_paths:
    - /brain/
    - /xkagent_infra/brain/

  block_message: |
    🚫 保护路径禁止修改 (G-SCOP)
    路径: {file_path}
    保护原因: /brain/** 是发布态目录，不是开发源目录

    请不要直接写 /brain/**。

    正确做法：
    1. `/brain/base/**` 变更：写入 `/xkagent_infra/runtime/update_brain/pending/<批次名>/base/...`
    2. `/brain/platform/**` 变更：写入 `/xkagent_infra/groups/brain/projects/platform/...`
    3. 其他 `/brain/**` 变更：先找到对应的 groups project / source root，再通过 publish 流程进入 `/brain/`

    参考：`/brain/base/spec/core/lep.yaml` (G-GATE-SCOP)
bindings:
  hooks:
    stage: pre_tool_use
    trigger_tools: [Write, Edit, Bash]
  mcp_tools: []
  related_skills: []
