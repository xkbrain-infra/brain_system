# Brain Sandbox Compose Template
# 路径: /xkagent_infra/groups/brain/platform/sandbox/templates/compose.base.yaml

name: ${SANDBOX_NAME:-sandbox}

services:
  sandbox:
    build:
      context: .
      dockerfile: Dockerfile.base
    image: brain-sandbox-base:${SANDBOX_VERSION:-2.1.0}
    container_name: ${CONTAINER_NAME}
    hostname: ${HOSTNAME}

    # 工作目录
    working_dir: /workspace/project

    # 卷挂载
    volumes:
      # 项目源码（读写）
      - ${PROJECT_ROOT}:/workspace/project:rw
      # 数据目录（隔离）
      - sandbox_data_${INSTANCE_ID}:/workspace/data
      # 日志目录
      - sandbox_logs_${INSTANCE_ID}:/workspace/logs
      # 缓存目录
      - sandbox_cache_${INSTANCE_ID}:/workspace/cache

    # 环境变量
    environment:
      # Sandbox 元数据
      - SANDBOX_MODE=full
      - SANDBOX_TYPE=${DEPLOYMENT_TYPE}
      - SANDBOX_INSTANCE_ID=${INSTANCE_ID}
      - SANDBOX_PROJECT=${PROJECT_NAME}
      - SANDBOX_GROUP=${GROUP_NAME}

      # 项目配置
      - PROJECT_ROOT=/workspace/project
      - PROJECT_NAME=${PROJECT_NAME}
      - PROJECT_VERSION=${PROJECT_VERSION}

      # Brain 集成（可选）
      - BRAIN_GATEWAY_URL=${BRAIN_GATEWAY_URL:-http://host.docker.internal:8200}
      - BRAIN_IPC_SOCKET=/tmp/brain_ipc.sock

      # Python 路径
      - PYTHONPATH=/workspace/project/src:/brain/infrastructure/service/utils/ipc/src

    # 网络
    networks:
      - ${NETWORK_NAME}

    # 端口映射（动态分配）
    ports:
      - "${HOST_PORT_APP}:${CONTAINER_PORT_APP:-8080}"
      - "${HOST_PORT_DEBUG}:${CONTAINER_PORT_DEBUG:-5678}"

    # 资源限制
    deploy:
      resources:
        limits:
          cpus: '${CPU_LIMIT:-2.0}'
          memory: ${MEMORY_LIMIT:-2G}
        reservations:
          cpus: '0.5'
          memory: 512M

    # 健康检查
    healthcheck:
      test: ["CMD", "python", "-c", "import sys; sys.exit(0)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

    # 重启策略（开发模式不自动重启）
    restart: ${RESTART_POLICY:-no}

    # 标签
    labels:
      - "brain.sandbox=true"
      - "brain.group=${GROUP_NAME}"
      - "brain.project=${PROJECT_NAME}"
      - "brain.type=${DEPLOYMENT_TYPE}"
      - "brain.instance=${INSTANCE_ID}"
      - "brain.created=${CREATED_AT}"

# 数据卷（按实例隔离）
volumes:
  sandbox_data_${INSTANCE_ID}:
    driver: local
  sandbox_logs_${INSTANCE_ID}:
    driver: local
  sandbox_cache_${INSTANCE_ID}:
    driver: local

# 网络（按类型隔离）
networks:
  ${NETWORK_NAME}:
    driver: bridge
    labels:
      - "brain.sandbox.network=true"
      - "brain.group=${GROUP_NAME}"
