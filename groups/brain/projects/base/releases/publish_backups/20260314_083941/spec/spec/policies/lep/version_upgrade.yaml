gate_id: G-GATE-VERSION-UPGRADE
name: Version Upgrade Protocol
applies_to: [write, delete, move]
rule: 升级必须版本化，保留回退方案

enforcement:
  stage: pre_tool_use
  method: python_inline
  priority: HIGH

  triggers:
    tools: [Write, Edit, Bash]
    patterns:
      version_files:
        - "**/v1/**"
        - "**/v2/**"
        - "**/version*.yaml"
        - "**/*_v[0-9]+.*"
      upgrade_commands:
        - "mv.*v1.*v2"
        - "rm.*v1"
        - "cp -r.*v1.*v2"

  rules:
    version_parallel:
      description: "版本升级必须保持新老共存"
      steps:
        - "1. 保留 v1 不动"
        - "2. 创建 v2 新目录/文件"
        - "3. 验证 v2 功能（24-48h）"
        - "4. 逐步切流量到 v2"
        - "5. v1 归档（不删除）"

  block_message: |
    ⚠️ 版本升级规范 (G-VERSION-UPGRADE)

    操作: {operation}
    文件: {file_path}

    禁止：
    - ❌ 直接删除或覆盖 v1
    - ❌ 直接 mv v1 v2（会导致回退困难）

    正确流程：
    1. 保留 v1 目录/文件
    2. 创建全新的 v2
    3. 切流量测试 v2
    4. 验证 24-48h
    5. 确认稳定后归档 v1 到 .archived/

    示例：
    ```bash
    # ✅ 正确
    cp -r src/checkers/path_checker/v1 src/checkers/path_checker/v2
    # 修改 v2
    # 测试 v2
    # 确认后归档 v1

    # ❌ 错误
    mv src/checkers/path_checker/v1 src/checkers/path_checker/v2
    ```

    参考：/brain/base/spec/core/lep.yaml (G-VERSION-UPGRADE)
bindings:
  hooks:
    stage: pre_tool_use
    trigger_tools: [Bash, Write, Edit]
  mcp_tools: []
  related_skills: []
