# C++ Coding Standards
# 基于 Google C++ Style Guide，仅记录项目特定规则

id: SPEC-CODE-CPP-001
version: "1.0"
base: https://google.github.io/styleguide/cppguide.html

# 语言标准
language:
  version: C++20
  forbidden: [C++98, C++11, C++14, C++17]

# 命名规范 (Google Style)
naming:
  files: snake_case.hpp / snake_case.cpp
  types: PascalCase  # class StopLossManager
  functions: PascalCase  # CheckPositions()
  variables: snake_case  # stop_loss_pct
  members: snake_case_  # 后缀下划线
  constants: kPascalCase  # kDefaultPeriod
  namespaces: snake_case
  macros: UPPER_CASE

# 格式化
formatting:
  indent: 4 spaces
  line_length: 100 (max 120)
  braces: K&R variant
  pointer: "int* ptr"  # 靠近类型

# 头文件
headers:
  guard: "#pragma once"
  include_order: [相关头文件, C系统, C++标准库, 第三方, 项目内]

# 项目特定规则 (覆盖 Google Style)
project_specific:
  compiler_flags:
    required: [-std=c++20, -fPIC, -fno-exceptions, -DNO_STD_MUTEX, -DSPDLOG_NO_EXCEPTIONS]
    release: [-O3, -DNDEBUG, -flto]
    debug: [-g, -fsanitize=address]

  forbidden:
    - std::mutex  # 使用 NO_STD_MUTEX
    - exceptions  # 使用 -fno-exceptions
    - iostream    # 性能敏感代码禁用

  logging: spdlog  # 不用 std::cout

  error_handling:
    instead_of_exceptions:
      - std::optional
      - 状态码 + error_msg 指针
      - bool 返回值

  third_party_sdk:
    initialization:
      rule: "SDK 初始化必须在对应模块内部处理"
      rationale: |
        - 避免上层代码依赖特定 SDK 的头文件
        - Manager/Factory 层在创建组件前确保 SDK 已初始化
        - 使用 IsInited() 检查避免重复初始化
      example: |
        // 错误: 上层直接调用 SDK 初始化
        // unified_service.cpp
        #include <vendor_sdk.h>
        VendorSDK::Init();  // Bad!

        // 正确: 在 Manager 层处理
        // broker_manager.cpp
        if (!VendorAPIManager::IsInited()) {
            VendorAPIManager::Init();
        }
        return new VendorTrader(config);

    exception_abi:
      rule: "使用异常的第三方库的模块必须启用 -fexceptions"
      rationale: |
        - -fno-exceptions 编译的代码调用使用异常的库会导致未定义行为
        - 库内部抛出异常时会 SIGSEGV 崩溃 (exit code 139)
        - 检查方法: nm -C lib.so | grep -E "(cxa_|exception)"
      example: |
        # CMakeLists.txt
        # 检测到第三方库使用异常，为该模块启用异常支持
        target_compile_options(${PROJECT_NAME} PRIVATE -fexceptions)
      reference: "LL-2026-02-04-002 (cxx_service Futu SDK crash)"

# 现代 C++ 优先使用
prefer:
  - auto (类型明确时)
  - range-based for
  - nullptr (不用 NULL)
  - constexpr
  - std::unique_ptr/shared_ptr
  - std::optional
  - std::format (C++20)

avoid:
  - C 风格转换
  - 裸 new/delete
  - 宏 (用 constexpr)
  - C 字符串
  - 原始数组

# 工具
tools:
  formatter: "clang-format (base: Google, IndentWidth: 4)"
  linter: clang-tidy
  static_analysis: cppcheck

# 参考
references:
  - https://google.github.io/styleguide/cppguide.html
  - https://isocpp.github.io/CppCoreGuidelines/CppCoreGuidelines
