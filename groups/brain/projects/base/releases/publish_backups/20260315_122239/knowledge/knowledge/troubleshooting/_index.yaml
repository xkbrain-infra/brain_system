# Troubleshooting Knowledge Base Index
# 技术问题库索引 - 快速导航与分类

troubleshooting_index:
  version: "1.0"
  last_updated: "2026-01-17"
  description: |
    基础层技术问题库索引。先加载此文件，再按需加载具体分类。
    每个分类文件包含该类别的详细问题及解决方案。

  categories:
    network_errors:
      file: "network_errors.yaml"
      description: "网络连接、超时、HTTP错误"
      problem_count: 4
      ids: ["NET-001", "NET-002", "NET-003", "NET-004"]

    data_errors:
      file: "data_errors.yaml"
      description: "数据验证、编码、重复问题"
      problem_count: 3
      ids: ["DATA-001", "DATA-002", "DATA-003"]

    authentication_errors:
      file: "authentication_errors.yaml"
      description: "认证失败、权限不足"
      problem_count: 2
      ids: ["AUTH-001", "AUTH-002"]

    resource_errors:
      file: "resource_errors.yaml"
      description: "磁盘空间、内存不足"
      problem_count: 2
      ids: ["RES-001", "RES-002"]

    configuration_errors:
      file: "configuration_errors.yaml"
      description: "配置缺失、数据库连接"
      problem_count: 2
      ids: ["CFG-001", "CFG-002"]

    dependency_errors:
      file: "dependency_errors.yaml"
      description: "依赖缺失、导入错误"
      problem_count: 1
      ids: ["DEP-001"]

    ipc_errors:
      file: "ipc_troubleshooting.yaml"
      description: "IPC 通信故障：daemon、tmux 通知、消息投递"
      problem_count: 5
      ids: ["IPC-001", "IPC-002", "IPC-003", "IPC-004", "IPC-005"]

  quick_lookup:
    # Network
    timeout: "network_errors.yaml#NET-001"
    connection_refused: "network_errors.yaml#NET-002"
    404: "network_errors.yaml#NET-003"
    not_found: "network_errors.yaml#NET-003"
    captcha: "network_errors.yaml#NET-004"
    bot_detection: "network_errors.yaml#NET-004"

    # Data
    validation: "data_errors.yaml#DATA-001"
    invalid_format: "data_errors.yaml#DATA-001"
    duplicate: "data_errors.yaml#DATA-002"
    unique_constraint: "data_errors.yaml#DATA-002"
    encoding: "data_errors.yaml#DATA-003"
    unicode: "data_errors.yaml#DATA-003"

    # Authentication
    401: "authentication_errors.yaml#AUTH-001"
    unauthorized: "authentication_errors.yaml#AUTH-001"
    403: "authentication_errors.yaml#AUTH-002"
    forbidden: "authentication_errors.yaml#AUTH-002"

    # Resources
    disk_full: "resource_errors.yaml#RES-001"
    no_space: "resource_errors.yaml#RES-001"
    oom: "resource_errors.yaml#RES-002"
    memory_error: "resource_errors.yaml#RES-002"

    # Configuration
    missing_config: "configuration_errors.yaml#CFG-001"
    env_var: "configuration_errors.yaml#CFG-001"
    database_connection: "configuration_errors.yaml#CFG-002"

    # Dependencies
    import_error: "dependency_errors.yaml#DEP-001"
    module_not_found: "dependency_errors.yaml#DEP-001"

    # IPC
    ipc: "ipc_troubleshooting.yaml#IPC-003"
    ipc_recv: "ipc_troubleshooting.yaml#IPC-004"
    收不到消息: "ipc_troubleshooting.yaml#IPC-003"
    tmux_notify: "ipc_troubleshooting.yaml#IPC-003"
    daemon: "ipc_troubleshooting.yaml#IPC-001"
    deadletter: "ipc_troubleshooting.yaml#IPC-005"

usage_guidelines:
  - "Load _index.yaml first to get category overview"
  - "Use quick_lookup for common error patterns"
  - "Load specific category file only when needed"
  - "Always search knowledge base before notifying user"
  - "Prioritize solutions with high confidence and low risk"

metadata:
  total_categories: 7
  total_problems: 19
  total_solutions: 23
  maintainer: "Brain System"
