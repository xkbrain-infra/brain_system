# LEP - Linear Expression Protocol
# 门控规则，约束所有修改操作
# 逻辑：command → command_mapping 识别 action 类型 → 匹配 applies_to 的 gates
#
# 本文件定义 LEP 协议 + 全员必须遵守的 gates
# 领域定制 gates 见 policies/lep/index.yaml

actions:
  read: [open, search, summarize, analyze]
  write: [create, update, append, patch]
  delete: [remove, truncate]
  move: [rename, relocate]
  git: [commit, push, checkout, merge, rebase]
  log: [audit, trace, snapshot]

command_mapping:
  read:
    bash: [cat, head, tail, less, grep, rg, find, ls, tree]
    tool: [Read, Glob, Grep]
  write:
    bash: [echo >, tee, sed -i, awk]
    tool: [Write, Edit, NotebookEdit]
  delete:
    bash: [rm, rm -rf, rmdir, unlink, shred]
  move:
    bash: [mv, rename]
  git:
    bash: [git add, git commit, git push, git pull, git checkout, git merge, git rebase]
  log:
    target: "**/memory/**/*.jsonl"

modes:
  STRICT: 默认，操作限制在 scope 内
  PASS-ALL: 需显式授权，允许超出 scope

# ============================================
# 全员 Gates — 所有 Agent 必须遵守
# ============================================
universal_gates:
  G-GATE-NAWP:
    name: No Action Without Plan
    applies_to: [write, delete, move, git]
    rule: 修改操作需要 Plan + PMO 批准
    priority: CRITICAL
    detail: policies/lep/nawp.yaml

  G-GATE-ATOMIC:
    name: Atomic Plan
    applies_to: [write, delete, move, git]
    rule: Plan 必须原子化（具体到文件/行号/动作）
    priority: HIGH
    detail: policies/lep/atomic.yaml

  G-GATE-SCOP:
    name: Scope Locking
    applies_to: [write, delete, move, git]
    rule: 操作必须在允许的路径内
    priority: CRITICAL
    detail: policies/lep/scop.yaml

  G-GATE-DELETE-BACKUP:
    name: Delete with Backup
    applies_to: [delete]
    rule: 删除前必须先备份
    priority: MEDIUM
    detail: policies/lep/delete_backup.yaml

  G-GATE-ROLLBACK-READY:
    name: Rollback-Ready Modification
    applies_to: [write, delete, move]
    rule: 修改文件前必须确保可回滚
    priority: CRITICAL
    detail: policies/lep/rollback_ready.yaml

  G-GATE-KVCACHE-FIRST:
    name: Query Registry Before Read/Write
    applies_to: [read, write]
    rule: 必须优先使用索引系统（registry.yaml）查找文档，禁止盲目搜索
    priority: HIGH
    detail: policies/lep/kvcache_first.yaml

  G-GATE-PATH-DISCIPLINE:
    name: Structured Path and Naming
    applies_to: [write, move]
    rule: |
      文件必须归属正确层级，文件名必须体现所属模块。
      policies/、standards/ 等目录下禁止散文件，必须归入子目录。
    priority: MEDIUM
    detail: policies/lep/path_discipline.yaml

  G-GATE-FILE-HIERARCHY:
    name: Global File Hierarchy Enforcement
    applies_to: [write, move]
    rule: 全局文件落盘必须遵循层级与组织规范，禁止散落路径
    priority: HIGH
    detail: policies/lep/file_hierarchy.yaml

  G-GATE-NONBLOCKING-CMDS:
    name: Non-blocking Runtime Commands
    applies_to: [read, log]
    rule: 禁止阻塞命令，长运行命令必须加 timeout
    priority: HIGH
    detail: policies/lep/nonblocking_cmds.yaml

  G-GATE-VERIFICATION:
    name: Code Verification
    applies_to: [write, git]
    rule: 代码必须编译通过 + 测试通过
    priority: HIGH
    detail: policies/lep/verification.yaml

  G-GATE-IPC-TARGET:
    name: IPC Target Validation
    applies_to: [ipc_send]
    rule: 发送 IPC 消息前必须确认目标 agent 存在
    priority: CRITICAL
    detail: policies/lep/ipc_target.yaml

  G-GATE-UNRECOVERABLE:
    name: Halt on Unrecoverable Error
    applies_to: [all]
    rule: 不可恢复错误立即停止
    priority: CRITICAL
    detail: policies/lep/unrecoverable.yaml

  G-GATE-SCOPE-DEVIATION:
    name: No Silent Scope Reduction
    applies_to: [write, delete, move, git]
    rule: 禁止静默缩减执行范围，偏差必须通知 PMO
    priority: HIGH
    detail: policies/lep/scope_deviation.yaml

  G-GATE-ID-PREFIX:
    name: Global ID Uniqueness and Prefix
    applies_to: [write]
    rule: |
      所有 YAML 中的 id 字段必须满足：
      1. 全局唯一——不得与 knowledge/registry/id_registry.yaml 中任何已有 ID 重复
      2. 必须携带域前缀——前缀分配见 id_registry.yaml 的 prefix_allocation
      3. 全大写 + 连字符分隔——如 G-GATE-NAWP、TP-ORCHESTRATOR-CLAUDE-SONNET
      4. 禁止无前缀裸 ID（如 "default"、"main"）
      5. 禁止小写或混合大小写 ID
    priority: HIGH
    registry: knowledge/registry/id_registry.yaml

# ============================================
# 领域定制 Gates — 特定角色/场景触发
# 完整定义见 policies/lep/index.yaml
# ============================================
domain_gates_ref: policies/lep/index.yaml
domain_gates_summary:
  database: [G-GATE-DB-MIGRATION, G-GATE-DB-BACKUP]
  docker: [G-GATE-DOCKER-STD, G-GATE-TOOL-CONVENTIONS]
  spec: [G-GATE-SPEC-SYNC, G-GATE-SPEC-LOCATION, G-GATE-FILE-ORG]
  agent: [G-GATE-AGENT-LIFECYCLE, G-GATE-SVC-ENCAP]
  upgrade: [G-GATE-VERSION-UPGRADE]
  memory: [G-GATE-MEMORY-TIMELINE, G-GATE-MEMORY-PERSIST]
  pmo: [G-GATE-APPROVAL-DELEGATION, G-GATE-DEFER]
  project: [G-GATE-TECH-STACK, G-GATE-BATCH-PARTIAL]
  coding: [G-GATE-CODE-STYLE]
  space: [G-GATE-PROJECT-REF, G-GATE-USERSPACE]
  audit: [G-GATE-AUDIT]
