gate_id: G-GATE-TECH-STACK
name: Technology Stack Enforcement
applies_to: [write]
rule: 操作必须符合项目 spec/constraints.yaml 中声明的技术栈
ref: spec/constraints.yaml

enforcement:
  stage: pre_tool_use
  method: python_inline
  priority: MEDIUM

  triggers:
    tools: [Write, Edit, Bash]

  rules:
    stack_compliance:
      description: "检查使用的技术栈是否符合项目约束"
      check_file: "spec/constraints.yaml"
      fields: [language, framework, database, runtime]
bindings:
  hooks:
    stage: pre_tool_use
    trigger_tools: [Write, Edit]
  mcp_tools: []
  related_skills: []
