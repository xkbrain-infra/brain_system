gate_id: G-GATE-ATOMIC
name: Atomic Plan
applies_to: [write, delete, move, git]
rule: Plan 必须原子化（具体到文件/行号/动作）

enforcement:
  stage: plan_mode
  method: plan_validator
  priority: HIGH
  note: "需要 Plan mode 集成 - 检查 Plan 内容"

  rules:
    atomic_requirements:
      - "Plan 必须包含具体的文件路径"
      - "Plan 必须包含具体的修改内容"
      - "Plan 必须包含验证步骤"
      - "Plan 不能有模糊描述（'等'、'之类'）"

  config:
    check_file_list: true
    check_action_details: true
    reject_vague_terms: true

  warn_message: |
    ⚠️ Plan 原子化要求 (G-ATOMIC)

    Plan 必须具体到文件级别：
    - ✅ 正确: "修改 /brain/base/spec/core/lep.yaml 第 100 行"
    - ❌ 错误: "修改一些配置文件"

    必须包含：
    1. 具体文件路径列表
    2. 每个文件的修改内容
    3. 验证步骤

    这是推荐性检查（需要 Plan mode 集成）。

    参考：/brain/base/spec/core/lep.yaml (G-ATOMIC)
bindings:
  hooks:
    stage: pre_tool_use
    trigger_tools: [Write, Edit, Bash]
  mcp_tools: []
  related_skills: []
