skill:
  id: "agent-coordination"
  name: "Agent Coordination"
  version: "1.0"
  category: "coordination"
  priority: "high"

  description: |
    Coordinate multi-agent execution using explicit scope, task cards,
    and verifiable handoffs. This skill references the base policy and
    workflow for governance and consistency.

  references:
    policy: "/brain/base/spec/policies/agent_coordination.yaml"
    workflow: "/brain/base/spec/workflows/meta/agent_coordination.yaml"
    patterns: "/brain/base/knowledge/patterns/agent_coordination.yaml"

inputs:
  goal:
    type: "string"
    required: true
    example: "Split a change into parallel sub-tasks and integrate results."

  ssot_path:
    type: "string"
    required: true
    example: "/brain/groups/<group>/projects/<project>/spec/spec"

  scope_paths:
    type: "list"
    required: true
    example:
      - "/brain/groups/<group>/projects/<project>/**"

  task_count:
    type: "int"
    required: false
    default: 3

outputs:
  task_board:
    type: "yaml"
    path: "memory/tasks/board.yaml"

  task_cards:
    type: "yaml"
    path: "memory/tasks/{task_id}.yaml"

  handoff_reports:
    type: "markdown"
    path: "memory/handoffs/{task_id}.md"

execution_flow:
  1_alignment:
    - "confirm goal and ssot_path"
    - "define scope_paths"
    - "record constraints and assumptions"

  2_planning:
    - "create task cards with inputs/outputs/acceptance"
    - "assign owners"
    - "record dependencies"

  3_execution:
    - "workers execute within scope_paths"
    - "each task produces a handoff report"

  4_integration:
    - "coordinator integrates outputs"
    - "resolve conflicts"
    - "update audit log"

  5_verification:
    - "run checks"
    - "record evidence"

templates:
  task_card: |
    task_id: "TASK-001"
    owner: "agent_name"
    scope_paths:
      - "path/to/allowed/dir/**"
    inputs:
      - "input artifact or location"
    outputs:
      - "expected output artifact"
    acceptance:
      - "observable pass condition"
    dependencies:
      - "TASK-000"
    risks:
      - "risk and mitigation"

  handoff_report: |
    Summary:
    Files changed:
    Tests run:
    Assumptions:
    Open questions:
    Next steps:

controls:
  scope_locking: true
  file_ownership: true
  approvals_required_for: ["write", "delete", "move", "git"]
  audit_log_path: "memory/logs/{date}/execution.log"
