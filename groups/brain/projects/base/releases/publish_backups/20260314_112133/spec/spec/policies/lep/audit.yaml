gate_id: G-GATE-AUDIT
name: Audit Trail
applies_to: ["*"]
rule: 所有操作记录到 JSONL 日志
format: jsonl
fields: [ts, agent, session, action, target, result]

enforcement:
  stage: all
  method: python_logger
  logger: audit_logger
  priority: LOW

  dual_write:
    hooks: /brain/runtime/logs/hooks_audit.jsonl
    global: /brain/runtime/logs/agents/global_agent_log_{date}.jsonl
    project: /brain/groups/{group}/projects/{project}/logs/{date}.jsonl

  log_fields:
    required: [timestamp, hook_event, tool_name, agent]
    optional: [tool_input, cwd, user, session, result]

  config:
    block_on_failure: false
    format: jsonl
    encoding: utf-8
    max_entry_size: 10240

  redact_fields:
    - password
    - token
    - secret
    - api_key
    - credential
bindings:
  hooks:
    stage: post_tool_use
    trigger_tools: [Write, Edit, Bash]
  mcp_tools: []
  related_skills: []
