# Brain Docker 部署全局配置
# 此文件为配置模板，定义所有可配置项及其默认值
#
# 使用方式：
# 1. 复制此文件为 .env 并修改值
# 2. Docker Compose 会自动加载同目录的 .env 文件
# 3. 多实例部署：每个实例使用独立的 COMPOSE_PROJECT_NAME

---
# ============================================
# 部署标识 (必填)
# ============================================
deployment:
  # 部署名称：影响容器名、网络名、卷名
  # 单实例默认: xk-agent-infra
  # 多实例示例: xk-agent-infra-01, xk-agent-infra-dev, xk-agent-infra-prod
  name: "xk-agent-infra"

  # 实例 ID：用于区分同一部署的多个实例
  # 可选，用于生成唯一标识
  instance_id: ""

  # 环境标识: development | staging | production
  environment: "development"

# ============================================
# 网络配置
# ============================================
network:
  # SSH 宿主机映射端口
  # 多实例时每个实例必须不同
  ssh_port: 8622

  # IPC Socket 路径（容器内）
  ipc_socket: "/tmp/brain_ipc.sock"

  # 网络名称后缀（自动计算，通常无需修改）
  # 完整网络名: ${DEPLOYMENT_NAME}-net
  name_suffix: "net"

# ============================================
# 身份认证
# ============================================
identity:
  # 默认登录用户
  default_user: "root"

  # 默认密码（仅备用，建议使用 SSH key）
  default_password: "aigroup"

  # 容器主机名
  # 默认自动计算，可覆盖
  hostname: ""

# ============================================
# 命名规范
# ============================================
naming:
  # 容器名称前缀
  # 完整容器名: ${PREFIX}${INSTANCE_ID} 如: XKAgentInfra, XKAgentInfra-dev
  container_prefix: "XKAgentInfra"

  # IPC Agent 名称前缀
  # 用于 brain 内部 agent 注册
  ipc_agent_prefix: "agent-brain"

  # Volume 名称后缀
  data_volume_suffix: "data"
  root_volume_suffix: "root"

# ============================================
# 路径配置（容器内）
# ============================================
paths:
  # Brain 根目录
  brain_root: "/xkagent_infra/brain"

  # Secrets 根目录
  secrets_root: "/xkagent_infra/brain/secrets/system"

  # SSH Secrets 目录
  ssh_secrets_dir: "/xkagent_infra/brain/secrets/system/ssh"

  # Host Keys 目录
  host_keys_dir: "/xkagent_infra/brain/secrets/system/ssh/host_keys"

  # Agent Auth 目录
  agent_auth_root: "/xkagent_infra/brain/secrets/system/agents/auth"

  # 用户 SSH 目录
  ssh_dir: "/root/.ssh"

# ============================================
# SSH 密钥配置
# ============================================
ssh:
  # Host key 类型（空格分隔）
  host_key_types: "rsa ecdsa ed25519"

  # Client key 类型
  client_key_type: "ed25519"

  # Client key 文件名
  client_key_name: "id_ed25519"

  # Key 注释格式
  # 可用变量: {hostname}, {date}, {deployment_name}
  key_comment_format: "xkagent-{hostname}-{date}"

# ============================================
# 日志与输出
# ============================================
logging:
  # 是否显示详细的 secrets 初始化日志
  verbose: "true"

  # 连接信息显示格式
  show_connection_info: "true"

# ============================================
# 多实例部署示例
# ============================================
# 实例 A (开发):
#   DEPLOYMENT_NAME=xk-agent-infra-dev
#   SSH_PORT=8622
#   INSTANCE_ID=dev
#
# 实例 B (测试):
#   DEPLOYMENT_NAME=xk-agent-infra-test
#   SSH_PORT=8623
#   INSTANCE_ID=test
#
# 实例 C (生产):
#   DEPLOYMENT_NAME=xk-agent-infra-prod
#   SSH_PORT=8624
#   INSTANCE_ID=prod
