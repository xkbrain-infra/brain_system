standard:
  id: "STD-INFRA-DEPLOYMENT"
  name: "Standard Deployment Protocol"
  version: "1.0"
  description: "Defines mandatory toolchains, environment strategies, and security protocols for deployment."

toolchain:
  docker:
    engine_min_version: "24.0"
    compose:
      version: "v2"
      command_preference: "docker compose"
      forbidden_commands: ["docker-compose"]
      rationale: "V1 is deprecated. V2 provides better integration and performance."
  ci_cd:
    runner_executor: "docker"
    default_image: "docker:24-dind"

environments:
  dev:
    strategy: "continuous_deployment"
    trigger: "push_to_develop"
    approval: "automatic"
  stage:
    strategy: "continuous_delivery"
    trigger: "push_to_release"
    approval: "automatic"
  prod:
    strategy: "release_deployment"
    trigger: "tag_or_merge_main"
    approval: "manual"

security:
  variables:
    naming_convention: "{ENV}_{SERVICE}_KEY"
    requirements:
      ssh_keys: ["protected", "masked"]
      ips: ["protected"]
  access_control:
    prod: "strict_access_logs_audit"
    dev: "developer_access"

rollback:
  strategy: "atomic_revert"
  steps:
    - "git_revert"
    - "docker_compose_up_force_recreate"

# 运行期操作标准（避免卡死/后台僵尸任务）
operations:
  logging_and_debugging:
    forbidden:
      - pattern: "docker exec * cat /proc/*/fd/*"
        reason: "可能无限阻塞/卡住 Agent；改用 docker logs --since 或容器内落盘日志。"
    preferred:
      - "docker logs --since 5m <container>"
      - "docker logs --tail 200 <container>"
      - "docker exec <container> sh -lc 'tail -n 200 /path/to/logfile'"
    long_running_commands:
      rule: "所有可能长时间运行的命令必须可终止（优先加 timeout），禁止无界运行。"
      examples:
        - "timeout 10s docker exec <container> <cmd>"
        - "timeout 15s redis-cli SUBSCRIBE <channel>"
        - "timeout 10s tail -f <file>"
    background_tasks:
      rule: "后台订阅/监控必须遵循 启动→等待→停止，避免遗留常驻后台进程。"
      required_steps: ["start", "wait_or_check", "stop"]
