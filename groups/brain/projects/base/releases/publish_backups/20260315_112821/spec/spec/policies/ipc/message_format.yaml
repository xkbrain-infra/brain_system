# IPC Message Format Policy
# 消息格式规范 - 统一前缀、结构、Telegram 同步

id: POLICY-IPC-FORMAT-001
version: "1.0"
created: "2026-02-06"
status: active

# ============================================================
# 消息前缀规范
# ============================================================
prefix:
  format: "[{agent_name}]"
  position: "消息开头"
  required: true

  examples:
    - "[architect] 我来设计这个方案"
    - "[devops] 部署已完成"
    - "[frontdesk] 收到用户请求: 查询订单状态"
    - "[codex] 代码审查完成，发现 2 个问题"

  agent_names:
    # 通用角色 (跨项目组)
    - architect: "系统架构师"
    - devops: "运维部署"
    - frontdesk: "前台接待"
    - codex: "代码专家"
    - coordinator: "协调者"

    # Brain System 组
    - brain_pmo: "Brain 项目管理"

    # XKQuant 组 (带项目组前缀)
    - xkquant_pmo: "XKQuant 项目管理"
    - xkquant_architect: "XKQuant 架构师"
    - xkquant_researcher: "XKQuant 研究员"
    - xkquant_trader: "XKQuant 交易"

  naming_rules:
    通用角色: "[role] - 如 [architect] [devops]"
    项目组角色: "[project_role] - 如 [xkquant_pmo] [brain_pmo]"
    说明: "带项目组前缀以区分不同组的同角色"

# ============================================================
# 消息结构规范
# ============================================================
message_structure:
  required_fields:
    - prefix: "[agent_name]"
    - content: "消息正文"

  optional_fields:
    - context: "上下文说明"
    - action_required: "需要对方做什么"
    - deadline: "截止时间"
    - reference: "相关文件/任务ID"

  templates:
    # 请求协助
    request:
      format: |
        [agent_name] {动作} {内容}

        背景: {简要上下文}
        需要: {具体请求}
        优先级: {priority}
      example: |
        [architect] 请求 review 数据库设计方案

        背景: 需要为 xkquant 新增历史行情存储
        需要: devops 评估存储方案可行性
        优先级: normal

    # 状态通知
    notification:
      format: "[agent_name] {状态}: {内容}"
      examples:
        - "[devops] 完成: webhook_gateway 已加入 supervisor"
        - "[architect] 进行中: 正在设计 IPC 消息规范"
        - "[frontdesk] 收到: 用户询问系统状态"

    # 问题/阻塞
    blocker:
      format: |
        [agent_name] 阻塞: {问题描述}

        影响: {影响范围}
        需要: {解决方案或请求}
      example: |
        [devops] 阻塞: Telegram API 返回 400 错误

        影响: 无法发送通知到 channel
        需要: 确认 bot 是否已加入 channel

    # 交接/汇报
    handoff:
      format: |
        [agent_name] 交接: {任务名}

        已完成: {完成项}
        待处理: {遗留项}
        下一步: {建议}

# ============================================================
# Telegram 同步规则
# ============================================================
telegram_sync:
  description: "IPC 消息同步到 Telegram 群组/频道，供人类监控"

  channels:
    system:
      name: "XKChannel.System"
      chat_id: -1003822521063
      sync_types: [critical, high, handoff, blocker]

    quant:
      name: "XKChannel-Quant"
      chat_id: -1003799530495
      sync_types: [xkquant_related, trading_signals]

  sync_rules:
    # 同步到 Telegram 的条件
    when_to_sync:
      - "priority = critical 或 high"
      - "消息类型为 blocker"
      - "消息类型为 handoff (重要交接)"
      - "人类明确请求关注的话题"
      - "跨项目组协作"

    # 不同步的情况
    when_not_to_sync:
      - "priority = low 的 FYI 消息"
      - "Agent 间的琐碎确认 (收到/OK/好的)"
      - "纯技术细节的内部讨论"
      - "调试/测试消息"

  format_for_telegram:
    description: "发送到 Telegram 时的格式"
    template: |
      {prefix} {content}

      #{priority} #{message_type}
    example: |
      [architect] 请求 review 数据库设计方案

      #normal #request

# ============================================================
# 使用示例
# ============================================================
usage_examples:
  ipc_send_with_prefix:
    description: "发送消息时带前缀"
    code: |
      ipc_send(
        to="devops",
        message="[architect] 请帮忙 review 部署配置\n\n背景: 新增了 webhook_gateway 服务\n需要: 确认 supervisor 配置正确",
        priority="normal"
      )

  good_examples:
    - "[devops] 完成: Redis 监控已配置"
    - "[architect] 提议: 统一使用 YAML 格式配置文件"
    - "[frontdesk] 转发: 用户 @xxx 询问订单状态"
    - "[codex] review: PR#123 有 2 处需要修改"

  bad_examples:
    - "帮我看下这个" # 缺少前缀，不知道谁发的
    - "[dev] xxx" # agent 名称不规范
    - "[DEVOPS] xxx" # 应该小写

# ============================================================
# 实现状态
# ============================================================
implementation:
  status: "specification"
  date: "2026-02-06"

  next_steps:
    - "所有 Agent 更新消息发送习惯"
    - "可选: 开发自动加前缀的 wrapper"
    - "可选: 开发 Telegram 同步服务"

# ============================================================
# 关联规范
# ============================================================
related:
  - /brain/base/spec/policies/ipc/priority.yaml
  - /brain/base/spec/policies/agents/agent_protocol.yaml
