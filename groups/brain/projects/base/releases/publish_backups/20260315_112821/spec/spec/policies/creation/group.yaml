  - "./project.yaml"                             # Project Space 创建
  - "/brain/groups/spec/index.yaml"              # Group 全局索引
  - "/brain/groups/spec/organization.yaml"       # 组织架构
  - "/brain/base/workflow/index.yaml"            # Base Workflow
