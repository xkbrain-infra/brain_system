gate_id: G-GATE-SCOP
name: Scope Locking
applies_to: [write, delete, move, git]
rule: 操作必须在允许的路径内
protected: /brain/base/**

enforcement:
  stage: pre_tool_use
  method: c_binary
  binary: lep_check
  priority: CRITICAL

  triggers:
    tools: [Write, Edit, Bash]
    check_type: protected

  protected_paths:
    - /brain/base/spec/core/
    - /brain/base/spec/schema/
    - /brain/INIT.yaml

  block_message: |
    🚫 保护路径禁止修改 (G-SCOP)
    路径: {file_path}
    保护原因: 核心配置文件

    请将修改写入 /xkagent_infra/runtime/update_brain/pending/<批次名>/base/... 对应路径，
    可多次修改，最后一次性提交给 brain-manager 合并发布。

    参考：/brain/base/spec/core/lep.yaml (G-GATE-SCOP)
bindings:
  hooks:
    stage: pre_tool_use
    trigger_tools: [Write, Edit, Bash]
  mcp_tools: []
  related_skills: []
