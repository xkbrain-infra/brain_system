# /brain/base/workflow/execution/dsl.yaml
# 三层实体流转 DSL: Task / Project / Group

workflow_dsl:
  id: "WF-DSL-001"
  version: "0.2"
  intent: "统一定义 Task/Project/Group 的工作流转与跨层触发"

common_contract:
  required_fields: [id, level, goal, owner, inputs, outputs, acceptance, status, updated_at]
  extended_fields: [deadline, assigned_at, overdue_count, priority]
  status_set: [BACKLOG, READY, ACTIVE, REVIEW, VERIFIED, DONE, BLOCKED, OVERDUE]
  blocking_reasons:
    - missing_input
    - missing_owner
    - failed_check
    - dependency_blocked
    - risk_unresolved
    - deadline_exceeded

levels:
  task:
    purpose: "最小执行单元"
    fields:
      required: [id, goal, owner, deadline, status]
      tracking: [assigned_at, started_at, completed_at, overdue_count]
    transitions:
      # 正常流程
      - "BACKLOG -> READY: 输入完整 + owner 已分配 + deadline 已约定"
      - "READY -> ACTIVE: 依赖满足 + scope 已锁定"
      - "ACTIVE -> REVIEW: agent 提交产物 + 主动回报 PMO"
      - "REVIEW -> VERIFIED: 评审通过"
      - "VERIFIED -> DONE: 验收通过"
      # 超期流程
      - "ACTIVE -> OVERDUE: deadline 到期且未完成 (PMO 自提醒触发)"
      - "OVERDUE -> ACTIVE: 重新约定 deadline (overdue_count++)"
      - "OVERDUE(count>=2) -> BLOCKED: 连续超期，PMO 升级处理"
      # 阻塞
      - "任意 -> BLOCKED: agent 上报阻塞 或 PMO 判定阻塞"
      - "BLOCKED -> READY: 阻塞解除，PMO 重新排期"
    outputs: [task_result, handoff_note, evidence]

  project:
    purpose: "目标交付单元，管理任务集合"
    states: [INTAKE, PLAN, DELIVERY, TESTING, INTEGRATION, ACCEPTANCE, RELEASED, BLOCKED]
    transitions:
      - "INTAKE -> PLAN: 目标与范围冻结 (S1-S2 完成)"
      - "PLAN -> DELIVERY: 任务分解完成 + 资源确认 (S3-S6 完成)"
      - "DELIVERY -> TESTING: 关键 Task 全部 DONE → 部署测试环境"
      - "TESTING -> INTEGRATION: 测试环境验证全部通过"
      - "INTEGRATION -> ACCEPTANCE: 生产环境部署 + 集成验证通过"
      - "ACCEPTANCE -> RELEASED: 干系人确认"
      - "任意 -> BLOCKED: 风险超阈值或关键任务阻塞"
    deployment:
      rule: "必须先测试环境，再生产环境，不可跳过"
      test_env:
        trigger: "所有关键 Task DONE"
        action: "部署到测试环境"
        verify: "自动化测试 + PMO 验证"
        on_fail: "回滚 + 创建修复 Task → 回到 DELIVERY"
      production:
        trigger: "测试环境验证全部通过"
        action: "部署到生产环境"
        verify: "冒烟测试 + PMO确认"
        on_fail: "回滚 + 创建修复 Task → 回到 TESTING"
    rules:
      - "Project 不直接执行细节，必须通过 Task 落地"
      - "Project 关闭前必须沉淀 evolution 与 knowledge"

  group:
    purpose: "组合治理单元，管理项目群"
    states: [PORTFOLIO_INTAKE, PRIORITIZED, EXECUTING, GOVERNANCE_REVIEW, STABLE]
    transitions:
      - "PORTFOLIO_INTAKE -> PRIORITIZED: PMO 评估需求 + 项目池排序"
      - "PRIORITIZED -> EXECUTING: 项目资源就绪 + agent 已分配"
      - "EXECUTING -> GOVERNANCE_REVIEW: 周期评审触发 或 风险升级"
      - "GOVERNANCE_REVIEW -> STABLE: 风险与偏差收敛"
      - "GOVERNANCE_REVIEW -> PRIORITIZED: 需要重排优先级"
    rules:
      - "Group 关注资源/优先级/风险，不替代 Project 执行"
      - "PMO 在 Group 层做资源调配与优先级仲裁"

cross_level_triggers:
  # 向下生成
  - event: "project.plan.approved"
    action: "spawn task backlog"
  # 向上升级
  - event: "task.overdue.repeated"
    action: "raise project risk + PMO 拉会讨论"
  - event: "task.blocked.escalated"
    action: "raise project risk"
  - event: "project.blocked.persisted"
    action: "raise group governance review"
  # 部署链
  - event: "project.delivery.complete"
    action: "trigger test_env deployment"
  - event: "project.testing.passed"
    action: "trigger production deployment"
  - event: "project.testing.failed"
    action: "rollback + spawn fix tasks → back to DELIVERY"
