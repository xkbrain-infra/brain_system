# Authentication Errors - 认证错误
# 认证失败、权限不足问题

category: "authentication_errors"
version: "1.0"
last_updated: "2026-01-17"

problems:
  - id: "AUTH-001"
    category: "authentication_errors"
    keywords: ["401", "unauthorized", "authentication"]
    error_patterns:
      - "401"
      - "Unauthorized"
      - "HTTPError: 401"
    description: "Authentication failed (HTTP 401)"

    solutions:
      - id: "AUTH-001-SOL-A"
        description: "HALT and notify user - requires credential update"
        confidence: "high"
        risk_level: "low"
        reversible: true
        auto_applicable: false

        steps:
          - "Log the 401 error"
          - "DO NOT retry with same credentials"
          - "Trigger G-UNRECOVERABLE-ERROR-HALT gate"
          - "Notify user to update credentials"

        expected_outcome: "User updates credentials"

  - id: "AUTH-002"
    category: "authentication_errors"
    keywords: ["403", "forbidden", "permission"]
    error_patterns:
      - "403"
      - "Forbidden"
      - "HTTPError: 403"
      - "PermissionError"
    description: "Permission denied (HTTP 403)"

    solutions:
      - id: "AUTH-002-SOL-A"
        description: "HALT and notify user - requires permission grant"
        confidence: "high"
        risk_level: "low"
        reversible: true
        auto_applicable: false

        steps:
          - "Log the 403 error with resource path"
          - "DO NOT retry"
          - "Trigger G-UNRECOVERABLE-ERROR-HALT gate"
          - "Notify user to grant permissions"

        expected_outcome: "User grants necessary permissions"
