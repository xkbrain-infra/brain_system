# Phase 4: PLANNING — 多 agent 协作产出项目计划
# 来源: workflow_core.yaml → meta.phase_files.planning
# steps: 4_1 (define_plan), 4_2 (create_spec_checklist)

# ═══════════════════════════════════════════════════════════════════════════════
# PHASE 4: PLANNING — 多 agent 协作产出项目计划
# ═══════════════════════════════════════════════════════════════════════════════
#
# 从这里开始，执行者是 sandbox 内的 project_orchestrator
# brain 侧角色只做 review / approval
#

  # ── 4.1 产出项目计划（多 agent 协作）────────────────────────────────────────
  - step_id: "MWF-OPC:4_1:define_plan"
    phase: planning
    who:
      coordinator: project_orchestrator
      profile: coordinator
      participants:
        - role: architect
          profile: architect
          responsibilities: ["技术选型", "架构设计", "模块划分", "接口定义", "复杂度估算"]
        - role: researcher
          profile: researcher
          responsibilities: ["技术方案调研", "最佳实践收集", "风险评估"]
        - role: qa
          profile: coder
          responsibilities: ["测试策略", "QA 验证链路", "质量门定义"]
      reviewer: brain_pmo
    purpose: "把需求和调研收敛成完整的项目计划"

    features:
      discussion_mode: true
      discussion_participants:
        - {role: architect, task: "起草技术方案和架构"}
        - {role: researcher, task: "补充调研结论和风险评估"}
        - {role: qa, task: "定义测试和质量策略"}
      human_approval_required: true    # plan 需要用户确认
      timeout_minutes: 60

    do:
      # ─── Round 1: Architect 起草 ───────────────────────────────────────────
      - action: "orchestrator 派发 planning task 给 architect"
        tool: "IPC TASK_ASSIGN → architect agent"
        task_packet:
          instruction: |
            基于 state/intake.yaml 和 state/research.yaml，起草项目计划:
              1. 技术选型: 语言、框架、runtime
              2. 架构设计: 整体架构、模块划分、接口边界
              3. 模块估算: 模块数、接口数、复杂度
              4. 里程碑定义: 阶段划分、时间估算
              5. 依赖分析: 外部依赖、模块间依赖
              6. 环境策略: dev/stage/prod 各层职责
          input_refs:
            - "state/intake.yaml"
            - "state/research.yaml"
          output_target: "state/plan_draft_v1.yaml"
        wait_for: "architect 完成并返回结果"

      # ─── Round 2: QA 补充测试策略 ─────────────────────────────────────────
      - action: "orchestrator 派发测试策略 task 给 QA"
        tool: "IPC TASK_ASSIGN → qa agent"
        task_packet:
          instruction: |
            基于 architect 的架构草案，定义:
              1. 测试策略: unit/integration/e2e/smoke 各层覆盖
              2. QA 验证链路: stage 验证 + prod smoke
              3. 质量门: 什么条件算通过
          input_refs:
            - "state/plan_draft_v1.yaml"
          output_target: "state/test_strategy_draft.yaml"
        wait_for: "qa 完成"

      # ─── Round 3: Orchestrator 整合 ───────────────────────────────────────
      - action: "orchestrator 整合所有输入，生成完整 project_plan"
        tool: "LLM reasoning + file_write"
        details: |
          整合 architect 草案 + QA 测试策略 + intake 约束，写完整计划:
            1. 补充: 交付目标、范围边界、非目标
            2. 补充: 角色分配、agent 策略
            3. 补充: task 设计原则（拆分粒度、packet 规则）
            4. 补充: 跟踪模型、报告节奏
            5. 补充: 风险和升级策略
            6. 补充: validation path (review → test → release → audit)
            7. 实例化 spec_checklist
        target: "state/project_plan.yaml"

      # ─── Round 4: Cross-review ─────────────────────────────────────────────
      - action: "architect review 完整计划的技术部分"
        tool: "IPC TASK_ASSIGN → architect"
        task_packet:
          instruction: "review state/project_plan.yaml 的技术选型、架构、接口部分，提出修改建议"
          output_target: "state/plan_review_architect.yaml"

      - action: "orchestrator 处理 review 意见，更新计划"
        tool: "LLM reasoning + file_write"
        target: "state/project_plan.yaml"

      # ─── Round 5: PMO 审批 ─────────────────────────────────────────────────
      - action: "发送给 brain_pmo 审批"
        tool: "IPC → brain_pmo"
        details: "PMO 审批范围、里程碑、资源假设。如果驳回，附修改要求，回到 Round 3"

    artifact: "state/project_plan.yaml"
    artifact_schema:
      project_id: string
      plan_version: string

      # 交付定义
      delivery_target: "complete | mvp (需审批)"
      scope_in: [string]
      scope_out: [string]
      non_goals: [string]
      deliverables: [{name: string, description: string, acceptance: string}]

      # 技术基线
      implementation_language: string
      runtime_stack: string
      engineering_standards: [string]

      # 架构
      architecture_summary: string
      modules: [{name: string, responsibility: string, interfaces: [string]}]
      complexity_estimate: {modules: int, interfaces: int, effort: string}

      # 里程碑
      milestones: [{id: string, name: string, deliverables: [string], acceptance: string}]
      execution_phases: [{phase: string, milestone_ids: [string]}]

      # 角色
      role_roster: [{role_key: string, count: int, agent_type: string, model: string}]

      # 环境与测试
      environment_plan: {dev: string, stage: string, prod: string}
      test_plan: {unit: string, integration: string, e2e: string, smoke: string}
      qa_plan: {stage_verification: string, prod_smoke: string}

      # 依赖
      external_dependencies: [{name: string, owner: string, status: string}]
      dependency_strategy: string
      parallelism_strategy: string

      # Task 设计原则
      task_design_rules:
        granularity: string
        packet_required_fields: [string]
        assignment_strategy: string
      task_packet_rules:
        required_inputs: [string]
        required_outputs: [string]
        done_definition_required: true
        evidence_required: true

      # 跟踪与验证
      tracking_plan: {snapshot_cadence: string, report_cadence: string}
      validation_path: {review: string, test: string, release: string, audit: string}
      risk_register: [{risk: string, severity: string, mitigation: string}]

      # Spec checklist
      spec_checklist_ref: "state/spec_checklist.yaml"

      # 决策
      planning_decision: "PASS | HOLD"

    check: |
      所有 required 字段非空 AND
      deliverables 至少 1 项 AND
      milestones 至少 1 项 AND
      test_plan 已定义 AND
      planning_decision=PASS
    on_success: "MWF-OPC:4_2:create_spec_checklist"
    on_retry: "PMO 驳回或 architect review 有重大修改 → 回到 Round 3"
    on_blocked: "关键技术决策无法达成 → escalate"

  # ── 4.2 实例化 Spec Checklist ──────────────────────────────────────────────
  - step_id: "MWF-OPC:4_2:create_spec_checklist"
    phase: planning
    who:
      executor: project_orchestrator
      profile: coordinator
    purpose: "把 project_plan 的 deliverables、milestones、validation_path 实例化为可追踪的 checklist"

    do:
      - action: "读取 project_plan.yaml，提取所有需要追踪的点"
        tool: "file_read state/project_plan.yaml"
        extract:
          - "每个 deliverable → 1 个 checklist item"
          - "每个 milestone → 1 个 checklist item"
          - "test_plan 的每个层级 → 1 个 checklist item"
          - "qa_plan 的 stage_verification + prod_smoke → 2 个 checklist item"
          - "validation_path 的 review/test/release/audit → 各 1 个 checklist item"
          - "engineering_standards 的关键项 → 各 1 个 checklist item"

      - action: "写 spec_checklist.yaml"
        tool: "file_write"
        target: "state/spec_checklist.yaml"
        details: |
          每个 item 的结构:
            id: "CHK-{seq:03d}"
            source: "来自 project_plan 的哪个字段"
            source_ref: "deliverables[0] | milestones[1] | test_plan.unit | ..."
            description: "需要验证的内容"
            completion_rule: "什么条件算完成"
            status: "pending | in_progress | done | waived | blocked"
            evidence_refs: []  # 完成时填写证据路径
            task_refs: []      # 对应的 task_id（task_modeling 后填写）
            waive_reason: ""   # 如果 waived，必须说明原因
            notes: ""

    artifact: "state/spec_checklist.yaml"
    artifact_schema:
      project_id: string
      plan_version: string
      created_at: "ISO8601"
      items:
        - id: "CHK-001"
          source: "deliverables | milestones | test_plan | qa_plan | validation_path | engineering_standards"
          source_ref: string
          description: string
          completion_rule: string
          status: "pending | in_progress | done | waived | blocked"
          evidence_refs: [string]
          task_refs: [string]
          waive_reason: string
      summary:
        total: int
        pending: int
        done: int
        coverage_percentage: int

    check: |
      items 非空 AND
      每个 deliverable 都有对应 checklist item AND
      每个 milestone 都有对应 checklist item AND
      summary.total > 0
    on_success: "MWF-OPC:5_1:model_tasks"
    on_retry: "checklist 不完整 → 补充遗漏项"
    on_blocked: "project_plan 不完整 → 回到 define_plan"


