task_manager_role:
  id: "MWF-TM-001"
  version: "0.2"
  intent: "定义 multicore 架构中 task manager 的职责、边界与输入输出"

positioning:
  role: "state_service"
  description: "task manager 是全局状态记录与查询服务，不是项目编排决策者"

responsibilities:
  - "持久化 project/task/assignment/status snapshot"
  - "记录 task participants、todo_list、dependencies、review chain"
  - "记录 task 状态变更历史和事件索引"
  - "记录 task progress 摘要与最近日志引用"
  - "记录 orchestrator 上报的 project snapshot"
  - "记录 agent/orchestrator heartbeat 与最后更新时间"
  - "为 manager board、watchdog、audit 提供查询面"

must_not:
  - "不负责拆 task graph"
  - "不负责决定 reassign/replan/escalate"
  - "不直接替代 orchestrator 向 worker 分配任务"

storage:
  backend: "SQLite"
  db_path: "/xkagent_infra/runtime/data/brain_shared.db"
  schema_ref: "brain/base/spec/standards/infra/database/brain_shared_schema.yaml"
  tables:
    - groups_tm_projects
    - groups_tm_tasks
    - groups_tm_assignments
    - groups_tm_dispatches
    - groups_tm_snapshots
    - groups_tm_events
  supplementary_jsonl:
    project_events: "groups/{group_id}/{project_id}/events.jsonl"
    dispatch_trace: "groups/{group_id}/{project_id}/dispatch.jsonl"
  naming_rule: "groups_{domain}_{entity}，必须含 group_id + project_id 列"
  concurrency: "optimistic locking via version column，UPDATE ... WHERE version = expected"

write_owners:
  orchestrator:
    writes:
      - "CREATE_PROJECT       → groups_tm_projects INSERT"
      - "TASK_CREATE          → groups_tm_tasks INSERT"
      - "TASK_UPDATE          → groups_tm_tasks UPDATE (with version CAS)"
      - "ASSIGNMENT_UPDATE    → groups_tm_assignments INSERT + groups_tm_tasks.owner_agent_id UPDATE"
      - "DISPATCH_CREATE      → groups_tm_dispatches INSERT"
      - "DISPATCH_UPDATE      → groups_tm_dispatches UPDATE"
      - "PROJECT_SNAPSHOT     → groups_tm_snapshots INSERT"
      - "TASK_EVENT_APPEND    → groups_tm_events INSERT + append JSONL"
  agents:
    writes_via_orchestrator: true
    note: "agent 原则上通过 orchestrator 回报，不直接写全局 task manager"

readers:
  - "project orchestrator"
  - "manager / PMO"
  - "release manager"
  - "audit orchestrator"
  - "watchdog jobs"

task_record_contract:
  table: "groups_tm_tasks"
  required_fields:
    - task_id
    - project_id
    - group_id
    - task_type       # workflow_task | execution_task
    - title
    - status
    - created_at
    - updated_at
    - version         # CAS 乐观锁，每次 UPDATE +1
  execution_task_fields:
    - stage           # intake/bootstrap/delivery/testing/release/audit
    - kind            # implementation/review/test/deploy/research/planning
    - priority
    - owner_agent_id
    - active_dispatch_id
    - depends_on      # JSON array
    - todo_list       # JSON array
    - deadline
  optional_fields:
    - review_by
    - artifact_refs
    - next_check_at
    - escalation_policy

assignment_model:
  principle: "assignment is decided by orchestrator, then persisted in task manager"
  flow:
    - "orchestrator prepares task and participant alignment"
    - "orchestrator writes assignment record to task manager"
    - "orchestrator emits TASK_ASSIGN to worker"
    - "worker accepts and reports back to orchestrator"
    - "orchestrator updates task manager with assignment and state change"

event_history:
  required_events:
    - task.created
    - task.assigned
    - task.accepted
    - task.active
    - task.blocked
    - task.review_requested
    - task.verified
    - task.done
    - task.failed
    - task.cancelled

closure_role:
  description: "audit findings materialized 为 follow-up task/project 后，必须回写 task manager 以重新进入执行链"
