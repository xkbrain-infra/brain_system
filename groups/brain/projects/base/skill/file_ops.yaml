skill:
  id: "SKILL-FILE-OPS"
  name: "File Operations"
  version: "1.0"
  description: "Basic file system manipulation capabilities."

actions:
  - name: "read_file"
    description: "Read content of a file."
    parameters:
      type: "object"
      required: ["path"]
      properties:
        path: { type: "string" }
  
  - name: "write_file"
    description: "Write content to a file."
    parameters:
      type: "object"
      required: ["path", "content"]
      properties:
        path: { type: "string" }
        content: { type: "string" }

  - name: "list_dir"
    description: "List directory contents."
    parameters:
      type: "object"
      required: ["path"]
      properties:
        path: { type: "string" }
