gate_id: G-GATE-SCOP
name: Scope Locking
applies_to: [write, delete, move, git]
rule: 操作必须在允许的路径内
protected: /brain/**

enforcement:
  stage: pre_tool_use
  method: c_binary
  binary: lep_check
  priority: CRITICAL

  triggers:
    tools: [Write, Edit, Bash]
    check_type: protected

  protected_paths:
    - /brain/
    - /xkagent_infra/brain/

  block_message: |
    🚫 /brain/ 是发布态，禁止直接修改 (G-GATE-SCOP)
    路径: {file_path}

    /brain/** 只能通过发布流程写入，不是开发工作区。

    根据路径选择正确流程：

    ▸ 修改 skill（.claude/skills/**）：
      source 在 groups/brain/projects/base/skill/<name>/SKILL.md
      发布：/brain-publish skill → /brain-publish agents
      参考：/brain/base/spec/policies/deployment/base_publish.yaml

    ▸ 修改 brain/base 其他内容（spec/hooks/workflow 等）：
      走 pending 流程：
      1. 创建 /xkagent_infra/runtime/update_brain/pending/<YYYYMMDD_描述>/base/
      2. 按 groups/brain/projects/base/ 目录结构放置文件 + 编写 CHANGELOG.md
      3. 提交 PMO 审批，由 brain-manager 合并到 source 再 publish
      参考：/brain/base/spec/policies/deployment/pending_workflow.yaml

    ▸ 修改 infrastructure service：
      source 在 groups/brain/projects/infrastructure/<service>/
      通过 /brain-publish 选择该 service 的 Makefile 发布入口
      参考：/xkagent_infra/groups/brain/spec/deployment/release_process.yaml
bindings:
  hooks:
    stage: pre_tool_use
    trigger_tools: [Write, Edit, Bash]
  mcp_tools: []
  related_skills: []
