# /brain/base/evolution/index.yaml
# Evolution — 系统的"前额叶"，下一版本的设计引擎

# 快速查找文档
registry:
  file: /brain/base/evolution/registry.yaml
  total_documents: 2
  categories: [CORE]
  keywords: 5
  usage: "quick_lookup['cycle'] → G-EVO-CORE-CYCLE"

evolution_index:
  id: "EVO-BASE-INDEX"
  version: "0.2"
  last_updated: "2026-02-14"
  role: "回答：我们下一步应该进化成什么？"

# ============================================
# 四域循环哲学
# ============================================
four_domain_cycle:
  description: |
    SPEC    → 当前世界是什么 (规则、结构、约束)
    WORKFLOW → 当前世界如何运转 (流程、状态机、事件链)
    KNOWLEDGE→ 过去经验是什么 (故障案例、可复用认知)
    EVOLUTION→ 下一世界是什么 (演进方向、升级提案)
  flow: "SPEC → WORKFLOW → KNOWLEDGE → EVOLUTION → (新 spec)"
  rule: "Evolution 的产出不直接修改现有系统，而是输出 Upgrade Proposal 进入下一轮 spec"

# ============================================
# 定位与边界
# ============================================
scope:
  is:
    - "当前能力评估"
    - "架构改进建议"
    - "能力扩展建议"
    - "自动化机会识别"
    - "升级提案 (Upgrade Proposal) 输出"
  is_not:
    - "直接执行变更（那是 WORKFLOW 的事）"
    - "直接修改 spec（提案需经审批后才纳入）"
    - "单一 agent 的独断（必须多 agent 协同评估）"

# ============================================
# 关键原则
# ============================================
principles:
  - id: "EVO-P1"
    name: "周期性触发"
    rule: "Evolution 必须周期性触发，不能只靠人想起来才做"

  - id: "EVO-P2"
    name: "多 Agent 协同"
    rule: "Evolution 不是单人部门，是多 Agent 协同评估模式"

  - id: "EVO-P3"
    name: "PMO 无升级独裁权"
    rule: "PMO 发起和协调 Evolution，但不能单方面决定升级内容"

  - id: "EVO-P4"
    name: "Architect 无节制重构限制"
    rule: "Architect 的改进建议必须经成本评估和优先级排序，不可无限重构"

  - id: "EVO-P5"
    name: "不直接执行"
    rule: "Evolution 只输出提案，不直接修改系统。提案审批后进入下一轮 spec → WORKFLOW"

  - id: "EVO-P6"
    name: "影响下一版 spec"
    rule: "被采纳的 Upgrade Proposal 由 PMO 纳入下一轮 spec，走正常 spec design workflow (S1-S8)"

# ============================================
# 加载顺序
# ============================================
load_sequence:
  1: "cycle.yaml       # 演进评估周期：触发条件 + 多 Agent 协同流程"
  2: "proposal.yaml    # Upgrade Proposal schema + 生命周期"

quick_ref:
  演进周期: "/brain/base/evolution/cycle.yaml"
  升级提案: "/brain/base/evolution/proposal.yaml"
