      resolution: "copilot → providers.yaml 字段；openai/gemini → token_file；api_key → providers.yaml key_value 字段"
    - id: Q4
      question: "gemini callback 端口"
      resolution: "统一使用 dashboard 8080 端口 /oauth2callback，动态覆盖 redirect_uri"

