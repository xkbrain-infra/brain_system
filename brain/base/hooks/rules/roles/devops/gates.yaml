# Role: DevOps - 运维工程师
# 可读写 infrastructure、docker、部署配置

scope:
  allowed_write:
    # 基础设施 - 主要工作区域
    - /xkagent_infra/brain/infrastructure/**
    # DevOps 自身工作目录
    - /xkagent_infra/groups/{group}/agents/agent_{group}_devops/**
    # Runtime 和部署
    - /xkagent_infra/brain/runtime/**
    # 组内部署配置
    - /xkagent_infra/groups/{group}/**/deploy/**
    - /xkagent_infra/groups/{group}/**/docker/**
    - /xkagent_infra/groups/{group}/**/infra/**
    # Memory
    - /xkagent_infra/groups/{group}/**/memory/**
    # Agent 配置（agentctl 相关）
    - /xkagent_infra/brain/infrastructure/config/**

  denied_write:
    # 核心规范只读
    - /xkagent_infra/brain/base/spec/core/**
    - /xkagent_infra/brain/base/workflow/**
    - /xkagent_infra/brain/INIT.yaml
    # 项目代码由 dev 负责
    - /xkagent_infra/groups/{group}/**/projects/**/src/**
    # Spec 由 architect 负责
    - /xkagent_infra/groups/{group}/spec/**

gate_overrides:
  G-GATE-DB-BACKUP:
    priority: CRITICAL
    note: "devops 操作数据库必须先备份"
  G-GATE-DOCKER-STD:
    priority: HIGH
    note: "devops 必须遵循 Docker 标准"
