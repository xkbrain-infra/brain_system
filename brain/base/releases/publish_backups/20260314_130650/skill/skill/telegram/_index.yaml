# Telegram Integration Index
# Telegram Bot 集成规范索引

integration_index:
  id: "INT-TELEGRAM-BOT"
  version: "1.0"
  name: "Telegram Bot Integration"
  status: "active"
  last_updated: "2026-01-17"

  description: |
    Agent 通过 Telegram Bot 与用户交互的集成规范。
    基于 agent_approval_gateway 服务实现。

  files:
    api:
      file: "api.yaml"
      description: "API endpoints, authentication, security, error handling"
      sections:
        - "Service configuration"
        - "Endpoints (send_message, send_approval_request, send_notification)"
        - "Timeout handling & retry policy"
        - "Security & authentication"
        - "Error handling"
        - "Testing & verification"

    templates:
      file: "templates.yaml"
      description: "Message formatting, markdown, emoji, button interactions"
      sections:
        - "Markdown syntax"
        - "Emoji usage"
        - "Message structure"
        - "Button interactions"
        - "Response format"

    examples:
      file: "examples.yaml"
      description: "Usage examples and migration notes"
      sections:
        - "Scenario 1: Scope deviation notification"
        - "Scenario 2: Retry exhausted notification"
        - "Scenario 3: Progress notification"
        - "Migration from manual notification"

  quick_reference:
    send_notification: "api.yaml#send_notification"
    send_approval: "api.yaml#send_approval_request"
    message_format: "templates.yaml#message_formatting"
    buttons: "templates.yaml#button_interactions"
    examples: "examples.yaml#usage_examples"

  service_info:
    name: "agent_approval_gateway"
    location: "/brain/groups/brain_system_group/projects/agent_approval_gateway"
    type: "telegram_bot"

metadata:
  maintainer: "Brain System"
  related_projects:
    - "/brain/groups/brain_system_group/projects/agent_approval_gateway"
