# Phase 5: EXECUTION — dispatch / collect / review / test / rework 循环
# 来源: workflow_core.yaml → meta.phase_files.execution
# steps: 5_1 (dispatch_ready_tasks), 5_2 (collect_results),
#         5_2b (dispatch_review), 5_3 (resolve_blocker),
#         5_4 (evaluate_release_readiness)
# 含: task_timeout_policy

# ═══════════════════════════════════════════════════════════════════════════════
# PHASE 5: EXECUTION — dispatch / collect / review / test / rework 循环
# ═══════════════════════════════════════════════════════════════════════════════
#
# 这是一个循环，不是单次执行。
# orchestrator 在 dispatch → collect → evaluate 之间不断循环。
#
# ── 超时和心跳监控机制 ──────────────────────────────────────────────────────
#
# 问题: orchestrator 是被动等 IPC 的，如果 worker 挂了不回报怎么办？
# 解决: agentctl 基础设施层负责 heartbeat，orchestrator 处理离线事件。
#
# 工作流程:
#   1. agentctl 每 30s 检测所有 registered agent 的 tmux session 存活
#   2. agent 连续 2 次 heartbeat 失败 → agentctl 标记为 offline
#   3. agentctl 通过 IPC 发送 AGENT_OFFLINE 事件给 orchestrator
#   4. orchestrator 收到 AGENT_OFFLINE → 进入 resolve_blocker
#
# 此外 orchestrator 在 collect_results 中设置 per-task 超时:
#   - dispatch 时记录 dispatched_at timestamp
#   - collect 时检查: now - dispatched_at > task_timeout → 视为超时
#   - 超时处理: 先检查 agent 状态，再决定重发或换 agent
#
task_timeout_policy:
  default_timeout_minutes: 60        # 单个 task 默认超时
  timeout_overrides:                 # 按 task.kind 覆盖
    implementation: 90
    review: 30
    test: 45
    research: 120
    deploy: 60
  on_timeout:
    1: "通过 agentctl 检查 agent 状态: agentctl status {agent_id}"
    2: "如果 agent online → IPC ping，等待 30s 回复"
    3: "如果 agent offline 或无回复 → 标记 task 为 timed_out"
    4: "timed_out 处理: 进入 resolve_blocker (category: retryable 或 reassignable)"
  heartbeat_source: "agentctl (基础设施层)"
  heartbeat_interval: 30s
  offline_threshold: "连续 2 次 heartbeat 失败 (60s)"
  offline_event: "AGENT_OFFLINE via IPC → orchestrator"

  # ── 5.1 派发任务 ───────────────────────────────────────────────────────────
  - step_id: "MWF-OPC:5_1:dispatch_ready_tasks"
    phase: execution
    who:
      executor: project_orchestrator
      profile: coordinator
    purpose: "从 READY set 中选择 task，派发给 worker agents"

    features:
      parallel_dispatch: true       # 执行阶段允许并行
      timeout_minutes: 60

    # ── LOOP 说明 ──────────────────────────────────────────────────────────────
    # 5_execution 是循环 phase。TASK_UPDATE 在每次循环迭代时重设状态:
    #   每次进入某步 → TASK_UPDATE(status=in_progress)
    #   每次该步完成当次工作并转移到下一步 → TASK_UPDATE(status=completed)
    # 这允许 task_manager 实时反映哪个步骤正在执行，brain PMO 可监控循环进度。
    # 唯一例外: 5_4 evaluate_release_readiness 在 on_retry（未达标，回到 5_1）时
    # 不调用 completed，仅在最终 release_ready=true 时调用 completed。
    # spec stage 在整个 execution phase 期间保持 S6_tasks 不变。

    do:
      - action: "TASK_UPDATE: in_progress"
        action_id: "MWF-OPC:5_1:dispatch_ready_tasks:A01"
        tool: "task_manager API"
        call: |
          event_type: TASK_UPDATE
          task_id:    "MWF-OPC:5_1:dispatch_ready_tasks"
          status:     in_progress
        note: "每次循环迭代进入本步时更新（覆盖上一次的状态）"

      - action: "读取当前 task_graph，计算 READY set"
        action_id: "MWF-OPC:5_1:dispatch_ready_tasks:A02"
        tool: "file_read state/task_graph.yaml + 当前 task 状态"
        details: "READY = 依赖全部 DONE + packet 字段完整 + 无 conflict_key 冲突"

      - action: "对每个 READY task，匹配 worker agent"
        action_id: "MWF-OPC:5_1:dispatch_ready_tasks:A03"
        tool: "LLM reasoning"
        details: |
          task.owner = dev_api → 找 agent roster 中 role=dev_api 的 agent
          task.owner = qa → 找 role=qa 的 agent
          如果 agent 已有活跃 task → 排队或选其他 slot

      - action: "持久化 assignment（先写后发）"
        action_id: "MWF-OPC:5_1:dispatch_ready_tasks:A04"
        tool: "file_write"
        target: "state/dispatch_log.yaml (追加)"

      - action: "发送 task packet 给 worker"
        action_id: "MWF-OPC:5_1:dispatch_ready_tasks:A05"
        tool: "IPC TASK_ASSIGN → {worker_agent_id}"
        payload: |
          task_id, title, objective,
          input_refs, completion_checks, output_contract,
          evidence_required, handoff_payload
        expect_reply: "TASK_ACCEPT 或 TASK_BLOCKED (timeout: 30s)"

      - action: "更新 task 状态 READY → ACTIVE"
        action_id: "MWF-OPC:5_1:dispatch_ready_tasks:A06"
        tool: "file_write / task_manager API"
        details: |
          同时记录 dispatched_at: {ISO8601} 到 task_graph 中该 task
          用于 collect_results 阶段的超时检测

      - action: "cross_model_validation: 验证本轮 dispatch 完整性"
        action_id: "MWF-OPC:5_1:dispatch_ready_tasks:A07"
        type: "cross_model_validation"
        strategy_ref: "workflow_core.yaml → audit_strategy.cross_model_validation"
        note: "循环步骤，每轮 dispatch 后执行一次验证"
        execution_flow:
          "1_write_request":
            path: "{project_root}/state/step_results/MWF-OPC_5_1_dispatch_ready_tasks/validation_request.yaml"
            content:
              step_id: "MWF-OPC:5_1:dispatch_ready_tasks"
              validator_model_rule: "不同于 orchestrator 当前模型"
              artifact: "state/dispatch_log.yaml (本轮新增条目)"
              check_items:
                - {id: "CHK-01", type: "file_exists",  target: "state/dispatch_log.yaml"}
                - {id: "CHK-02", type: "batch_check",  target: "本轮 dispatch 的条目",
                   assert: "每个 dispatched task 在 dispatch_log 中都有对应条目"}
                - {id: "CHK-03", type: "items_check",  target: "本轮 dispatch_log entries[*].dispatched_at",
                   assert: "非空（ISO8601 时间戳）"}
                - {id: "CHK-04", type: "cross_file",
                   source: "state/task_graph.yaml",
                   rule: "本轮 dispatch 的 task_id 在 task_graph 中状态已从 READY → ACTIVE"}
          "2_spawn_validator":
            command: |
              # 从 {validator_model} 拆出 <provider> / <model_name> 后创建 validator。
              agentctl add {validator_agent_id} --group {group_id} --role step_validator \
                --agent-type <provider> --model <model_name> \
                --scope project --project {project_id} --sandbox-id {sandbox_id} \
                --desired-state stopped --apply
              agentctl start {validator_agent_id} --apply
            note: "validator_model 由 model_selection 规则确定，与 orchestrator 不同；完成验证后由 orchestrator 执行 agentctl purge {validator_agent_id} --apply --force"
          "3_wait_result":
            wait_for: "IPC: VALIDATE_COMPLETE"
            timeout: "120s"
            on_timeout: "fallback → same_model_isolated (见 workflow_core.yaml)"
          "4_write_completion_check":
            path: "{project_root}/state/step_results/MWF-OPC_5_1_dispatch_ready_tasks/completion_check.yaml"
        on_fail:
          action: "TASK_UPDATE(blocked) + IPC notify brain_pmo"
          payload: "completion_check.yaml path + failed check_items"

      - action: "TASK_UPDATE: completed"
        action_id: "MWF-OPC:5_1:dispatch_ready_tasks:A08"
        tool: "task_manager API"
        call: |
          event_type: TASK_UPDATE
          task_id:    "MWF-OPC:5_1:dispatch_ready_tasks"
          status:     completed
        note: "spec stage 保持 S6_tasks；execution phase 循环中不推进 spec stage"

    artifact: "state/dispatch_log.yaml (追加)"
    check: "所有选中的 task 已从 READY → ACTIVE；assignment 已落盘"
    on_success: "MWF-OPC:5_2:collect_results"
    on_retry: "worker 未响应 → 重发或换 agent"
    on_blocked: |
      所有 READY task 都被阻断 → resolve_blocker (5_3)
      注: 进入 5_3 前不调用 TASK_UPDATE(blocked)，5_3 自行调用 in_progress

  # ── 5.2 收集结果 ───────────────────────────────────────────────────────────
  - step_id: "MWF-OPC:5_2:collect_results"
    phase: execution
    who:
      executor: project_orchestrator
      profile: coordinator
    purpose: "收集 worker 回报，验证 output contract，推进 task 状态"

    do:
      - action: "TASK_UPDATE: in_progress"
        action_id: "MWF-OPC:5_2:collect_results:A01"
        tool: "task_manager API"
        call: |
          event_type: TASK_UPDATE
          task_id:    "MWF-OPC:5_2:collect_results"
          status:     in_progress

      - action: "等待 worker 完成回报"
        action_id: "MWF-OPC:5_2:collect_results:A02"
        tool: "IPC 接收 TASK_COMPLETE / TASK_FAILED / TASK_BLOCKED / AGENT_OFFLINE"
        details: |
          同时检查 task 超时:
            遍历所有 ACTIVE task:
              如果 now - task.dispatched_at > task_timeout_policy.{task.kind}:
                → 执行 on_timeout 流程 (检查 agent → ping → 标记 timed_out)
          如果收到 AGENT_OFFLINE 事件:
            → 将该 agent 所有 ACTIVE task 标记为 orphaned
            → 进入 resolve_blocker (category: reassignable)

      - action: "验证 output contract"
        action_id: "MWF-OPC:5_2:collect_results:A03"
        tool: "LLM reasoning + file_read"
        checks:
          - "completion_checks 是否全部满足"
          - "evidence_required 是否都有对应 artifact"
          - "output_contract 的 changed_paths/reports 是否存在"

      - action: "决定 task 下一步状态"
        action_id: "MWF-OPC:5_2:collect_results:A04"
        tool: "LLM reasoning"
        details: |
          output 完整 + 需要 review → ACTIVE → REVIEW, 进入 dispatch_review step
          output 完整 + 不需 review → ACTIVE → VERIFIED → DONE
          output 不完整 → ACTIVE → ACTIVE (need_retry, 说明缺什么)
          worker 报告 FAILED → ACTIVE → FAILED, 进入 resolve_blocker

      - action: "更新 task 状态、checklist、milestone"
        action_id: "MWF-OPC:5_2:collect_results:A05"
        tool: "file_write / task_manager API"

      - action: "重算 READY set（依赖变化可能解锁新 task）"
        action_id: "MWF-OPC:5_2:collect_results:A06"
        tool: "LLM reasoning + file_write"

      - action: "分类已完成 task: 标记哪些需要 review、哪些直接 DONE"
        action_id: "MWF-OPC:5_2:collect_results:A07"
        tool: "file_write"
        target: "state/collect_batch.yaml"
        details: |
          pending_reviews: [task_id]      # 需要进入 dispatch_review
          direct_done: [task_id]          # 不需 review，直接 DONE
          need_retry: [task_id]           # 需要重试
          failed: [task_id]              # 失败，需要 resolve_blocker

      - action: "cross_model_validation: 验证 collect_batch 处理完整性"
        action_id: "MWF-OPC:5_2:collect_results:A08"
        type: "cross_model_validation"
        strategy_ref: "workflow_core.yaml → audit_strategy.cross_model_validation"
        note: "循环步骤，每轮收集结束后验证"
        execution_flow:
          "1_write_request":
            path: "{project_root}/state/step_results/MWF-OPC_5_2_collect_results/validation_request.yaml"
            content:
              step_id: "MWF-OPC:5_2:collect_results"
              validator_model_rule: "不同于 orchestrator 当前模型"
              artifact: "state/collect_batch.yaml + state/task_graph.yaml"
              check_items:
                - {id: "CHK-01", type: "file_exists",  target: "state/collect_batch.yaml"}
                - {id: "CHK-02", type: "field_assert", field: "pending_reviews",  assert: "字段存在（可为空数组）"}
                - {id: "CHK-03", type: "field_assert", field: "direct_done",      assert: "字段存在（可为空数组）"}
                - {id: "CHK-04", type: "field_assert", field: "need_retry",       assert: "字段存在（可为空数组）"}
                - {id: "CHK-05", type: "field_assert", field: "failed",           assert: "字段存在（可为空数组）"}
                - {id: "CHK-06", type: "cross_file",
                   source: "state/task_graph.yaml",
                   rule: "本轮收到 TASK_COMPLETE 的 task_id 在 task_graph 中状态已更新（非 ACTIVE）"}
                - {id: "CHK-07", type: "cross_file",
                   source: "state/task_graph.yaml",
                   rule: "collect_batch 的 failed[] 在 task_graph 中标记为 FAILED"}
          "2_spawn_validator":
            command: |
              # 从 {validator_model} 拆出 <provider> / <model_name> 后创建 validator。
              agentctl add {validator_agent_id} --group {group_id} --role step_validator \
                --agent-type <provider> --model <model_name> \
                --scope project --project {project_id} --sandbox-id {sandbox_id} \
                --desired-state stopped --apply
              agentctl start {validator_agent_id} --apply
            note: "validator_model 由 model_selection 规则确定，与 orchestrator 不同；完成验证后由 orchestrator 执行 agentctl purge {validator_agent_id} --apply --force"
          "3_wait_result":
            wait_for: "IPC: VALIDATE_COMPLETE"
            timeout: "120s"
            on_timeout: "fallback → same_model_isolated (见 workflow_core.yaml)"
          "4_write_completion_check":
            path: "{project_root}/state/step_results/MWF-OPC_5_2_collect_results/completion_check.yaml"
        on_fail:
          action: "TASK_UPDATE(blocked) + IPC notify brain_pmo"
          payload: "completion_check.yaml path + failed check_items"

      - action: "TASK_UPDATE: completed"
        action_id: "MWF-OPC:5_2:collect_results:A09"
        tool: "task_manager API"
        call: |
          event_type: TASK_UPDATE
          task_id:    "MWF-OPC:5_2:collect_results"
          status:     completed

    artifact: "state/task_graph.yaml (更新状态) + state/collect_batch.yaml"
    check: "所有已收到的 report 已处理；task 状态已更新"
    on_success: "MWF-OPC:5_2b:dispatch_review"
    on_retry: "部分 report 未处理 → 继续收集"
    on_blocked: "worker 离线或关键 task FAILED → resolve_blocker"

  # ── 5.2b 派发 review ─────────────────────────────────────────────────────────
  - step_id: "MWF-OPC:5_2b:dispatch_review"
    phase: execution
    who:
      executor: project_orchestrator
      profile: coordinator
    purpose: "对 collect_results 标记为需要 review 的 task，派发 review task 给 reviewer/qa"

    do:
      - action: "TASK_UPDATE: in_progress"
        action_id: "MWF-OPC:5_2b:dispatch_review:A01"
        tool: "task_manager API"
        call: |
          event_type: TASK_UPDATE
          task_id:    "MWF-OPC:5_2b:dispatch_review"
          status:     in_progress

      - action: "读取 collect_batch.yaml 的 pending_reviews"
        action_id: "MWF-OPC:5_2b:dispatch_review:A02"
        tool: "file_read state/collect_batch.yaml"
        skip_if: "pending_reviews 为空 → 直接 success，跳到 evaluate_release_readiness"

      - action: "为每个 pending_review task 构造 review task packet"
        action_id: "MWF-OPC:5_2b:dispatch_review:A03"
        tool: "LLM reasoning"
        details: |
          对每个需要 review 的 task:
            1. 读取原始 task 的 completion_checks 和 output_contract
            2. 读取 worker 提交的 artifact_refs 和 evidence
            3. 确定 reviewer: task.review_by 指定的 role → 匹配 agent roster
            4. 构造 review_checklist:
               - 代码质量 (如果是 implementation task)
               - 功能正确性 (对照 completion_checks)
               - evidence 完整性 (对照 evidence_required)
               - 架构合规 (如果 task 涉及架构变更)

      - action: "持久化 review assignment（先写后发）"
        action_id: "MWF-OPC:5_2b:dispatch_review:A04"
        tool: "file_write"
        target: "state/dispatch_log.yaml (追加)"

      - action: "发送 review task 给 reviewer"
        action_id: "MWF-OPC:5_2b:dispatch_review:A05"
        tool: "IPC TASK_ASSIGN → {reviewer_agent_id}"
        payload: |
          message_type: TASK_ASSIGN
          task_id: "{original_task_id}-REVIEW"
          payload:
            review_mode: true
            original_task_id: "{original_task_id}"
            original_task: {title, objective}
            artifact_refs: [worker 提交的文件路径]
            review_checklist: [检查维度]
            completion_checks: [原始 task 的验收标准]
        expect_reply: "TASK_ACCEPT (timeout: 30s)"

      - action: "等待 reviewer 返回 REVIEW_COMPLETE"
        action_id: "MWF-OPC:5_2b:dispatch_review:A06"
        tool: "IPC 接收 REVIEW_COMPLETE"
        details: |
          收到 REVIEW_COMPLETE 后:
            decision=approve → task REVIEW → VERIFIED → DONE, 更新 checklist evidence
            decision=reject → task REVIEW → ACTIVE (rework),
              创建 rework task: 原 worker 接收 review_findings 修复
              rework task 的 input_refs 包含 review_findings
              rework_round += 1
              如果 rework_round > max_rework_rounds(3) → escalate

      - action: "更新 task 状态和 dispatch_log"
        action_id: "MWF-OPC:5_2b:dispatch_review:A07"
        tool: "file_write / task_manager API"

      - action: "cross_model_validation: 验证本轮 review 处理完整性"
        action_id: "MWF-OPC:5_2b:dispatch_review:A08"
        type: "cross_model_validation"
        strategy_ref: "workflow_core.yaml → audit_strategy.cross_model_validation"
        note: "循环步骤，每轮 review 结束后验证"
        execution_flow:
          "1_write_request":
            path: "{project_root}/state/step_results/MWF-OPC_5_2b_dispatch_review/validation_request.yaml"
            content:
              step_id: "MWF-OPC:5_2b:dispatch_review"
              validator_model_rule: "不同于 orchestrator 当前模型"
              artifact: "state/dispatch_log.yaml (review 条目)"
              check_items:
                - {id: "CHK-01", type: "batch_check",  target: "本轮 pending_reviews",
                   assert: "每个 pending_review task 在 dispatch_log 中都有 review dispatch 条目"}
                - {id: "CHK-02", type: "items_check",  target: "本轮 review dispatch_log entries[*].review_decision",
                   assert: "in [approve, reject, pending]（字段已填写）"}
                - {id: "CHK-03", type: "cross_file",
                   source: "state/task_graph.yaml",
                   rule: "review_decision=approve 的 task 在 task_graph 中状态 == VERIFIED"}
                - {id: "CHK-04", type: "cross_file",
                   source: "state/task_graph.yaml",
                   rule: "review_decision=reject 的 task 在 task_graph 中有对应 rework task 创建，且 rework_round 已更新"}
          "2_spawn_validator":
            command: |
              # 从 {validator_model} 拆出 <provider> / <model_name> 后创建 validator。
              agentctl add {validator_agent_id} --group {group_id} --role step_validator \
                --agent-type <provider> --model <model_name> \
                --scope project --project {project_id} --sandbox-id {sandbox_id} \
                --desired-state stopped --apply
              agentctl start {validator_agent_id} --apply
            note: "validator_model 由 model_selection 规则确定，与 orchestrator 不同；完成验证后由 orchestrator 执行 agentctl purge {validator_agent_id} --apply --force"
          "3_wait_result":
            wait_for: "IPC: VALIDATE_COMPLETE"
            timeout: "120s"
            on_timeout: "fallback → same_model_isolated (见 workflow_core.yaml)"
          "4_write_completion_check":
            path: "{project_root}/state/step_results/MWF-OPC_5_2b_dispatch_review/completion_check.yaml"
        on_fail:
          action: "TASK_UPDATE(blocked) + IPC notify brain_pmo"
          payload: "completion_check.yaml path + failed check_items"

      - action: "TASK_UPDATE: completed"
        action_id: "MWF-OPC:5_2b:dispatch_review:A09"
        tool: "task_manager API"
        call: |
          event_type: TASK_UPDATE
          task_id:    "MWF-OPC:5_2b:dispatch_review"
          status:     completed

    artifact: "state/dispatch_log.yaml (追加 review 记录)"
    artifact_schema:
      reviews_dispatched:
        - original_task_id: string
          review_task_id: string
          reviewer_agent_id: string
          review_decision: "approve | reject | pending"
          rework_round: int

    check: "所有 pending_reviews 都已收到 review 结果；review 状态已更新"
    on_success: "MWF-OPC:5_4:evaluate_release_readiness"
    on_retry: "部分 review 未返回 → 继续等待"
    on_blocked: "reviewer 离线或超过 max_rework_rounds → resolve_blocker"

  # ── 5.3 处理阻断 ──────────────────────────────────────────────────────────
  - step_id: "MWF-OPC:5_3:resolve_blocker"
    phase: execution
    who:
      executor: project_orchestrator
      profile: coordinator
    purpose: "处理 review reject、test fail、agent 离线、依赖缺失"
    note: "条件步骤: 仅在 5_1/5_2/5_2b 的 on_blocked 时触发，非每个循环必经"

    do:
      - action: "TASK_UPDATE: in_progress"
        action_id: "MWF-OPC:5_3:resolve_blocker:A01"
        tool: "task_manager API"
        call: |
          event_type: TASK_UPDATE
          task_id:    "MWF-OPC:5_3:resolve_blocker"
          status:     in_progress
        note: "仅在被触发时调用（非每次循环）"

      - action: "分类 blocker"
        action_id: "MWF-OPC:5_3:resolve_blocker:A02"
        tool: "LLM reasoning"
        categories:
          retryable: "worker 可重试（如临时失败、环境问题）→ 重新 dispatch"
          reassignable: "当前 worker 不适合 → 换其他 agent"
          rework: "review/test 驳回 → 创建 rework task，带 review_findings"
          replan: "发现 task 设计有问题 → 回到 model_tasks 补充"
          escalate: "超出 orchestrator 能力 → escalate 给 brain_pmo"

      - action: "执行对应的恢复操作"
        action_id: "MWF-OPC:5_3:resolve_blocker:A03"
        tool: "IPC + file_write"

      - action: "cross_model_validation: 验证 blocker 已有有效 resolution_path"
        action_id: "MWF-OPC:5_3:resolve_blocker:A04"
        type: "cross_model_validation"
        strategy_ref: "workflow_core.yaml → audit_strategy.cross_model_validation"
        note: "条件步骤验证：blocker 实际被解决了，不是表面上的 resolved"
        execution_flow:
          "1_write_request":
            path: "{project_root}/state/step_results/MWF-OPC_5_3_resolve_blocker/validation_request.yaml"
            content:
              step_id: "MWF-OPC:5_3:resolve_blocker"
              validator_model_rule: "不同于 orchestrator 当前模型"
              artifact: "blocker resolution 记录（task_graph.yaml 或 dispatch_log.yaml）"
              check_items:
                - {id: "CHK-01", type: "field_assert", field: "blocker.category",
                   assert: "in [retryable, reassignable, rework, replan, escalate]"}
                - {id: "CHK-02", type: "field_assert", field: "blocker.resolution_path",
                   assert: "非空字符串（描述恢复操作）"}
                - {id: "CHK-03", type: "cross_file",
                   source: "state/task_graph.yaml",
                   rule: "被 blocker 影响的 task 状态已更新（不再是未处理的 FAILED/orphaned）"}
                - {id: "CHK-04", type: "escalation_check",
                   rule: "若 category=escalate，确认已通过 IPC 通知 brain_pmo"}
          "2_spawn_validator":
            command: |
              # 从 {validator_model} 拆出 <provider> / <model_name> 后创建 validator。
              agentctl add {validator_agent_id} --group {group_id} --role step_validator \
                --agent-type <provider> --model <model_name> \
                --scope project --project {project_id} --sandbox-id {sandbox_id} \
                --desired-state stopped --apply
              agentctl start {validator_agent_id} --apply
            note: "validator_model 由 model_selection 规则确定，与 orchestrator 不同；完成验证后由 orchestrator 执行 agentctl purge {validator_agent_id} --apply --force"
          "3_wait_result":
            wait_for: "IPC: VALIDATE_COMPLETE"
            timeout: "120s"
            on_timeout: "fallback → same_model_isolated (见 workflow_core.yaml)"
          "4_write_completion_check":
            path: "{project_root}/state/step_results/MWF-OPC_5_3_resolve_blocker/completion_check.yaml"
        on_fail:
          action: "TASK_UPDATE(blocked) + IPC notify brain_pmo"
          payload: "completion_check.yaml path + failed check_items"

      - action: "TASK_UPDATE: completed"
        action_id: "MWF-OPC:5_3:resolve_blocker:A05"
        tool: "task_manager API"
        call: |
          event_type: TASK_UPDATE
          task_id:    "MWF-OPC:5_3:resolve_blocker"
          status:     completed
        note: "blocker 已有 resolution_path 时标记完成，回到 5_1 继续循环"

    check: "blocker 有 resolution_path"
    on_success: "MWF-OPC:5_1:dispatch_ready_tasks"    # 回到 dispatch 循环
    on_retry: "resolution 不充分 → 继续分析"
    on_blocked: |
      无法自行解决 → escalate 给 brain_pmo
      event_type: TASK_UPDATE
      task_id:    "MWF-OPC:5_3:resolve_blocker"
      status:     blocked
      description: "{具体原因}"

  # ── 5.4 评估 release readiness ─────────────────────────────────────────────
  - step_id: "MWF-OPC:5_4:evaluate_release_readiness"
    phase: execution
    who:
      executor: project_orchestrator
      profile: coordinator
    purpose: "检查是否满足进入 release 的条件"
    # ── LOOP 出口说明 ────────────────────────────────────────────────────────
    # 本步是循环出口。release_ready=false 时回到 5_1（不标记 done）；
    # release_ready=true 时标记 done，整个 execution phase 结束。
    # task_manager 在本步状态: in_progress（循环中）→ done（release_ready=true 时）

    do:
      - action: "TASK_UPDATE: in_progress"
        action_id: "MWF-OPC:5_4:evaluate_release_readiness:A01"
        tool: "task_manager API"
        call: |
          event_type: TASK_UPDATE
          task_id:    "MWF-OPC:5_4:evaluate_release_readiness"
          status:     in_progress
        note: "每次进入评估时更新（每轮循环调用一次）"

      - action: "检查所有 deliverables 对应的 task 状态"
        action_id: "MWF-OPC:5_4:evaluate_release_readiness:A02"
        tool: "file_read state/task_graph.yaml"
        checks:
          - "所有 critical/high task 是否 DONE/VERIFIED"
          - "所有需要 review 的 task 是否已 REVIEW → VERIFIED"
          - "所有需要 test 的 task 是否有 test evidence"
          - "是否有未解决的 blocker"
          - "spec_checklist 覆盖率"

      - action: "写 readiness 决策"
        action_id: "MWF-OPC:5_4:evaluate_release_readiness:A03"
        tool: "file_write"
        target: "state/release_readiness.yaml"

      - action: "条件 cross_model_validation: 验证 state/release_readiness.yaml（仅 release_ready=true 时）"
        action_id: "MWF-OPC:5_4:evaluate_release_readiness:A04"
        type: "cross_model_validation"
        condition: "release_readiness.release_ready == true"
        strategy_ref: "workflow_core.yaml → audit_strategy.cross_model_validation"
        note: |
          release_ready=false → 跳过本步骤，直接回到 5_1
          release_ready=true  → 发起验证，通过后才调用 TASK_UPDATE:completed
        execution_flow:
          "1_write_request":
            path: "{project_root}/state/step_results/MWF-OPC_5_4_evaluate_release_readiness/validation_request.yaml"
            content:
              step_id: "MWF-OPC:5_4:evaluate_release_readiness"
              validator_model_rule: "不同于 orchestrator 当前模型"
              artifact: "state/release_readiness.yaml"
              check_items:
                - {id: "CHK-01", type: "file_exists",  target: "state/release_readiness.yaml"}
                - {id: "CHK-02", type: "field_assert", field: "release_ready",        assert: "== true"}
                - {id: "CHK-03", type: "field_assert", field: "deliverables_done",    assert: "== true"}
                - {id: "CHK-04", type: "field_assert", field: "reviews_done",         assert: "== true"}
                - {id: "CHK-05", type: "field_assert", field: "tests_done",           assert: "== true"}
                - {id: "CHK-06", type: "field_assert", field: "blockers_resolved",    assert: "== true"}
                - {id: "CHK-07", type: "field_assert", field: "remaining_gaps",       assert: "[] 空列表"}
                - {id: "CHK-08", type: "cross_file",
                   source: "state/task_graph.yaml",
                   rule: "所有 critical/high task 状态 in [DONE, VERIFIED]"}
          "2_spawn_validator":
            command: |
              # 从 {validator_model} 拆出 <provider> / <model_name> 后创建 validator。
              agentctl add {validator_agent_id} --group {group_id} --role step_validator \
                --agent-type <provider> --model <model_name> \
                --scope project --project {project_id} --sandbox-id {sandbox_id} \
                --desired-state stopped --apply
              agentctl start {validator_agent_id} --apply
            note: "validator_model 由 model_selection 规则确定，与 orchestrator 不同；完成验证后由 orchestrator 执行 agentctl purge {validator_agent_id} --apply --force"
          "3_wait_result":
            wait_for: "IPC: VALIDATE_COMPLETE"
            timeout: "120s"
            on_timeout: "fallback → same_model_isolated (见 workflow_core.yaml)"
          "4_write_completion_check":
            path: "{project_root}/state/step_results/MWF-OPC_5_4_evaluate_release_readiness/completion_check.yaml"
        on_fail:
          action: "TASK_UPDATE(blocked) + IPC notify brain_pmo"
          payload: "completion_check.yaml path + failed check_items"

      - action: "条件 TASK_UPDATE: completed（仅 release_ready=true 且 validation 通过时）"
        action_id: "MWF-OPC:5_4:evaluate_release_readiness:A05"
        tool: "task_manager API"
        condition: "release_readiness.release_ready == true AND completion_check.passed == true"
        call: |
          # execution phase 完成后 spec stage 保持 S6_tasks（由 phase 6 完成时推进至 S7_verification）
          event_type: TASK_UPDATE
          task_id:    "MWF-OPC:5_4:evaluate_release_readiness"
          status:     completed
        note: |
          release_ready=false → 不调用 completed，回到 5_1（5_1 进入时会调用自己的 in_progress）
          release_ready=true + validation passed → 调用 completed，execution phase 完成，进入 Phase 6
          spec stage 在 phase 6 (release) 完成后才推进至 S7_verification

    artifact: "state/release_readiness.yaml"
    artifact_schema:
      deliverables_done: bool
      reviews_done: bool
      tests_done: bool
      blockers_resolved: bool
      checklist_coverage: "percentage"
      release_ready: bool
      remaining_gaps: [string]

    check: "release_readiness.release_ready = true"
    on_success: "MWF-OPC:6_1:drive_release"
    on_retry: "不 ready → 回到 dispatch_ready_tasks 继续推进"     # ← 这是核心循环
    on_blocked: "有无法解决的 gap → escalate"
