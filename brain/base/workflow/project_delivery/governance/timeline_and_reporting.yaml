timeline_and_reporting:
  id: "MWF-REPORT-001"
  version: "0.1"
  intent: "定义项目时间线、结构化日志引用、交付报告、发布报告与审计输入包"

timeline_requirements:
  project_timeline:
    required_moments:
      - project_created_at
      - sandbox_ready_at
      - execution_started_at
      - first_task_assigned_at
      - milestone_reached_at
      - release_candidate_ready_at
      - released_at
      - rolled_back_at
      - audit_started_at
      - closed_at
  task_timeline:
    required_events:
      - task.created
      - task.assigned
      - task.accepted
      - task.active
      - task.blocked
      - task.review_requested
      - task.verified
      - task.done
      - task.failed
      - task.cancelled

reports:
  delivery_report:
    owner: "project orchestrator"
    required_fields:
      - project_id
      - scope_summary
      - deliverables
      - completed_tasks
      - incomplete_or_cancelled_tasks
      - milestone_summary
      - checklist_summary
      - risk_summary
      - execution_timeline_ref
      - log_bundle_ref
  release_report:
    owner: "release manager"
    required_fields:
      - project_id
      - candidate_id
      - approval_chain
      - build_summary
      - test_summary
      - review_summary
      - stage_gate_result
      - deployment_timeline
      - release_result
      - prod_smoke_result
      - rollback_result
      - log_bundle_ref
  audit_input_bundle:
    owner: "project orchestrator + release manager"
    required_fields:
      - project_id
      - spec_checklist_ref
      - checklist_history_ref
      - task_event_history_ref
      - project_snapshot_history_ref
      - timeline_log_ref
      - task_progress_log_ref
      - service_runtime_log_ref
      - delivery_report_ref
      - release_report_ref
      - blocker_history
      - escalation_history
  audit_report:
    owner: "audit orchestrator"
    required_fields:
      - audit_id
      - project_id
      - candidate_id
      - executive_summary
      - checklist_coverage_assessment
      - major_findings
      - root_causes
      - improvement_actions
      - unclosed_required_items
      - materialization_status
      - target_domains
      - supporting_log_refs
      - created_at

closure_rules:
  - "project released or failed 后，必须存在 delivery_report"
  - "进入 audit 前，必须存在 audit_input_bundle"
  - "audit 完成前，必须存在 audit_report"
  - "没有 spec checklist summary 的 project 不得声称完成度可信"
  - "没有 report 的 project 不得标记为 CLOSED"
