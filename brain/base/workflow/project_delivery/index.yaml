entrypoints:
  - file: "LANDING.md"
    role: "目录 landing 导航"
  - file: "README.md"
    role: "目录阅读入口"
  - file: "models/architecture_overview.yaml"
    role: "系统边界与职责入口"
  - file: "models/docker_sandbox_template.yaml"
    role: "默认 Docker sandbox provider 的固定模板与适配边界入口"
  - file: "models/group_project_layout.yaml"
    role: "group 归属、project 根目录与 sandbox 关系入口"
  - file: "models/sandbox_version_and_packaging.yaml"
    role: "brain image 版本控制与 project payload 打包入口"
  - file: "models/project_agent_provisioning.yaml"
    role: "project-scoped agent 创建、命名与 roster 入口"
  - file: "models/project_agent_provisioning_examples.yaml"
    role: "project-scoped agent provisioning 示例入口"
  - file: "contracts/project_agent_runtime_creation.yaml"
    role: "sandbox 内 project agent runtime 创建契约入口"
  - file: "contracts/task_state_dispatch_contract.yaml"
    role: "task manager 状态机、task list、forward 与 dispatch ack 契约入口"
  - file: "implementation/create_project_agents.sh.example"
    role: "容器内 project agent 创建示例脚本"
  - file: "workflow/intake.yaml"
    role: "项目进入与受理入口"
  - file: "workflow/research.yaml"
    role: "research 与 benchmark 入口"
  - file: "workflow/planning.yaml"
    role: "project planning 入口"
  - file: "workflow/task_modeling.yaml"
    role: "task graph 建模入口"
  - file: "contracts/state_machines.yaml"
    role: "所有 workflow 的统一状态语义入口"
  - file: "workflow/execution.yaml"
    role: "项目执行主流程入口"
  - file: "workflow/release.yaml"
    role: "发布流程入口"
  - file: "workflow/audit.yaml"
    role: "审计流程入口"
  - file: "governance/feedback_loop.yaml"
    role: "闭环收口与反馈入口"

extraction_targets:
  to_base_workflow:
    - "state_machines 中稳定的 project/task/release gate"
    - "observability 中稳定的 watchdog / heartbeat 规则"
    - "release / audit 中稳定的 gate 结构"
  to_base_spec:
    - "control/runtime IPC 的稳定字段契约"
    - "domain model 的基础实体定义"
  to_base_knowledge:
    - "试运行后的故障模式与最佳实践"

rules:
  - "发布时必须以 package 形式落盘，不允许只发布单一 overview 文件"
  - "workflow package 内所有文件需由 index.yaml 统一索引"
  - "发布到 base/workflow/project_delivery 时必须保持主流程、状态机和治理文档的索引完整"
