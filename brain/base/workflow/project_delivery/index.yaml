project_delivery_workflow_package:
  id: "MWF-PACKAGE-001"
  version: "0.1"
  title: "Brain Base Workflow Project Delivery Package"
  status: "proposal"
  intent: "将项目交付 workflow 发布到 brain/base/workflow/project_delivery，而非散落在 runtime pending 中"

package_identity:
  current_location: "/xkagent_infra/runtime/update_brain/pending/20260311_multicore_workflow"
  publish_target: "/brain/base/workflow/project_delivery"
  publish_mode: "base_workflow"
  rationale:
    - "该体系的目标是项目需求处理与交付 workflow，本质上属于 base/workflow 语义域"
    - "统一放在 project_delivery 下可避免 intake/research/release/audit 被拆散"
    - "基础设施实现细节仍可留在 infrastructure/runtime，workflow 规范本身进入 base"

published_layout:
  root: "/brain/base/workflow/project_delivery"
  top_level_files:
    - "LANDING.md"
    - "README.md"
    - "index.yaml"
    - "DESIGN.md"
    - "CHANGELOG.pending.md"
  workflow_entrypoints:
    - "intake.yaml"
    - "bootstrap.yaml"
    - "research.yaml"
    - "planning.yaml"
    - "task_modeling.yaml"
    - "execution.yaml"
    - "global_sync.yaml"
    - "escalation.yaml"
    - "release.yaml"
    - "audit.yaml"
  dirs:
    contracts: "状态机、schema、id、execution/release 契约"
    models: "planning/task/environment/runtime 分层模型"
    governance: "监督、时间线、兼容、gate、feedback、logging 落盘规则"
    protocols: "control/runtime IPC 与事件模型"
    implementation: "实施计划与 backlog"

publish_mapping:
  - source: "/xkagent_infra/runtime/update_brain/pending/20260311_multicore_workflow/LANDING.md"
    target: "/brain/base/workflow/project_delivery/LANDING.md"
    action: "copy_as_is"
    role: "目录 landing 导航页"
  - source: "/xkagent_infra/runtime/update_brain/pending/20260311_multicore_workflow/README.md"
    target: "/brain/base/workflow/project_delivery/README.md"
