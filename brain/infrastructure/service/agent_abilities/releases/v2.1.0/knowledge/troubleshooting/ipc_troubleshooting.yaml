# IPC Troubleshooting SOP
# Agent 间通信故障排查标准操作流程
# 基于真实生产事故沉淀 (2026-02-09)

category: "ipc_errors"
version: "1.0"
last_updated: "2026-02-09"

# ============================================================
# 快速诊断流程（Agent 收到故障时第一步执行）
# ============================================================

quick_diagnosis:
  description: |
    按顺序检查，定位到第一个失败项即为根因。
    每一步都提供了具体的 bash 命令，可直接执行。
  steps:
    - step: 1
      check: "daemon 是否在运行"
      command: "ps aux | grep brain_ipc | grep -v grep"
      expect: "看到 brain_ipc 进程"
      if_fail: "跳转 IPC-001"

    - step: 2
      check: "daemon socket 是否存在"
      command: "ls -la /tmp/brain_ipc.sock"
      expect: "socket 文件存在"
      if_fail: "跳转 IPC-001"

    - step: 3
      check: "目标 agent 是否在线"
      command: |
        python3 -c "
        import socket, json
        s=socket.socket(socket.AF_UNIX,socket.SOCK_STREAM)
        s.connect('/tmp/brain_ipc.sock')
        s.settimeout(3)
        s.sendall((json.dumps({'action':'agent_list','data':{}})+'\n').encode())
        d=b''
        while True:
            c=s.recv(8192)
            if not c: break
            d+=c
            if b'\n' in d: break
        s.close()
        r=json.loads(d.decode().strip())
        for a in r.get('agents',[]):
            if a.get('online'):
                print(f'  {a[\"name\"]:40s} pane={a.get(\"tmux_pane\",\"\")}')
        "
      expect: "目标 agent 出现在列表中且有 tmux_pane"
      if_fail: "跳转 IPC-002"

    - step: 4
      check: "目标 agent 队列是否有消息积压"
      command: |
        python3 -c "
        import socket, json
        s=socket.socket(socket.AF_UNIX,socket.SOCK_STREAM)
        s.connect('/tmp/brain_ipc.sock')
        s.settimeout(3)
        s.sendall((json.dumps({'action':'ipc_status','data':{}})+'\n').encode())
        d=b''
        while True:
            c=s.recv(8192)
            if not c: break
            d+=c
            if b'\n' in d: break
        s.close()
        r=json.loads(d.decode().strip())
        for k,v in r.get('stats',{}).get('msgqueue',{}).get('queues',{}).items():
            print(f'  {k:55s} queued={v[\"queued\"]} inflight={v[\"inflight\"]} dead={v[\"deadletter\"]}')
        "
      expect: "queued=0 表示消息被消费; queued>0 表示消息积压未处理"
      if_fail: "有积压 → 跳转 IPC-003; 有 deadletter → 跳转 IPC-005"

    - step: 5
      check: "tmux_notify 是否启用"
      command: "grep 'tmux_notify_enabled' /brain/runtime/logs/daemon.log | tail -1"
      expect: "tmux_notify_enabled=1"
      if_fail: "跳转 IPC-003"

    - step: 6
      check: "agent 的 MCP server 是否正常连接 daemon"
      command: "tmux capture-pane -t {TARGET_PANE} -p -S -30 | tail -30"
      expect: "agent 在正常等待输入 (› 或 ❯ 提示符)"
      if_fail: "跳转 IPC-004"

# ============================================================
# 具体问题及解决方案
# ============================================================

problems:
  - id: "IPC-001"
    category: "ipc_errors"
    title: "Daemon 未运行或 socket 不存在"
    keywords: ["daemon", "brain_ipc", "socket", "连接失败", "connection refused"]
    error_patterns:
      - "No such file or directory"
      - "Connection refused"
      - "brain_ipc not found"
    description: |
      brain_ipc 进程未运行，所有 IPC 通信中断。
      可能原因：手动 kill、OOM、崩溃。

    solutions:
      - id: "IPC-001-SOL-A"
        description: "重启 daemon"
        confidence: "high"
        risk_level: "medium"
        reversible: true
        warning: "重启 daemon 会丢失所有内存中的消息队列"
        steps:
          - "rm -f /tmp/brain_ipc.pid"
          - "/brain/infrastructure/service/brain_ipc/bin/current/brain_ipc &"
          - "sleep 1 && ps aux | grep brain_ipc | grep -v grep"
          - "检查日志: tail -5 /brain/runtime/logs/daemon.log"
        verify:
          - "daemon 进程存在"
          - "socket 文件存在: ls /tmp/brain_ipc.sock"
          - "日志显示 tmux_notify_enabled=1"

  - id: "IPC-002"
    category: "ipc_errors"
    title: "Agent 未注册或不在线"
    keywords: ["agent", "offline", "未注册", "不在线", "agent_list"]
    error_patterns:
      - "no agent instance found"
      - "agent not found"
    description: |
      目标 agent 的 MCP server 未注册到 daemon，或 tmux session 不存在。
      常见原因：agent 未启动、MCP server 崩溃、BRAIN_AGENT_NAME 配置错误。

    solutions:
      - id: "IPC-002-SOL-A"
        description: "检查 agent tmux session 是否存在"
        confidence: "high"
        risk_level: "low"
        reversible: true
        steps:
          - "tmux list-sessions | grep {agent_name}"
          - "如果不存在，需要通过 orchestrator 重启 agent"
          - "如果存在，检查 .mcp.json 中 BRAIN_AGENT_NAME 是否正确"
          - "cat /brain/groups/org/{group}/agents/{agent_name}/.mcp.json"
        verify:
          - "agent 出现在 agent_list 且 online=true"
          - "tmux_pane 字段不为空"

  - id: "IPC-003"
    category: "ipc_errors"
    title: "Agent 收不到消息 — tmux 通知未触发"
    keywords: ["收不到消息", "没有通知", "frontdesk不工作", "agent空闲", "tmux_notify"]
    error_patterns:
      - "tmux_notify_enabled=0"
      - "agent 在空闲状态但有消息积压"
    description: |
      消息已进入 daemon 队列，但目标 agent 没有被 tmux send-keys 唤醒去调用 ipc_recv。
      根因：daemon 的 g_tmux_notify_enabled 默认值为 0（关闭）。

      这是 2026-02-09 frontdesk 故障的根本原因。

    incident_ref: "XQ-INCIDENT-003 (2026-02-09)"

    solutions:
      - id: "IPC-003-SOL-A"
        description: "确认 daemon 的 tmux_notify 已启用"
        confidence: "high"
        risk_level: "low"
        reversible: true
        steps:
          - "检查当前状态: grep 'tmux_notify_enabled' /brain/runtime/logs/daemon.log | tail -1"
          - "如果 =0，检查源码默认值: grep 'g_tmux_notify_enabled' /brain/infrastructure/service/brain_ipc/src/brain_ipc.c"
          - "确保默认值为 1（已在 2026-02-09 修复）"
          - "重启 daemon 使修改生效"
        verify:
          - "日志显示 tmux_notify_enabled=1"
          - "发测试消息验证: 用 ipc_send 发消息给目标 agent，观察 tmux pane 是否收到 [IPC] 通知"

      - id: "IPC-003-SOL-B"
        description: "临时手动唤醒 agent（不重启 daemon）"
        confidence: "high"
        risk_level: "low"
        reversible: true
        steps:
          - "/brain/infrastructure/service/utils/tmux/bin/brain_tmux_send -t {agent_name} '[IPC] 你有未处理的消息，请执行 ipc_recv(ack_mode=manual, max_items=10)'"
        verify:
          - "tmux capture-pane -t {pane_id} -p -S -10 确认 agent 开始处理"

  - id: "IPC-004"
    category: "ipc_errors"
    title: "ipc_recv 返回 0 条消息但队列有积压"
    keywords: ["ipc_recv", "返回0", "空消息", "messages为空", "count=0"]
    error_patterns:
      - "ipc_recv.*count=0"
      - "messages.*\\[\\]"
    description: |
      Agent 调用 ipc_recv 但返回空，而 daemon 队列确实有消息。
      可能原因：
      1. daemon 刚重启，旧消息丢失（内存队列不持久化）
      2. agent_id 不匹配（MCP server 构造的 ID 与队列 key 不同）
      3. 消息已被其他查询 claim 为 inflight 状态

    solutions:
      - id: "IPC-004-SOL-A"
        description: "检查 agent_id 匹配"
        confidence: "high"
        risk_level: "low"
        reversible: true
        steps:
          - "查看队列 key: 执行 ipc_status 看 queues 字段的 key 名称"
          - "查看 agent 注册 ID: 执行 agent_list 找到该 agent 的 instance_id"
          - "对比两者是否一致"
          - "如果不一致，检查 .mcp.json 中 BRAIN_AGENT_NAME 环境变量"
        verify:
          - "队列 key 与 agent instance_id 完全匹配"

      - id: "IPC-004-SOL-B"
        description: "检查是否因 daemon 重启丢失消息"
        confidence: "medium"
        risk_level: "low"
        reversible: false
        steps:
          - "查看 daemon 启动时间: grep 'tmux_notify_enabled' /brain/runtime/logs/daemon.log | tail -1 取时间戳"
          - "对比消息发送时间：如果消息在 daemon 启动之前发送，则已丢失"
          - "通知发送方重发消息"
        note: "daemon 消息队列为纯内存，重启即清空。目前无持久化方案。"

  - id: "IPC-005"
    category: "ipc_errors"
    title: "消息进入 deadletter（死信队列）"
    keywords: ["deadletter", "死信", "max_attempts", "投递失败"]
    error_patterns:
      - "deadletter"
      - "max_attempts exceeded"
    description: |
      消息超过最大重试次数（默认 5 次）后被移入死信队列，不再投递。
      常见原因：目标 agent 长时间离线或 ipc_recv 持续失败。

    solutions:
      - id: "IPC-005-SOL-A"
        description: "检查死信队列并手动处理"
        confidence: "medium"
        risk_level: "low"
        reversible: true
        steps:
          - "执行 ipc_status 查看哪些队列有 deadletter > 0"
          - "确认目标 agent 当前状态"
          - "如果 agent 已恢复，通知发送方重发消息"
          - "如果消息可忽略，无需处理"

  - id: "IPC-006"
    category: "ipc_errors"
    title: "MCP server (brain-ipc-c) 启动失败"
    keywords: ["MCP startup incomplete", "failed: brain-ipc-c", "mcp启动失败", "os error 2"]
    error_patterns:
      - "MCP startup incomplete"
      - "failed: brain-ipc-c"
      - "(os error 2)"
    description: |
      Agent 的 brain-ipc-c MCP server 未能启动，导致所有 ipc_recv/ipc_send 调用失败或返回空。
      tmux pane 会显示 "⚠ MCP startup incomplete (failed: brain-ipc-c)"。
      常见原因：MCP server 二进制文件缺失、权限不对、.mcp.json 配置错误。

      这是 2026-02-09 architect ipc_recv 返回 0 的实际根因。

    incident_ref: "XQ-INCIDENT-003b (2026-02-09)"

    solutions:
      - id: "IPC-006-SOL-A"
        description: "检查 MCP server 二进制文件"
        confidence: "high"
        risk_level: "low"
        reversible: true
        steps:
          - "检查二进制是否存在: ls -la /brain/runtime/engine/src/mcp/brain_ipc_c/brain_ipc_c_mcp_server"
          - "检查是否可执行: file /brain/runtime/engine/src/mcp/brain_ipc_c/brain_ipc_c_mcp_server"
          - "检查 .mcp.json 配置: cat /brain/groups/org/{group}/agents/{agent_name}/.mcp.json"
          - "确认 BRAIN_AGENT_NAME 环境变量值正确"
        verify:
          - "二进制文件存在且有执行权限"
          - ".mcp.json 中 command 路径指向正确的二进制"

      - id: "IPC-006-SOL-B"
        description: "重启 agent session 让 MCP server 重新加载"
        confidence: "high"
        risk_level: "medium"
        reversible: true
        warning: |
          禁止直接 exit 或 kill 其他 agent 的 session！
          应通过 /clear 命令清除上下文，或请求 orchestrator 重启。
        steps:
          - "方法1（推荐）: 在 agent pane 中发送 /clear 清除上下文重新初始化"
          - "方法2: 如果 /clear 无效，请求 brain-agentctl 重启该 agent"
          - "禁止: 直接发送 exit、kill、C-c 到其他 agent 的 session"
        verify:
          - "tmux capture-pane 不再显示 MCP startup incomplete 警告"
          - "agent 能成功调用 ipc_recv 且返回正确结果"

    safety_rules:
      - "禁止直接 exit/kill 其他 agent 的 tmux session"
      - "禁止用 tmux send-keys 发送 C-c、exit、kill 给其他 agent"
      - "所有 agent 生命周期操作（重启、停止、杀掉）必须通过 brain-agentctl 执行"
      - "轻度修复用 /clear 清上下文；需要重启时请求 orchestrator"

# ============================================================
# 全局安全规则（所有排查操作必须遵守）
# ============================================================

global_safety_rules:
  agent_lifecycle:
    description: |
      Agent 的生命周期（启动、停止、重启、杀掉）由 brain-agentctl 统一管理。
      任何 agent（包括 DevOps）禁止直接操作其他 agent 的 tmux session。
    allowed:
      - "通过 ipc_send 向 brain-agentctl 请求重启目标 agent"
      - "通过 /brain/infrastructure/service/utils/tmux/bin/brain_tmux_send 发送 /clear 命令清理 agent 上下文"
      - "通过 tmux capture-pane 只读查看其他 agent 状态"
    forbidden:
      - "tmux send-keys -t {其他agent} exit"
      - "tmux send-keys -t {其他agent} C-c"
      - "tmux kill-session -t {其他agent}"
      - "kill {其他agent的进程PID}"
      - "任何直接终止其他 agent 进程或 session 的操作"
    correct_flow: |
      需要重启 agent 时：
      1. ipc_send(to="brain-agentctl", message="请重启 {agent_name}")
      2. 等待 orchestrator 确认
      3. 验证 agent 恢复

# ============================================================
# 常用诊断命令速查表
# ============================================================

diagnostic_commands:
  daemon_status:
    description: "检查 daemon 进程"
    command: "ps aux | grep brain_ipc | grep -v grep"

  socket_check:
    description: "检查 daemon socket"
    command: "ls -la /tmp/brain_ipc.sock"

  agent_list:
    description: "查看所有在线 agent"
    command: |
      python3 -c "
      import socket,json;s=socket.socket(socket.AF_UNIX,socket.SOCK_STREAM);s.connect('/tmp/brain_ipc.sock');s.settimeout(3)
      s.sendall((json.dumps({'action':'agent_list','data':{}})+'\n').encode())
      d=b'';exec('while True:\n c=s.recv(8192)\n if not c:break\n d+=c\n if b\"\\\\n\" in d:break')
      s.close();r=json.loads(d.decode().strip())
      [print(f'  {a[\"name\"]:40s} online={a[\"online\"]} pane={a.get(\"tmux_pane\",\"\")}') for a in r.get('agents',[]) if a.get('online')]"

  queue_status:
    description: "查看消息队列积压情况"
    command: |
      python3 -c "
      import socket,json;s=socket.socket(socket.AF_UNIX,socket.SOCK_STREAM);s.connect('/tmp/brain_ipc.sock');s.settimeout(3)
      s.sendall((json.dumps({'action':'ipc_status','data':{}})+'\n').encode())
      d=b'';exec('while True:\n c=s.recv(8192)\n if not c:break\n d+=c\n if b\"\\\\n\" in d:break')
      s.close();r=json.loads(d.decode().strip())
      [print(f'  {k:55s} q={v[\"queued\"]} flight={v[\"inflight\"]} dead={v[\"deadletter\"]}') for k,v in r.get('stats',{}).get('msgqueue',{}).get('queues',{}).items()]"

  peek_messages:
    description: "查看某 agent 的待处理消息（不消费）"
    note: "注意：manual ack 模式会 claim 消息变为 inflight，auto 模式会直接消费"
    command: |
      python3 -c "
      import socket,json;AGENT='TARGET_AGENT_INSTANCE_ID'
      s=socket.socket(socket.AF_UNIX,socket.SOCK_STREAM);s.connect('/tmp/brain_ipc.sock');s.settimeout(3)
      s.sendall((json.dumps({'action':'ipc_recv','data':{'agent':AGENT,'ack_mode':'manual','max_items':5}})+'\n').encode())
      d=b'';exec('while True:\n c=s.recv(8192)\n if not c:break\n d+=c\n if b\"\\\\n\" in d:break')
      s.close();print(json.dumps(json.loads(d.decode().strip()),indent=2,ensure_ascii=False))"

  tmux_notify_check:
    description: "检查 tmux_notify 是否启用"
    command: "grep 'tmux_notify_enabled' /brain/runtime/logs/daemon.log | tail -1"

  wake_agent:
    description: "手动唤醒 agent 处理消息"
    command: "/brain/infrastructure/service/utils/tmux/bin/brain_tmux_send -t {agent_session_name} '[IPC] 请执行 ipc_recv(ack_mode=manual, max_items=10) 处理积压消息'"

  capture_agent_screen:
    description: "抓取 agent 当前屏幕输出"
    command: "tmux capture-pane -t {pane_id} -p -S -30"

  daemon_log:
    description: "查看 daemon 最新日志"
    command: "tail -30 /brain/runtime/logs/daemon.log"

# ============================================================
# 关键架构说明（帮助理解根因）
# ============================================================

architecture_notes:
  message_delivery_flow: |
    发送方 Agent
      → MCP server (brain-ipc-c) 调用 ipc_send
      → Unix socket → brain_ipc
      → daemon 入队 msgqueue[resolved_agent_id]
      → daemon 通过 tmux send-keys 发 "[IPC] New message..." 到目标 pane
      → 目标 Agent 看到通知，调用 ipc_recv
      → MCP server → daemon → 返回消息
      → Agent 处理 → ipc_ack

  critical_dependencies:
    - "tmux send-keys 是唯一的 agent 唤醒机制"
    - "消息队列为纯内存，daemon 重启即清空"
    - "agent_id 格式: name@session:pane (由 MCP server 在启动时自动构造)"
    - "resolve_target 负责将逻辑名(如 agent-system_pmo) 解析为完整 instance_id"

  key_files:
    daemon_binary: "/brain/infrastructure/service/brain_ipc/bin/brain_ipc"
    daemon_source: "/brain/infrastructure/service/brain_ipc/src/brain_ipc.c"
    mcp_server: "/brain/infrastructure/service/agent_abilities/mcp/brain_ipc_c/bin/current/brain_ipc_c_mcp_server"
    daemon_socket: "/tmp/brain_ipc.sock"
    daemon_log: "/brain/runtime/logs/daemon.log"

metadata:
  total_problems: 6
  total_solutions: 8
  maintainer: "Brain System"
  based_on_incidents:
    - "XQ-INCIDENT-003 (2026-02-09): Frontdesk 收不到 Telegram 消息 — tmux_notify 默认关闭"
