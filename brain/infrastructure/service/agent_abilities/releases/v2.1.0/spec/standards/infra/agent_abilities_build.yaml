standard:
  id: G-SPEC-STANDARD-AGENT-ABILITIES-BUILD
  name: agent_abilities Build System Standard
  version: "1.0"
  description: |
    定义 agent_abilities 构建系统的规范行为。
    涵盖目录结构、构建目标、输出格式、部署流程。
    所有对 agent_abilities 的修改必须遵循此标准。

# ── 目录结构 ──────────────────────────────────────────────────
structure:
  root: /brain/infrastructure/service/agent_abilities/
  src/:
    role: 唯一真源（single source of truth）
    base/: 镜像 /brain/base/ 的文档内容（spec/workflow/knowledge/evolution/skill）
    hooks/: hooks Python 源码
    mcp/: MCP C 源码
    tests/:
      base/spec/: spec 验证测试
      hooks/: hooks 单元测试
  build/:
    role: 构建工具链
    build.sh: 统一构建入口
    scripts/: 各 target 构建脚本
    build.yaml: target 配置
  bin/:
    role: 编译产物（runtime-ready）
    hooks/current/: 当前版本 hook 可执行文件（current 为成功标志）
    mcp/: MCP 可执行文件
  releases/:
    role: 历史版本快照
    v{version}/: 完整版本快照目录（spec/workflow/knowledge/evolution/skill/hooks/mcp）
    current:
      type: SYMLINK — 必须是符号链接，指向 v{version}/
      role: merge 命令的 common ancestor（三方合并基线）
      critical: |
        必须是 symlink，不得是物理目录。
        Linux 陷阱：当 current 是物理目录时，`ln -sfn vX.Y.Z current`
        不会替换目录，而是在目录内部创建循环 symlink（current/vX.Y.Z → vX.Y.Z）。
        正确做法：deploy 前先检查并删除物理目录，再执行 ln -sfn。
        如果 current 是物理目录，merge 命令将使用错误的旧版本作为 ancestor，
        导致 git merge-file 产生虚假冲突或错误合并，所有 merge 结果不可信。

# ── 构建目标 ──────────────────────────────────────────────────
targets:
  spec:
    description: 将 src/base/spec/ 内容编译并部署到 /brain/base/spec/
    command: bash build/build.sh build spec
    deploy: bash build/build.sh deploy spec

  hooks:
    description: 编译 src/hooks/ Python 源码，产物写入 bin/hooks/current/
    command: bash build/build.sh build hooks
    deploy: bash build/build.sh deploy hooks

  mcp_server:
    description: 编译 src/mcp/ C 源码，产物写入 bin/mcp/
    command: bash build/build.sh build mcp_server

  index:
    description: 生成 index.yaml 并部署到 /brain/base/
    command: bash build/build.sh build index

  stats:
    description: 生成 spec/lep/hooks 覆盖统计，写入 knowledge
    command: bash build/build.sh stats
    outputs:
      - src/base/knowledge/brian_system/spec/spec_stats.yaml
      - src/base/knowledge/brian_system/spec/spec_stats.md

# ── 构建流水线顺序 ────────────────────────────────────────────
pipeline:
  order:
    1: diff    # 对比 base ↔ src，发现差异
    2: merge   # base → src 同步（确保 src 是最新）
    3: build   # src → bin/
    4: deploy  # bin/ → releases/ → /brain/base/
    5: stats   # 生成覆盖统计（可选，按需运行）

# ── 构建门控 ─────────────────────────────────────────────────
build_gate:
  mechanism: current_symlink
  rule: |
    build 开始时删除 bin/{target}/current 符号链接。
    build 成功后重建 current 指向最新版本目录。
    deploy 前检查 current 是否存在——不存在则拒绝部署。
  rationale: current 的存在与否即 build 成功/失败的唯一标志。

# ── 输出格式规范 ─────────────────────────────────────────────
output_format:
  stats:
    dual_output:
      yaml:
        purpose: 机器可读，供构建流水线、脚本消费
        format: 结构化 YAML，含 id/generated_at/spec/lep/hooks 各节
      markdown:
        purpose: 人/LLM 可读，供阅读和上下文加载
        format: Markdown 表格，与 yaml 内容完全一致
    table_columns:
      spec_docs: [ID, Rule, 路径]
      lep_gates: [Gate ID, Rule, Universal, 路径]
      hooks_covered: [Gate ID, Method, Universal, 路径]
      hooks_not_covered: [Gate ID, 原因/Method, Universal, 路径]
    column_rules:
      Rule: |
        对于 spec 文档使用 description 字段。
        对于 LEP gate 使用 rule 字段首行。
        禁止使用 title / name / 标题 / 说明 作为列名。

# ── 注册规范 ─────────────────────────────────────────────────
registration:
  rule: |
    build stats 运行后必须自动更新：
    1. knowledge/registry.yaml — 注册统计文档 ID
    2. knowledge/index.yaml    — 更新 structure 和 quick_lookup
    3. knowledge/brian_system/_index.yaml — 注册 yaml + md 两个文档
  auto_registration: true
  responsible: generate_stats.py
