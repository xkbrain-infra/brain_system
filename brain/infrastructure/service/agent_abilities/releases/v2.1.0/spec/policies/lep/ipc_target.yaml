gate_id: G-GATE-IPC-TARGET
name: IPC Target Validation
applies_to: [ipc_send]
rule: |
  发送 IPC 消息前必须确认目标 agent 存在：
  - 调用 ipc_list_agents 查询在线 agent 列表
  - 目标不在列表中时，不发送并报错
  - Daemon 层强制执行：未注册 agent 拒绝接收消息

enforcement:
  stage: daemon_layer
  method: daemon_validation
  priority: CRITICAL
  note: "需要 daemon 支持 - 当前为推荐性检查"

  triggers:
    mcp_tool: "ipc_send"

  rules:
    target_validation:
      description: "检查目标 agent 是否在线"
      validation_steps:
        - "调用 ipc_list_agents 获取在线 agent"
        - "检查 target 是否在列表中"
        - "不在列表则拒绝发送"

  config:
    check_online_status: true
    allow_offline_agents: false

  block_message: |
    🚫 IPC 目标不存在 (G-IPC-TARGET)

    目标 Agent: {target}

    错误：目标 agent 未注册或不在线

    请先确认：
    1. 使用 ipc_list_agents 查询在线 agent
    2. 确认目标 agent 名称正确
    3. 确认目标 agent 已启动

    可用的 agent:
    {available_agents}

    这是推荐性检查（需要 daemon 集成）。

    参考：/brain/base/spec/core/lep.yaml (G-IPC-TARGET)
bindings:
  hooks:
    stage: pre_tool_use
    trigger_tools: [mcp_ipc_send]
  mcp_tools: ['ipc_send']
  related_skills: []
