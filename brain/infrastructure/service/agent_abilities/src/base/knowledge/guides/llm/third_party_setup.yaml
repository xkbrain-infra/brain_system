## 配置项说明

### 必需配置项

| 配置项 | 说明 | 示例值 |
|-------|------|--------|
| ANTHROPIC_AUTH_TOKEN | API 密钥 | sk-kimi-xxx / sk-api-xxx |
| ANTHROPIC_BASE_URL | API 端点 | https://api.moonshot.cn/anthropic |
| API_TIMEOUT_MS | 超时设置（毫秒） | 3000000 (50分钟) |
| CLAUDE_CODE_DISABLE_NONESSENTIAL_TRAFFIC | 禁用非必要流量 | 1 |
| ANTHROPIC_MODEL | 主模型名称 | kimi-k2.5 / MiniMax-M2.5 |

### 模型配置项

为了兼容 Claude Code 的模型选择机制，需要配置所有模型类型指向同一个第三方模型：

```json
{
  "ANTHROPIC_MODEL": "<MODEL_NAME>",
  "ANTHROPIC_SMALL_FAST_MODEL": "<MODEL_NAME>",
  "ANTHROPIC_DEFAULT_OPUS_MODEL": "<MODEL_NAME>",
  "ANTHROPIC_DEFAULT_SONNET_MODEL": "<MODEL_NAME>",
  "ANTHROPIC_DEFAULT_HAIKU_MODEL": "<MODEL_NAME>"
}
```

### MCP 配置

**必须使用正确的 MCP 服务器路径**:
```
/brain/infrastructure/service/agent_abilities/mcp/brain_ipc_c/brain_ipc_c_mcp_server
```

**错误路径** (旧版本):
```
/brain/base/runtime/engine/src/mcp/brain_ipc_c/brain_ipc_c_mcp_server  # ❌
```

