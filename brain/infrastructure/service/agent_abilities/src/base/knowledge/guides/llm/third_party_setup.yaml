# 第三方 LLM Agent 配置标准

## 概述

本规范定义了使用第三方 LLM API（如 KIMI、MiniMax）的 Claude Code Agent 标准配置模版。

## 适用场景

- 使用 Anthropic API 兼容接口的第三方 LLM
- 需要特定模型能力（如中文优化、长上下文、代码专精）
- 成本优化（使用更便宜的第三方模型）

## 标准配置模版

### 1. settings.local.json 模版

```json
{
  "permissions": {
    "defaultMode": "dontAsk"
  },
  "env": {
    "ANTHROPIC_AUTH_TOKEN": "<API_KEY>",
    "ANTHROPIC_BASE_URL": "<API_ENDPOINT>",
    "API_TIMEOUT_MS": "3000000",
    "CLAUDE_CODE_DISABLE_NONESSENTIAL_TRAFFIC": 1,
    "ANTHROPIC_MODEL": "<MODEL_NAME>",
    "ANTHROPIC_SMALL_FAST_MODEL": "<MODEL_NAME>",
    "ANTHROPIC_DEFAULT_OPUS_MODEL": "<MODEL_NAME>",
    "ANTHROPIC_DEFAULT_SONNET_MODEL": "<MODEL_NAME>",
    "ANTHROPIC_DEFAULT_HAIKU_MODEL": "<MODEL_NAME>"
  },
  "statusLine": {
    "type": "command",
    "command": "input=$(cat); model=$(echo \"$input\" | jq -r '.model.display_name // \"Claude\"'); dir=$(echo \"$input\" | jq -r '.workspace.current_dir // \"~\"'); used=$(echo \"$input\" | jq -r '.context_window.used_percentage // empty'); if [ -n \"$used\" ]; then printf \"%s | %s | Context: %.1f%% used\" \"$model\" \"$dir\" \"$used\"; else printf \"%s | %s\" \"$model\" \"$dir\"; fi"
  },
  "enabledPlugins": {
    "frontend-design@claude-plugins-official": true,
    "context7@claude-plugins-official": true,
    "ralph-loop@claude-plugins-official": true,
    "feature-dev@claude-plugins-official": true,
    "code-review@claude-plugins-official": true,
    "playwright@claude-plugins-official": true,
    "plugin-dev@claude-plugins-official": true,
    "firebase@claude-plugins-official": true,
    "code-simplifier@claude-plugins-official": true,
    "claude-md-management@claude-plugins-official": true,
    "greptile@claude-plugins-official": true
  },
  "language": "中文",
  "mcpServers": {
    "brain-ipc-c": {
      "command": "/brain/infrastructure/service/agent_abilities/mcp/brain_ipc_c/brain_ipc_c_mcp_server",
      "args": [],
      "env": {
        "BRAIN_AGENT_NAME": "<AGENT_NAME>",
        "BRAIN_IPC_AUTOSTART": "1"
      }
    }
  },
  "skipDangerousModePermissionPrompt": true
}
```

### 2. .mcp.json 模版

```json
{
  "mcpServers": {
    "brain-ipc-c": {
      "command": "/brain/infrastructure/service/agent_abilities/mcp/brain_ipc_c/brain_ipc_c_mcp_server",
      "args": [],
