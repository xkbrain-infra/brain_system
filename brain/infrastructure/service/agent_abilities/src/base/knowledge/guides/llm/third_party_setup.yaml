## 故障排查

### 问题 1: MCP 服务器连接失败

**症状**: `brain-ipc-c · ✘ failed`

**解决**:
```bash
# 检查路径是否正确
cat .mcp.json | grep command

# 应该是
/brain/infrastructure/service/agent_abilities/mcp/brain_ipc_c/brain_ipc_c_mcp_server
```

### 问题 2: 模型验证失败

**症状**: "There's an issue with the selected model"

**解决**:
1. 检查 API Key 是否有效
2. 检查 API Endpoint 是否正确
3. 检查模型名称是否正确
4. 尝试使用 curl 直接调用 API 测试

```bash
curl -X POST https://api.moonshot.cn/anthropic/v1/messages \
  -H "anthropic-version: 2023-06-01" \
  -H "x-api-key: $ANTHROPIC_API_KEY" \
  -H "content-type: application/json" \
  -d '{"model":"kimi-k2.5","max_tokens":100,"messages":[{"role":"user","content":"Hello"}]}'
```

### 问题 3: API 超时

**症状**: Request timeout

**解决**:
- 增加 `API_TIMEOUT_MS` 值
- 检查网络连接
- 检查第三方 API 服务状态

