## Secrets 管理

### API Keys 存储路径

```
/brain/secrets/system/agents/llm_tokens.env
```

### 标准格式

```env
# ============================================================
# Kimi (月之暗面) - Anthropic API 兼容接口
# ============================================================
ANTHROPIC_API_KEY=sk-kimi-xxx
ANTHROPIC_BASE_URL=https://api.moonshot.cn/anthropic/

KIMI_API_KEY=sk-kimi-xxx
KIMI_API_BASE=https://api.moonshot.cn/v1
KIMI_MODEL=moonshot-v1-32k

# ============================================================
# MiniMax
# ============================================================
MINIMAX_API_KEY=sk-api-xxx
MINIMAX_API_BASE=https://api.minimax.chat/v1
MINIMAX_MODEL=abab5.5-chat
```

### Secrets 索引

更新 `/brain/secrets/index.yaml`:

```yaml
categories:
  system:
    agents:
      enabled: true
      description: "Agent API tokens"
      env_vars:
        - ANTHROPIC_API_KEY
        - ANTHROPIC_BASE_URL
        - KIMI_API_KEY
        - KIMI_API_BASE
        - KIMI_MODEL
        - MINIMAX_API_KEY
        - MINIMAX_API_BASE
        - MINIMAX_MODEL
```

## 创建流程

### 1. 准备 API Key

从第三方 LLM 提供商获取 API Key：
- KIMI: https://platform.moonshot.cn
- MiniMax: https://api.minimax.chat

### 2. 存储 Secrets

```bash
# 编辑 secrets 文件
vim /brain/secrets/system/agents/llm_tokens.env

# 重新加载环境变量
python /brain/infrastructure/launch/loader_env_vars.py --reload
```

### 3. 创建 Agent 目录结构

```bash
AGENT_NAME="agent_kimi_coder"
GROUP_PATH="/brain/groups/org/brain_system/agents"

mkdir -p "${GROUP_PATH}/${AGENT_NAME}/.claude"
```

### 4. 配置文件生成

使用模版生成以下文件：
- `.claude/settings.local.json`
- `.mcp.json`
- `CLAUDE.md`

### 5. 启动 Agent

```bash
cd /brain/groups/org/brain_system/agents/agent_kimi_coder

# 使用指定模型启动
claude --model kimi-k2.5 --dangerously-skip-permissions

# 或使用默认配置启动
claude --dangerously-skip-permissions
```

### 6. 验证配置

启动后检查：
- ✅ MCP 服务器连接成功 (brain-ipc-c · ✓)
- ✅ 模型显示正确 (如 "kimi-k2.5" 或 "MiniMax-M2.5")
- ✅ API 连接正常（发送测试消息）

## 注意事项

### ⚠️ 禁止事项

1. **禁止使用 export 命令**
   ```bash
   # ❌ 错误
   export ANTHROPIC_API_KEY=xxx
   export ANTHROPIC_BASE_URL=xxx

   # ✅ 正确
   # 所有配置都在 settings.local.json 中
   ```

2. **禁止使用旧版 MCP 路径**
   ```
   # ❌ 错误
   /brain/base/runtime/engine/src/mcp/brain_ipc_c/brain_ipc_c_mcp_server

   # ✅ 正确
   /brain/infrastructure/service/agent_abilities/mcp/brain_ipc_c/brain_ipc_c_mcp_server
   ```

3. **禁止直接修改全局环境变量**
   - 每个 agent 应该有独立的 settings.local.json
   - 不要修改系统级别的 Claude Code 配置

### ✅ 最佳实践

1. **统一模型配置**
   - 所有模型类型 (opus/sonnet/haiku) 都指向同一个第三方模型
   - 这样可以避免模型选择错误

2. **超时设置**
   - `API_TIMEOUT_MS: 3000000` (50分钟)
   - 第三方 API 可能比 Anthropic 慢，需要更长超时

3. **禁用非必要流量**
   - `CLAUDE_CODE_DISABLE_NONESSENTIAL_TRAFFIC: 1`
   - 减少不必要的 API 调用，节省成本

4. **语言设置**
   - `"language": "中文"`
   - KIMI 和 MiniMax 都对中文优化，建议设置中文

