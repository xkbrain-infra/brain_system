# Telegram API Specification
# Telegram Bot API 接口规范

api:
  id: "INT-TELEGRAM-BOT-API"
  version: "1.0"
  last_updated: "2026-01-17"

  service:
    name: "agent_approval_gateway"
    location: "/brain/groups/brain_system_group/projects/agent_approval_gateway"
    type: "telegram_bot"
    status: "active"

  endpoints:
    send_message:
      description: "发送消息到 Telegram"
      method: "API_CALL"
      interface: |
        def send_telegram_message(
            message: str,
            options: Optional[List[Dict]] = None,
            await_response: bool = False,
            timeout: int = 3600
        ) -> Union[str, Dict]:
            """
            Send a message to user via Telegram bot.

            Args:
                message: The message text (supports Markdown)
                options: List of button options for user to choose
                await_response: Whether to wait for user response
                timeout: Timeout in seconds for user response

            Returns:
                If await_response=False: message_id
                If await_response=True: user_response dict
            """

      example_usage: |
        # Simple notification
        send_telegram_message(
            message="Task completed successfully!",
            await_response=False
        )

        # Request approval
        response = send_telegram_message(
            message="Do you approve this action?",
            options=[
                {"label": "Approve", "action": "approve"},
                {"label": "Reject", "action": "reject"}
            ],
            await_response=True,
            timeout=1800
        )

    send_approval_request:
      description: "发送审批请求"
      method: "API_CALL"
      interface: |
        def send_approval_request(
            title: str,
            description: str,
            context: Dict,
            options: List[Dict],
            timeout: int = 3600
        ) -> Dict:
            """
            Send an approval request with structured context.

            Args:
                title: Brief title of the request
                description: Detailed description
                context: Contextual information (dict)
                options: List of approval options
                timeout: Timeout in seconds

            Returns:
                Dict with keys: decision, timestamp, details
            """

      example_usage: |
        decision = send_approval_request(
            title="Scope Deviation Detected",
            description="Planned 6 regions, only 1 succeeded",
            context={
                "project": "fullfill_collection_db",
                "planned": ["US", "UK", "HK", "JP", "World", "Macro"],
                "actual": ["US"],
                "reason": "CAPTCHA blocking"
            },
            options=[
                {"label": "Continue partial", "action": "continue_partial"},
                {"label": "Abort", "action": "abort"},
                {"label": "Discuss", "action": "discuss"}
            ],
            timeout=3600
        )

    send_notification:
      description: "发送通知（无需响应）"
      method: "API_CALL"
      interface: |
        def send_notification(
            level: str,  # "INFO", "WARNING", "ERROR", "CRITICAL"
            message: str,
            details: Optional[Dict] = None
        ) -> str:
            """
            Send a notification without expecting response.

            Args:
                level: Notification level
                message: Notification message
                details: Additional details (optional)

            Returns:
                message_id
            """

      example_usage: |
        send_notification(
            level="INFO",
            message="Download completed: 27M rows loaded",
            details={
                "duration": "26 minutes",
                "rows": 27052245,
                "symbols": 12158
            }
        )

  timeout_handling:
    default_timeout: 3600  # 1 hour
    max_timeout: 86400  # 24 hours

    on_timeout:
      - action: "send_reminder"
        trigger: "50% of timeout elapsed"

      - action: "send_urgent_reminder"
        trigger: "90% of timeout elapsed"

      - action: "mark_as_blocked"
        trigger: "timeout reached"

      - action: "log_timeout_event"
        target: "memory/logs/{date}/telegram_timeouts.yaml"

  retry_policy:
    network_failures:
      max_retries: 3
      retry_delay: [5, 10, 20]  # seconds
      exponential_backoff: true

    rate_limiting:
      max_messages_per_minute: 20
      max_messages_per_hour: 100
      on_rate_limit:
        action: "queue_and_batch"
        batch_interval: 60  # seconds

  security:
    message_validation:
      max_message_length: 4096
      sanitize_input: true
      escape_html: true

    authentication:
      verify_user_id: true
      allowed_users:
        - "{user_id_from_env}"

    encryption:
      in_transit: true  # Telegram API uses HTTPS
      at_rest: false  # Messages not stored

  logging:
    log_all_interactions: true
    log_path: "memory/logs/{date}/telegram_interactions.yaml"

    log_fields:
      - "timestamp"
      - "message_id"
      - "direction"  # "outbound" or "inbound"
      - "message_type"  # "notification", "approval_request", "response"
      - "message_preview"  # First 100 chars
      - "user_action"
      - "response_time"  # For approval requests

    retention_days: 90

  error_handling:
    telegram_api_errors:
      - error_code: 429  # Too Many Requests
        action: "apply_rate_limiting"
        retry: true

      - error_code: 400  # Bad Request
        action: "log_and_notify_developer"
        retry: false

      - error_code: 401  # Unauthorized
        action: "check_bot_token"
        retry: false

      - error_code: 403  # Forbidden
        action: "check_user_permissions"
        retry: false

    network_errors:
      - error_type: "timeout"
        action: "retry_with_exponential_backoff"
        max_retries: 3

      - error_type: "connection_refused"
        action: "check_service_status"
        notify_admin: true

  testing:
    dry_run_mode:
      enabled: false
      description: "Log messages instead of sending to Telegram"
      log_path: "memory/logs/{date}/telegram_dry_run.yaml"

    test_user:
      enabled: false
      user_id: "{test_user_id}"
      description: "Send test messages to specific test user"

  integration_verification:
    healthcheck:
      endpoint: "check_bot_status"
      interval: 300  # 5 minutes
      actions_on_failure:
        - "log_warning"
        - "attempt_reconnection"
        - "notify_admin_if_persistent"

    connectivity_test:
      command: "send_test_message"
      expected_response: "success"
      timeout: 30
