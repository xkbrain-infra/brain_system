# /brain/base/workflow/index.yaml
# Brain 系统级通用流程 DSL 入口

workflow_index:
  id: "WF-BASE-INDEX"
  version: "1.1"
  last_updated: "2026-02-22"
  intent: "项目生命周期 + 运行时执行编排 + 操作规范"

# ============================================
# 目录结构
# ============================================
structure:
  lifecycle/:
    project.yaml: "项目全生命周期（S1-S4 提案 → Gate → S5-S8 执行设计）"
    governance.yaml: "四域联动审核（SPEC/WORKFLOW/KNOWLEDGE/EVOLUTION 变更门控）"
  execution/:
    runtime.yaml: "PMO 治理 + Orchestrator 执行编排循环"
    dsl.yaml: "Task/Project/Group 三层状态机定义"
  operations/:
    update_brain.yaml: "update_brain 操作规范（pending→review→merge→archive）"

# ============================================
# 文件索引
# ============================================
files:
  lifecycle/project.yaml:
    id: "WF-PROJECT-001"
    desc: "项目生命周期（Phase 1 提案 S1-S4 + Gate + Phase 2 执行设计 S5-S8）"
    load_when: "新需求/项目进入任何阶段"
    replaces: ["proposal.yaml", "initiation.yaml", "spec_design.yaml"]

  lifecycle/governance.yaml:
    id: "WF-GOVERNANCE-001"
    desc: "四域联动审核（SPEC/WORKFLOW/KNOWLEDGE/EVOLUTION 变更门控）"
    load_when: "四域任一变更时"

  execution/runtime.yaml:
    id: "WF-RUNTIME-001"
    desc: "PMO 治理 + Orchestrator 执行编排循环"
    load_when: "运行时事件处理（常驻加载）"

  execution/dsl.yaml:
    id: "WF-DSL-001"
    desc: "Task/Project/Group 三层状态机定义"
    load_when: "理解状态流转规则时"

  operations/update_brain.yaml:
    id: "WF-OPS-UPDATE-BRAIN-001"
    desc: "update_brain 操作规范：pending 提交→审核→合并→归档完整流程"
    load_when: "需要向 /brain/base/ 提交变更时"

# ============================================
# 继承规则
# ============================================
inheritance:
  base_ssot: "/brain/base/workflow"
  group_extension_root: "/brain/groups/org/{group}/workflow"
  rule: "Group 只能扩展，不可弱化 Base 的强制 gate"

# ============================================
# 快速查找
# ============================================
quick_ref:
  新需求如何开始: "/brain/base/workflow/lifecycle/project.yaml#phase_1_proposal"
  提案批准后如何执行: "/brain/base/workflow/lifecycle/project.yaml#phase_2_execution"
  Go/No-Go门控: "/brain/base/workflow/lifecycle/project.yaml#go_no_go_gate"
  PMO治理事件循环: "/brain/base/workflow/execution/runtime.yaml"
  PMO执行编排: "/brain/base/workflow/execution/runtime.yaml#pmo_execution_loop"
  四域审核门控: "/brain/base/workflow/lifecycle/governance.yaml"
  状态机定义: "/brain/base/workflow/execution/dsl.yaml"
  如何更新base: "/brain/base/workflow/operations/update_brain.yaml"
