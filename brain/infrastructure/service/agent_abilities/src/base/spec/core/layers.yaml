# Brain 架构原则

layers:
  base:
    path: /brain/base
    role: 规范层 — 只读，定义规则、结构、约束（无代码）
    domains:
      - spec/: 规范定义 (YAML)
      - workflow/: 流程 DSL
      - knowledge/: 知识库
      - evolution/: 演进引擎
      - skills/: Agent 能力定义

  runtime:
    path: /brain/runtime
    role: 能力层 — 执行引擎、编排、数据存储（代码在此）
    components:
      - engine/: IPC daemon, MCP server, timer, gateway, audit
      - agent_orchestrator/: Agent 生命周期管理
      - agent_dashboard/: 监控仪表板
      - data/: 运行时数据库 (SQLite)
      - logs/: 全局日志

  groups:
    path: /brain/groups/{group}/
    role: 项目层 — 设计文档、Agent 配置、项目规范

  app:
    path: /app/groups/{group}/{workbench}/
    role: 业务代码层 — 实际业务代码

paths:
  brain_project: /brain/groups/{group}/projects/{project}/
  app_codebase: /app/groups/{group}/{workbench}/domain/{project}/
  runtime_engine: /brain/runtime/engine/
  runtime_orchestrator: /brain/runtime/agent_orchestrator/

rules:
  - Brain 描述现实，不是理想
  - base/ 不包含代码（无 src/, *.py）— 代码在 runtime/
  - runtime/ 是 base/ 的执行层，两者平级不嵌套
  - Brain 与 App 不一致时，优先修正 Brain
  - 路径映射必须准确

anti_patterns:
  - pattern: /brain/base/.../src/
    error: base 层不放代码，代码属于 runtime/
  - pattern: Brain spec ≠ 实际代码
    error: 认知脱节，优先修正 Brain
