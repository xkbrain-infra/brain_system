# Problem Solving Workflow
# 遇到问题时的分层查找流程

id: WF-PROBLEM-SOLVING
version: "1.0"

trigger: [error_occurred, solution_unknown, auto_recovery_failed]

# 核心流程：Project → Group → Base
search_order:
  - level: project
    paths:
      - "{project_root}/spec/troubleshooting.yaml"
      - "{project_root}/spec/known_issues.yaml"
    threshold: 0.7

  - level: group
    paths:
      - "{group_root}/spec/troubleshooting.yaml"
      - "{group_root}/knowledge/*.yaml"
    threshold: 0.6

  - level: base
    paths:
      - /brain/base/knowledge/troubleshooting/*.yaml
    threshold: 0.5

# 工作流
workflow:
  1_categorize:
    extract: [problem_category, severity, keywords, error_pattern]
    categories: [network, data, auth, resource, config, logic]

  2_search:
    for_each_level: search_order
    match: [category, keywords, error_pattern]
    select: applicability_score >= threshold

  3_validate:
    check: [prerequisites, permissions, conflicts]
    assess_risk: [low, medium, high]
    auto_apply_if: risk == low OR (risk == medium AND reversible)

  4_apply_or_escalate:
    if_found_and_safe: execute_solution
    if_found_but_risky: request_approval
    if_not_found: escalate_to_user

# 解决方案文档格式
solution_schema:
  fields: [id, category, keywords, error_patterns, description, steps, risk_level, reversible, prerequisites]
  example:
    id: PROB-001
    category: network
    keywords: [timeout, connection]
    error_patterns: [ReadTimeout, ConnectionError]
    steps: [增加 timeout, 启用重试]
    risk_level: low
    reversible: true

# 日志
logging:
  path: memory/logs/{date}/problem_solving.yaml
  retention: 90 days
  track: [problems_count, solutions_found_rate, auto_resolution_rate]

# 持续改进
continuous_improvement:
  - 新解决方案自动记录到对应层级
  - 成功应用后提升 confidence
