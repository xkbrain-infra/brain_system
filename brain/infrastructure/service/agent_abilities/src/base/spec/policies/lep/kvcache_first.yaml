gate_id: G-GATE-KVCACHE-FIRST
name: Query Registry Before Read/Write
applies_to: [read, write]
rule: |
  必须优先使用索引系统（registry.yaml）查找文档，禁止盲目搜索。
  - 查找文档时：先读 registry.yaml，在 quick_lookup 中搜索关键词，获取路径后再读取
  - 创建文件时：先查询 index.yaml 了解目录结构，避免重复或冲突
  - 索引系统是设计好的快速定位机制，绕过索引等同于规范失效

enforcement:
  stage: pre_tool_use
  method: python_inline
  priority: HIGH
  note: "强制性检查 - 必须优先使用 registry.yaml 索引系统"

  triggers:
    tools: [Read, Write, Edit, Grep, Glob]
    context_check:
      description: "检查会话历史中是否查询过 registry.yaml 或 index.yaml"
      lookback_messages: 10

  rules:
    require_registry_first:
      message: "必须先查询 registry.yaml 快速定位文档"
      registry_files:
        - "/brain/base/spec/registry.yaml"
        - "/brain/base/workflow/registry.yaml"
        - "/brain/base/knowledge/registry.yaml"
        - "/brain/base/evolution/registry.yaml"
      index_files:
        - "/brain/base/index.yaml"
        - "/brain/groups/spec/index.yaml"
        - "/brain/groups/**/projects/**/index.yaml"

  warn_message: |
    ⚠️ 必须优先使用索引系统 (G-KVCACHE-FIRST)

    当前操作: {operation}
    目标文件: {file_path}

    ❌ 禁止行为：
    - 盲目使用 Read/Grep/Glob 搜索文档
    - 直接猜测文件路径

    ✅ 正确流程：
    1. 查找文档时：
       - 读取 /brain/base/{domain}/registry.yaml
       - 在 quick_lookup 中搜索关键词
       - 获取文档 ID 和路径后再读取
    2. 创建文件时：
       - 读取相关 index.yaml 了解目录结构
       - 避免重复或冲突

    索引文件：
    - /brain/base/spec/registry.yaml (SPEC 域, 35 文档, 71 关键词)
    - /brain/base/workflow/registry.yaml (WORKFLOW 域)
    - /brain/base/knowledge/registry.yaml (KNOWLEDGE 域)
    - /brain/base/evolution/registry.yaml (EVOLUTION 域)
    - /brain/base/index.yaml (全局索引)

    参考：/brain/base/spec/core/lep.yaml (G-KVCACHE-FIRST)
    原因：如果设计者都不用索引系统，索引就失效了。
bindings:
  hooks:
    stage: pre_tool_use
    trigger_tools: [Read, Write, Edit]
  mcp_tools: []
  related_skills: []
