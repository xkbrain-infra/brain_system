# Minimal LEP config for testing
actions:
  read: [open, search]
  write: [create, update]
  delete: [remove]

gates:
  TEST-BLOCK-GATE:
    name: Test Blocking Gate
    applies_to: [write]
    rule: Test gate that blocks

    enforcement:
      stage: pre_tool_use
      method: inline
      priority: CRITICAL

      triggers:
        tools: [Write]

      patterns:
        test_pattern:
          - pattern: "forbidden"
            message: "Forbidden pattern detected"

      block_message: |
        TEST BLOCK: {file_path}
        {message}

  TEST-WARN-GATE:
    name: Test Warning Gate
    applies_to: [write]
    rule: Test gate that warns

    enforcement:
      stage: pre_tool_use
      method: inline
      priority: MEDIUM

      triggers:
        tools: [Write]

      patterns:
        warn_pattern:
          - pattern: "warning"
            message: "Warning pattern detected"

      warn_message: |
        TEST WARN: {file_path}
        {message}
