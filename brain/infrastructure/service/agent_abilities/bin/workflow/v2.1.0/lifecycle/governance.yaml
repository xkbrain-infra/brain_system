# /brain/base/workflow/lifecycle/governance.yaml

four_domain_governance:
  id: "WF-GOV-001"
  version: "0.2"
  intent: "保证 spec/evolution/knowledge/workflow 四域变更联动，不出现单点漂移"

domains:
  spec:
    root: "/brain/base/spec"
    responsibility: "当前世界是什么 — 规则、结构、约束定义"
    key_files:
      - "/brain/base/spec/core/lep.yaml"
      - "/brain/base/spec/core/architecture.yaml"
      - "/brain/base/spec/core/workflow.yaml"
  evolution:
    root: "/brain/base/evolution"
    responsibility: "下一世界是什么 — 能力评估、升级提案、演进方向"
    key_files:
      - "/brain/base/evolution/index.yaml"
      - "/brain/base/evolution/cycle.yaml"
      - "/brain/base/evolution/proposal.yaml"
  knowledge:
    root: "/brain/base/knowledge"
    responsibility: "过去经验是什么 — 故障案例、可复用认知"
    key_files:
      - "/brain/base/knowledge/troubleshooting/"
  workflow:
    root: "/brain/base/workflow"
    responsibility: "当前世界如何运转 — PMO 事件链、状态机、触发协议"
    key_files:
      - "/brain/base/workflow/execution/dsl.yaml"
      - "/brain/base/workflow/execution/runtime.yaml"
      - "/brain/base/workflow/lifecycle/governance.yaml"

coupling_rules:
  - when: "spec changed"
    must_check: [workflow, evolution, knowledge]
    reason: "规则变化会影响执行、演进与经验解释"
  - when: "workflow changed"
    must_check: [spec, evolution, knowledge]
    reason: "流转变化会影响规范约束、升级路径与知识模板"
  - when: "evolution changed"
    must_check: [spec, workflow, knowledge]
    reason: "演进路线变化会影响门控、编排与操作手册"
  - when: "knowledge changed"
    must_check: [spec, workflow, evolution]
    reason: "新经验可能要求规则和流程补丁，也可能触发演进评估"

review_gate:
  id: "G-FOUR-DOMAIN-SYNC"
  applies_to:
    - "/brain/base/spec/**"
    - "/brain/base/evolution/**"
    - "/brain/base/knowledge/**"
    - "/brain/base/workflow/**"
  rule: "四域任一发生变更，必须完成影响扫描与联动确认后才能标记完成"

review_flow:
  R1_detect:
    action: "识别变更域与变更类型 (新增/修改/删除)"
  R2_impact_scan:
    action: "生成受影响域清单与需要同步的文件列表"
  R3_patch_plan:
    action: "为受影响域生成补丁任务 (task 列表)"
  R4_verify:
    action: "逐项验证引用、状态、索引、门控一致性"
  R5_approve:
    action: "负责人确认后关闭变更"

minimum_checks:
  - "索引引用路径可解析且存在"
  - "门控规则未被弱化"
  - "流程状态机与角色职责无冲突"
  - "新增知识已映射到可执行流程或规范"

outputs:
  impact_report: "memory/reviews/{date}/four_domain_impact.yaml"
  sync_tasks: "memory/reviews/{date}/sync_tasks.yaml"
  approval_record: "memory/reviews/{date}/approval.yaml"
