# /brain/base/workflow/execution/runtime.yaml
# 双角色模型: PMO（治理） + Orchestrator（执行编排）
# 设计来源: BS-023-orchestrator (2026-02-21)

runtime_workflow:
  id: "WF-RUNTIME-001"
  version: "0.4"
  intent: |
    PMO 负责治理、审批、跨组沟通、风险升级。
    Orchestrator 负责执行编排：team composition、plan 生成、agent 分配、进度跟踪、memory 沉淀。
    状态持久化依赖 task_manager service + timer service，不依赖 LLM 上下文。
  changelog:
    "0.4": "引入 Orchestrator 角色（BS-023），PMO 卸载执行编排职责"
    "0.3": "PMO 自驱动事件链（已废弃：PMO 职责过重）"

# ============================================
# 基础设施原语
# ============================================
primitives:
  ipc_direct:
    purpose: "Agent 间点对点通信"
    required_fields: [msg_id, from, to, type, body, priority, ts]

  timer_service:
    purpose: "定时触发 IPC，不依赖 agent 自发延时"
    usage: "service-timer 按配置周期向目标 agent 发送 IPC（PROJECT_STATUS_CHECK / 日报 tick 等）"
    replaces: "原 ipc_send_delayed(to=self) 自提醒模式"

  task_manager:
    purpose: "项目/任务状态机服务，权威状态来源"
    operations: [CREATE_PROJECT, TASK_CREATE, TASK_UPDATE, TASK_STATS, TASK_PIPELINE_CHECK, PROJECT_DEPENDENCY_SET]
    authority: "Orchestrator 写入，PMO/timer 查询"

  agentctl:
    purpose: "Agent 生命周期管理"
    operations: [start, stop, restart, purge, list]
    naming:
      permanent:  "agent_{group}_{role}"
      temporary:  "agent_{group}_{role}_{project_id}"
    constraint: "只能基于 agents_registry.yaml 已注册角色实例化"

  runtime_registry:
    purpose: "Agent 在线状态注册表"
    check: "ipc_list_agents"

# ============================================
# PMO 治理循环
# ============================================
pmo_governance_loop:
  summary: |
    PMO 是流程负责人和治理方，不负责执行细节。
    核心职责：需求对齐（S1-S8）、审批 Orchestrator plan、跨组协调、风险升级。
    不再负责：task 派发、agent 扩缩容、进度轮询（由 Orchestrator 承担）。

  # ─── 1. 接收需求（走 Spec S1-S8 流程）───
  on_receive_requirement:
    trigger: "user IPC / agent 升级上报 / governance 评审产出"
    steps:
      1_create_spec:
        action: |
          PMO 创建 SPEC 目录和 00_index.yaml:
            mkdir -p {group_root}/spec/{spec_id}/
            写 00_index.yaml (id, title, status=in_progress, owner=pmo, created_at)
        output: "{proposal_root}/00_index.yaml"
        note: "spec_id 格式: {group_prefix}-{seq}-{short_name}，如 BS-023-orchestrator"

      2_S1_alignment:
        action: "PMO 写 01_alignment.yaml: 目标、范围、成功标准、角色边界"
        owner: pmo
        output: "{proposal_root}/01_alignment.yaml"

      3_S2_requirements:
        action: "PMO 写 02_requirements.yaml: must-have / nice-to-have / NFR"
        owner: pmo
        output: "{proposal_root}/02_requirements.yaml"

      4_S3_S5_design:
        action: |
          PMO 派 architect 执行 S3-S5:
            ipc_send(to=architect, "请完成 {spec_id} 的技术设计，产出: {proposal_root}/03_research.yaml, 04_analysis.yaml, 05_solution.yaml")
        owner: architect
        output:
          - "{proposal_root}/03_research.yaml"
          - "{proposal_root}/04_analysis.yaml"
          - "{proposal_root}/05_solution.yaml"
        note: "architect 必须将设计落盘到 spec 目录，禁止只在 IPC 消息中口头描述"

      5_S6_tasks:
        action: "PMO 基于 05_solution.yaml 拆分任务，写 06_tasks.yaml"
        owner: pmo
        output: "{proposal_root}/06_tasks.yaml"

      6_dispatch_to_pmo:
        action: |
          ipc_send(to=agent-system_pmo,
            type=ORCHESTRATE_REQUEST,
            body={spec_id, spec_root, task_type, complexity, key_deliverables})
        note: "PMO 不再直接派任务给 dev/qa/devops，改为发给 Orchestrator 执行编排"

  # ─── 2. 审批 Orchestrator 提交的执行计划 ───
  on_approval_request:
    trigger: "Orchestrator → PMO: APPROVAL_REQUEST"
    steps:
      1_review:
        action: |
          PMO 审查：
            - plan_summary: 计划是否覆盖所有 must-have 需求
            - team_roster: 角色是否匹配 task_type × complexity
            - risk_level: 是否需要更多资源或特殊约束
      2_decide:
        approved:
          action: "ipc_send(to=pmo, type=APPROVAL_RESPONSE, body={decision: approved})"
          optional: "可在 body 中指定特定 agent 或资源约束（Orchestrator 优先采用）"
        rejected:
          action: "ipc_send(to=pmo, type=APPROVAL_RESPONSE, body={decision: rejected, reason, revision_request})"
      3_record:
        action: "记录审批决策到 {group_workflow_root}/pmo/decisions/{date}.yaml"

  # ─── 3. 接收进度报告（监控，不干预）───
  on_progress_report:
    trigger: "Orchestrator → PMO: PROGRESS_REPORT"
    steps:
      1_record:
        action: "记录到 PMO board.yaml + decision_log（供人工查看）"
      2_assess:
        action: "评估是否有需要 PMO 干预的风险"
        if_normal: "无需动作"
        if_concerning: "可主动向 Orchestrator 发 IPC 询问"

  # ─── 4. 接收项目完成通知 ───
  on_project_complete:
    trigger: "Orchestrator → PMO: PROJECT_COMPLETE"
    steps:
      1_receive:
        action: "确认 project_id, summary, deliverables, retrospective_path"
      2_qa_verify:
        action: |
          根据 task 类型决定验收路径：
            dev_task → 派 qa 执行测试用例
            deploy_task → 派 qa 验证环境
            research/design → PMO 确认文档齐全
      3_deploy_if_needed:
        action: "→ 触发 on_deployment（如项目包含部署步骤）"
      4_close:
        action: "Project → RELEASED/DONE，通知 user（via frontdesk）"

  # ─── 5. 升级处理（来自 Orchestrator 上报）───
  on_escalation:
    trigger: "Orchestrator → PMO: ESCALATION（task 持续 blocked / scope 变化 / critical risk）"
    steps:
      1_assess:
        action: "评估原因: 资源不足 / 需求不清 / 技术障碍 / agent 离线 / scope 变化"
      2_decide:
        options:
          - "授权 Orchestrator 增加资源（更多 agent 或不同角色）"
          - "调整 scope：ipc_send(to=pmo, type=SCOPE_REVISION, body=...)"
          - "升级到 group governance review"
          - "通知 user 需要额外资源"
      3_respond:
        action: "ipc_send(to=pmo, type=ESCALATION_RESPONSE, body={decision, action, extra_resources})"
      4_record:
        action: "记录升级决策到 decision_log"

  # ─── 6. 部署流程 ───
  on_deployment:
    trigger: "Project DONE + 包含部署步骤"
    principle: "PMO 指挥，devops 执行，qa 验证，PMO 不亲自操作"
    steps:
      1_deploy_test:
        action: "PMO → devops: 部署到测试环境"
      2_qa_verify_test:
        action: "PMO → qa: 测试环境执行完整测试用例"
        if_pass: "→ step 3"
        if_fail: "回滚 + 创建修复任务 → 重新走 Orchestrator 流程"
      3_deploy_prod:
        action: "PMO → devops: 部署到生产环境（需 PMO 明确确认）"
      4_qa_verify_prod:
        action: "PMO → qa: 生产环境冒烟测试"
        if_pass: "Project → RELEASED，通知 user"
        if_fail: "回滚生产 → 重新验证"

# ============================================
# Orchestrator 执行编排循环
# ============================================
pmo_execution_loop:
  summary: |
    Orchestrator 是项目执行层的 Supervisor。
    负责：team composition、plan 生成、agent 分配、进度跟踪、memory 沉淀。
    不负责：代码实现、测试执行、部署操作（这些是 worker agents 的事）。
  reference: "完整技术规范见 /brain/groups/org/brain_system/spec/BS-023-orchestrator/05_solution.yaml"

  # ─── 1. 接收任务 ───
  on_task_received:
    trigger: "PMO / agent_manager → Orchestrator: ORCHESTRATE_REQUEST"
    steps:
      1_analyze:
        action: "分析 task_type（bugfix/feature/infrastructure/research/refactor）和 complexity（small/medium/large）"
      2_compose_team:
        action: "查 composition_rules 矩阵 → 得出 team_roster（{role: count}）"
        rules: "见 composition_rules 章节"
      3_generate_plan:
        action: "生成结构化 plan（phases / tasks / 依赖图 / critical_path）"
      4_request_approval:
        action: "ipc_send(to=pmo, type=APPROVAL_REQUEST, body={plan_summary, team_roster, estimated_duration, risk_level})"

  # ─── 2. 计划批准后初始化 ───
  on_pmo_approved:
    trigger: "PMO → Orchestrator: APPROVAL_RESPONSE（decision=approved）"
    steps:
      1_init_workspace:
        action: |
          创建项目目录: {group_root}/projects/{project_id}/
            spec_context/: lep_gates_summary.yaml + roles/{role}.md + workflow_ref.yaml
            orchestration/: plan.yaml, team_roster.yaml, execution_log.jsonl（空）, decisions.yaml
            tasks/: 空目录（task cards 写入时创建）
            memory/: 空目录（项目完成时写入）
      2_write_current_project:
        action: "write({agent_workdir}/.current_project, content={project_id})"
        note: "写入后，PostToolUse hook 自动开始写 execution_log.jsonl"
      3_create_in_task_manager:
        action: "ipc_send(to=service-task_manager, type=CREATE_PROJECT + TASK_CREATE × N)"
      4_spawn_agents:
        action: "agentctl start agent_{group}_{role}_{project_id} --apply（按 team_roster 逐个）"
      5_assign_ready_tasks:
        action: "将所有 depends_on=[] 的初始 READY tasks 分配给对应 agent"

  # ─── 3. Timer 周期检查 ───
  on_timer_ping:
    trigger: "service-timer → Orchestrator: PROJECT_STATUS_CHECK"
    steps:
      1_query_stats:
        action: "ipc_send(to=service-task_manager, type=TASK_STATS)"
      2_assign_newly_ready:
        action: "将新 READY 的 tasks（依赖已完成）分配给可用 agent"
      3_handle_blocked:
        condition: "任何 task.status == BLOCKED"
        action: "LLM 判断：重新分配 / replan / escalate_to_pmo"
        escalate_when: "同一 task blocked_count >= 2"
      4_check_completion:
        condition: "all tasks DONE"
        if_true: "→ 触发 on_project_complete"
      5_report_to_pmo:
        action: "ipc_send(to=pmo, type=PROGRESS_REPORT, body={completed, active, blocked, pct_done})"

  # ─── 4. Worker agent 回报 ───
  on_agent_report:
    trigger: "worker agent → Orchestrator: TASK_REPORT"
    steps:
      1_update_status:
        action: "ipc_send(to=service-task_manager, type=TASK_UPDATE, body={task_id, status:DONE, outputs, evidence})"
      2_record:
        action: "append to orchestration/decisions.yaml: '{agent} 完成 {task_id}，产出: {outputs}'"
      3_assign_next:
        action: "检查是否有新 READY tasks → 分配给空闲 agent"

  # ─── 5. 项目完成 ───
  on_project_complete:
    trigger: "所有 tasks DONE（在 on_timer_ping 或 on_agent_report 中检测）"
    steps:
      1_verify:
        action: "ipc_send(to=service-task_manager, TASK_STATS)，断言所有 task 状态在 [DONE, VERIFIED]"
      2_write_retrospective:
        action: "write({project_root}/memory/retrospective.yaml)：计划 vs 实际、阻塞分析、经验教训"
      3_distill_knowledge:
        action: "write({group_root}/knowledge/orchestration/{project_id}_summary.yaml)：team composition 决策、关键阻塞、可复用经验"
      4_purge_agents:
        action: "agentctl purge agent_{group}_{role}_{project_id} --apply（所有临时 agent）"
      5_clear_current_project:
        action: "delete({agent_workdir}/.current_project)"
        note: "删除后，PostToolUse hook 停止写 execution_log.jsonl"
      6_report_completion:
        action: "ipc_send(to=pmo, type=PROJECT_COMPLETE, body={project_id, summary, deliverables, retrospective_path})"

# ============================================
# Team Composition 规则矩阵
# ============================================
composition_rules:
  bugfix:
    small:  {dev: 1, qa: 1}
    medium: {dev: 1, qa: 1}
    large:  {architect: 1, dev: 1, qa: 1}
  feature:
    small:  {dev: 1, qa: 1}
    medium: {architect: 1, dev: 1, qa: 1}
    large:  {architect: 1, dev: 2, qa: 1, devops: 1}
  infrastructure:
    small:  {devops: 1, qa: 1}
    medium: {architect: 1, devops: 1, qa: 1}
    large:  {architect: 1, devops: 1, qa: 1}
  research:
    any:    {researcher: 1, architect: 1}
  refactor:
    small:  {dev: 1, qa: 1}
    medium: {architect: 1, dev: 1, qa: 1}
    large:  {architect: 1, dev: 2, qa: 1}
  constraints:
    max_concurrent: {dev: 4, qa: 2, architect: 1, devops: 1, researcher: 1}
    override: "PMO 可在 APPROVAL_RESPONSE 中指定特定 agent，Orchestrator 优先采用"

# ============================================
# Researcher 工作流程（每个 Group 常驻）
# ============================================
researcher_loop:
  summary: |
    Researcher 是每个 Group 的"情报员"，定时从外部获取领域新知。
    不做决策，不做实现，只做: 调研 → 报告 → 沉淀 knowledge → 通知 PMO。

  periodic_trigger:
    source: "service-timer"
    schedule: "每日一次（可按 group 配置频率）"
    target: "researcher_{group}"

  on_daily_scan:
    trigger: "定时唤醒 或 PMO/architect 指定调研议题"
    steps:
      1_scan:
        action: "按 group 领域方向，检索最新技术/论文/观点/开源项目"
      2_filter:
        action: "筛选与当前系统相关的内容，过滤噪音"
      3_write_report:
        output: "{group_root}/knowledge/research/{date}_{topic}.yaml"
      4_notify_pmo:
        action: "ipc_send(to=pmo, type=RESEARCH_REPORT, summary=报告摘要)"

  on_pmo_receive_report:
    trigger: "PMO 收到 RESEARCH_REPORT"
    steps:
      evaluate:
        if_high_value: "召集 architect 讨论 → 生成 Evolution Proposal"
        if_low_value: "归档到 knowledge，标记 potential_future"

# ============================================
# Agent 回报协议
# ============================================
agent_report_protocol:
  principle: "agent 完成/阻塞/进展 主动回报 Orchestrator（不再回报 PMO，由 Orchestrator 汇总）"

  task_done:
    type: "TASK_REPORT"
    required_fields: [task_id, status, outputs, evidence]
    target: "pmo（当前项目的 PMO agent）"

  task_blocked:
    type: "TASK_BLOCKED"
    required_fields: [task_id, reason, need_from]
    target: "pmo"
    rule: "遇到阻塞立即上报，不可自行搁置"

  task_progress:
    type: "TASK_PROGRESS"
    required_fields: [task_id, progress_pct, note]
    target: "pmo"
    rule: "长任务可选发送进度，Orchestrator 据此判断是否需要干预"

# ============================================
# PMO 记录系统
# ============================================
pmo_records:
  purpose: "PMO 的治理日志与决策记录"
  storage:
    task_board:    "{group_workflow_root}/pmo/board.yaml"
    agent_roster:  "{group_workflow_root}/pmo/agent_roster.yaml"
    decision_log:  "{group_workflow_root}/pmo/decisions/{date}.yaml"
    meeting_notes: "{group_workflow_root}/pmo/meetings/{date}.yaml"
  note: "任务执行细节由 Orchestrator 的 orchestration/decisions.yaml + execution_log.jsonl 记录"

# ============================================
# 安全规则
# ============================================
safety:
  rules:
    - "派任务前必须 ipc_list_agents 确认目标在线"
    - "同一 Task 同一时间只允许一个 ACTIVE owner"
    - "临时 agent 只能在 project scope_paths 内操作"
    - "execution_log 使用 append-only jsonl，不允许覆盖"
    - ".current_project 文件原子写入"
    - "触发失败必须记录并重试，不允许静默丢失"
    - "Orchestrator 无法解决的阻塞必须上报 PMO，不允许静默搁置"
