id: WF-OPS-PROJECT-INIT
title: 项目立项流程
version: 1.0
domain: workflow/operations

description: |
  定义新项目从提案到 agents 就绪、architect 启动的完整立项流程。
  立项（PROJECT_INIT）与发布（DEPLOY_REQUEST）是两种完全不同的操作，
  不触发构建系统，由 brain_manager 负责协调执行。

---

trigger:
  message_prefix: "[PROJECT_INIT]"
  sender: any
  receiver: agent-brain_manager

---

roles:
  brain_manager:  # 立项协调者，执行 agentctl，通知各方
  architect:      # 接收立项通知，开始 S1-S6 设计
  pmo:            # 接收立项完成通知，后续负责任务分发
  sender:         # 立项发起方（通常是 tmp_claude 或用户代理）

---

steps:

  - id: step1_read_proposal
    actor: brain_manager
    action: 读取 proposal_path 指向的 PROPOSAL.md
    purpose: 了解项目背景、所需 agents、子任务结构
    output: project_id, group_root, agent_list, reuse_list, proposal_summary

  - id: step2_ack
    actor: brain_manager
    action: ipc_send(to=sender, "[brain-manager] 立项确认，开始初始化项目")
    timing: 立即，不等后续步骤完成

  - id: step3_create_directory
    actor: brain_manager
    action: |
      在 {group_root}/projects/{project_id}/ 下创建标准目录结构：
        mkdir -p references/
        mkdir -p spec/06_tasks/{assigned,review,done}/
        mkdir -p spec/07_verification/{cases,defects,reports}/
        mkdir -p journal/{issues,audit}/
        mkdir -p memory/
      写 index.yaml：
        id: {project_id}
        title: {project_title}
        status: init
        phase: proposal
        owner: {pmo_agent}
        created_at: {iso8601}
        agents: []  # 创建完成后填充
    reference: lifecycle/project.yaml#S0.directory_structure

  - id: step4_create_agents
    actor: brain_manager
    action: |
      按 lifecycle/project.yaml#S0.project_agents.standard_set 创建 6 个标准 agent：
        agentctl add agent_{alias}_pmo        --group {group} --role pmo           --agent-type claude --model Sonnet --apply
        agentctl add agent_{alias}_architect  --group {group} --role architect     --agent-type claude --model Sonnet --apply
        agentctl add agent_{alias}_te         --group {group} --role test_engineer --agent-type codex  --model gpt-5.3-codex --apply
        agentctl add agent_{alias}_auditor    --group {group} --role auditor       --agent-type claude --model Sonnet --desired-state stopped --apply
        agentctl add agent_{alias}_devops     --group {group} --role devops        --agent-type claude --model Sonnet --apply
        agentctl add agent_{alias}_researcher --group {group} --role researcher    --agent-type claude --model Sonnet --apply
      PROPOSAL.md 中声明 reuse 的 agent 不重复创建。
      每个 agent 创建后确认出现在 agentctl list 中。
      失败则上报 PMO，不继续下一步。
      完成后将 agent 列表写入 index.yaml agents 字段。

  - id: step5_verify_reuse
    actor: brain_manager
    action: 对 reuse 列表中的 agent 执行 ipc_search 确认在线
    on_offline: ipc_send(to=pmo_agent, "[brain-manager] 复用 agent {name} 不在线，请检查")

  - id: step6_start_architect
    actor: brain_manager
    action: |
      ipc_send(
        to=architect_agent,
        message="[PROJECT_INIT] 项目 {project_id} 已立项，请开始 S1-S4 Proposal 阶段。
                 参考提案：{proposal_path}
                 项目目录：{group_root}/projects/{project_id}/
                 项目 agents：{agent_list}
                 完成 S4 并 Go/No-Go 决策后，请通知 PMO 进入 Phase 2。"
      )

  - id: step7_report
    actor: brain_manager
    action: |
      ipc_send(to=sender, "[brain-manager] PROJECT_INIT_RESULT:
               项目 {project_id} 立项完成
               项目目录：{group_root}/projects/{project_id}/
               新建 agents: {created_agents}
               复用 agents: {reuse_agents}
               architect 已启动，进入 S1-S4 Proposal 阶段")
      ipc_send(to=pmo_agent, "[brain-manager] 项目 {project_id} 已立项，
               项目目录已创建，architect 开始 S1-S4。
               S4 Go/No-Go 后请联系用户审批，通过后进入 Phase 2（S5-S8）。")

---

ipc_message_format:
  PROJECT_INIT:
    example: |
      [PROJECT_INIT] 请为以下项目立项：
      project_id: BS-027
      proposal_path: /brain/runtime/update_brain/pending/BS-027-ipc-health-monitor/PROPOSAL.md
      agents:
        - name: agent_bs027_architect
          role: architect
          group: brain_system
        - name: agent_bs027_dev
          role: developer
          group: brain_system
      reuse:
        - agent-system_pmo
        - agent-system_devops

  PROJECT_INIT_RESULT:
    example: |
      [brain-manager] PROJECT_INIT_RESULT:
      项目 BS-027 立项完成
      新建 agents: agent_bs027_architect, agent_bs027_dev
      复用 agents: agent-system_pmo, agent-system_devops
      architect 已启动，进入 S1-S4 Proposal 阶段

---

constraints:
  - PROJECT_INIT 不触发 brain_base_deploy MCP，不修改 /brain/base/
  - PROPOSAL.md 是参考文档，不是发布内容
  - agentctl 操作必须 --apply 且验证成功才算完成
  - architect 启动前必须确认 agent session 已创建

related_workflows:
  - WF-OPS-UPDATE-BRAIN   # 发布 base/ 内容（DEPLOY_REQUEST，完全不同）
  - BS-028                 # 任务审批流（architect 完成 S6 后的下一步）
