# Agent Protocol
# 多 Agent 协作、通信、交接的统一协议

principles:
  - single_source_of_truth  # 所有任务工件在声明的 SSOT 路径
  - explicit_scope          # 明确范围
  - atomic_changes          # 原子变更
  - minimal_context         # 最小上下文
  - verifiable_handoff      # 可验证交接

roles:
  coordinator: [定义目标, 创建任务, 分配 owner, 集成变更, 验证验收]
  worker: [在范围内工作, 产出 outputs, 报告进度和风险]

task_contract:
  required: [task_id, owner, scope_paths, inputs, outputs, acceptance, dependencies, risks]

execution_rules:
  scope_locking: Workers 只能修改分配的 scope_paths
  file_ownership: 同一文件同时只有一个 agent 编辑
  conflict_resolution: Coordinator 仲裁冲突并记录决策
  dependencies: 上游依赖就绪才能开始任务
  tool_use: 使用完成任务所需的最小权限工具
  communication: 所有更新记录到共享日志
  audited_execution: "所有 Bash 命令建议通过 /brain/runtime/engine/brain_exec 执行，以确保 G-AUDIT 双写审计（对不支持 hooks 的 agent 尤其重要）"

# 通信渠道
channels:
  tmux_realtime:
    use_case: 需要另一个 Agent 立即执行任务
    workflow: [确认 session 存在, send-keys 发送任务, 发送 Enter, 轮询结果]
  file_handoff:
    use_case: Agent 完成后异步交接
    paths:
      handoff: /brain/groups/{group}/projects/{project}/memory/handoff.yaml
      messages: /brain/groups/{group}/memory/agent_messages/agent_communication_{date}.yaml
      outputs_txt: /brain/groups/{group}/memory/agent_messages/{session}_outputs_{date}.txt
      outputs_jsonl: /brain/groups/{group}/memory/agent_messages/{session}_outputs_{date}.jsonl
      results: /brain/groups/{group}/memory/agent_results/{id}_{task_name}.yaml
    result_storage:
      small: "< 20 行 → msg 字段"
      large: "> 20 行 → agent_results/ 文件"

# 文件格式
schemas:
  handoff:
    fields: [last_updated, last_agent, status, current_task, completed, pending, blockers, notes_for_next_agent, files_modified, context]
    status_values: [pending, in_progress, blocked, completed]
  message:
    fields: [id, time, from, to, type, task, msg, status, result]
    id_format: "YYYYMMDD-HHMMSS"
  output:
    fields: [ts, agent, session, type, content]
    rules: [append-only, 带时间戳, 写明 agent+session]

# tmux 管理
tmux:
  principle: 所有 Agent 必须在 tmux 中运行
  naming: "{agent}_{project}_{module}"
  commands:
    list: tmux list-sessions | grep codex
    new: tmux new-session -d -s {name} -c /brain "codex ..."
    send: /brain/runtime/engine/bin//brain/infrastructure/service/utils/tmux/bin/brain_tmux_send -t {pane_or_session} "{message}"
    rpc_call: /brain/runtime/engine/bin/brain_tmux_rpc call -t {pane} "{message}"
    capture: tmux capture-pane -t {session} -p | tail -30
  messaging:
    claude_code_tui:
      - Claude Code 运行任务时消息会排队（出现 "Press up to edit queued messages" 即已投递）
      - 推荐发送：/brain/runtime/engine/bin//brain/infrastructure/service/utils/tmux/bin/brain_tmux_send -t {pane} "{message}"（强制带 Enter，避免“只进输入框未发送”）
      - 用 capture-pane 确认对方已收到/已排队；非紧急不要 Esc 中断
    brpc_request_response:
      - 请求格式：brain_tmux_rpc 会发送一行 `BRPC {json}`（包含 id/from/to/body）
      - 回复格式：对方需回一行 `BRPC_REPLY id=<id> {json}`（否则无法自动匹配“回”）
      - 说明：tmux 本身无真正收包；RPC 的 receive 是通过 capture-pane 轮询实现（best-effort）
  session_selection:
    match_exists: 用已有 session
    no_match: 开新 session
  lifecycle:
    keep_alive: [项目专属, worker]
    close_after: [临时任务]
    cleanup: 空闲超 24h 非 worker 可清理

# 工作流
workflow:
  S1: alignment     # 定义目标、范围、SSOT
  S2: planning      # 创建任务卡片
  S3: assignment    # 分配 owner、锁定文件所有权
  S4: execution     # Worker 执行、报告进度
  S5: integration   # Coordinator 集成、解决冲突
  S6: verification  # 运行检查、记录证据
  S7: closure       # 总结成果、遗留问题、下一步

# 门控
gates:
  G-COORD-PLAN: plan_exists && scope_defined && approvals_recorded
  G-COORD-TASKS: each_task_has_owner_and_acceptance
  G-COORD-INTEGRATION: handoff_reports_present_for_completed_tasks
  G-COORD-VERIFY: verification_recorded

# 交接
handoff:
  required: [summary, files_changed, tests_run, assumptions, open_questions]
  artifacts:
    task_board: memory/tasks/board.yaml
    task_cards: memory/tasks/{task_id}.yaml
    handoff_report: memory/handoffs/{task_id}.md
    audit_log: memory/logs/{date}/execution.log

# IPC 注册
ipc:
  register:
    required: [agent_name, tmux_session, tmux_pane]
    instance_id: "{agent_name}@{tmux_session}:{tmux_pane}"
    reason: daemon 需要 tmux_pane 推送通知
    example: ipc_register(agent_name="codex", tmux_session="codex_common", tmux_pane="%2")
  registry:
    list_agents:
      tool: ipc_list_agents(include_offline=false)
      returns: "仅 agent source"
    list_services:
      tool: ipc_list_services(include_offline=false)
      returns: "仅 service source"
    search:
      tool: ipc_search(query, source="all|agent|service|register|heartbeat|tmux_discovery", fuzzy=true, include_offline=false, limit=50)
      daemon_actions: [registry_search, search]
      matching: "query 对 instance_id/agent_name/source 做大小写不敏感匹配；fuzzy=true 为子串匹配"

# 安全
security:
  rules:
    - Agent 只能向已存在的 session 发送消息
    - 不得发送破坏性命令
    - 敏感操作需声明并通过 IPC 上报组内 PMO 审批（PMO 可酌情上报用户）
  forbidden: [rm -rf /, DROP DATABASE, 格式化, 删除所有]

# 违规处理
compliance:
  violations: [scope_violation, silent_changes, missing_handoff]
  remediation: Coordinator 暂停集成直到问题解决
