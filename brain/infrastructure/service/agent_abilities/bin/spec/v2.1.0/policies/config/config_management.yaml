# Config Management Policy
# 双层配置管理规范 - 源配置层 + 运行时配置层

id: POLICY-CONFIG-001
version: "1.0"
created: "2026-02-13"
status: active
owner: brain_system

# ============================================================
# 设计哲学
# ============================================================
philosophy: |
  配置管理采用"源 + 运行时"双层架构：

  - 源配置层 (/brain/secrets/)：持久化、版本控制、人工维护
  - 运行时层 (/brain/runtime/config/)：启动时生成、会话级、自动合并

  启动时从源配置加载并合并到运行时配置，运行时配置可以被删除重建。
  这种设计实现了配置的可追溯性、安全性和灵活性。

references:
  - /brain/base/spec/policies/secrets_management.yaml  # Secrets 安全规范
  - /brain/base/spec/core/architecture.yaml            # 架构分层原则

# ============================================================
# 双层架构定义
# ============================================================
architecture:
  code_layer:
    path: /brain/infrastructure/
    role: 代码层（持久化）
    components:
      - launch/loader_env_vars.py  # 配置加载器
      - service/service-agentctl/         # Agent 控制服务
      - engine/                    # IPC daemon, MCP server
    characteristics:
      - 持久化代码
      - 版本控制（git tracked）
      - 需要开发和测试
      - 启动时执行

  source_layer:
    path: /brain/secrets/
    role: 持久化配置源
    characteristics:
      - 人工维护和更新
      - 严格权限控制（600/700）
      - 版本控制（git 管理 index.yaml，实际密钥文件被 .gitignore）
      - 按业务/服务分类存储
      - 备份恢复的唯一源

  runtime_layer:
    path: /brain/runtime/
    role: 运行时临时数据层（类似 /tmp，重启后清空）
    subdirs:
      config/:
        description: "合并后的环境变量配置"
        lifecycle: "启动时生成，重启后清空"
      logs/:
        description: "运行时日志"
        lifecycle: "运行时写入，可定期清理"
      data/:
        description: "运行时数据库（SQLite）"
        lifecycle: "运行时状态，可重建"
    characteristics:
      - 启动时自动生成
      - 会话级生命周期（重启后清空）
      - 可安全删除和重建
      - 环境变量格式（.env）
      - 记录配置来源追溯
      - ⚠️ 不存放任何代码文件（.py, .sh 等）

# ============================================================
# 源配置层：/brain/secrets/
# ============================================================
source_layer_structure:
  root: /brain/secrets/

  required_files:
    - name: index.yaml
      description: Secrets 索引，记录所有配置分类和用途
      permissions: "644"
      template: |
        # Brain Global Secrets Index
        id: SECRETS-GLOBAL
        version: "1.0"
        last_updated: "YYYY-MM-DD"

        categories:
          telegram:
            description: "Telegram Bot 和 API 配置"
            path: "./telegram/"
            files:
              - name: "bot_token.env"
                description: "Telegram Bot Token"
                env_vars: ["TELEGRAM_BOT_TOKEN", "TELEGRAM_API_ID"]
              - name: "api_credentials.json"
                description: "Telegram API 完整凭证"
                usage: "Python Telethon 库"

          futu:
            description: "富途证券 API 配置"
            path: "./futu/"
            files:
              - name: "rsa_private.pem"
                description: "RSA 私钥"
                permissions: "600"
              - name: "api_config.env"
                description: "API 连接配置"
                env_vars: ["FUTU_HOST", "FUTU_PORT", "FUTU_RSA_KEY_PATH"]

          database:
            description: "数据库连接凭证"
            path: "./database/"
            files:
              - name: "postgres.env"
                description: "PostgreSQL 连接串"
                env_vars: ["POSTGRES_DSN", "POSTGRES_USER", "POSTGRES_PASSWORD"]

          firebase:
            description: "Firebase 服务账号"
            path: "./firebase/"
            files:
              - name: "service_account.json"
                description: "Firebase Admin SDK 凭证"
                env_vars: ["GOOGLE_APPLICATION_CREDENTIALS"]

          agents:
            description: "Agent 专用配置（LLM tokens, API keys）"
            path: "./agents/"
            files:
              - name: "llm_tokens.env"
                description: "LLM API tokens"
                env_vars: ["OPENAI_API_KEY", "ANTHROPIC_API_KEY"]

    - name: .gitignore
      description: 防止敏感文件被提交
      permissions: "644"
      template: |
        # Ignore all secret files
        *.pem
        *.key
        *.crt
        *.p12
        *.pfx
        *.env
        *.secret
        *.json

        # Keep documentation and index
        !index.yaml
        !.gitignore
        !README.md

    - name: README.md
      description: 使用说明和安全警告
      permissions: "644"
      template: |
        # Brain Global Secrets

        **⚠️ 安全警告**：此目录包含敏感配置，请勿提交实际密钥到 git。

        ## 目录结构

        详见 `index.yaml`

        ## 添加新配置

        1. 在对应分类目录下添加文件
        2. 设置正确权限（`chmod 600` for keys, `chmod 644` for configs）
        3. 更新 `index.yaml` 添加索引
        4. 重启系统或运行配置加载器：`/brain/infrastructure/launch/loader_env_vars.py`

        ## 配置加载

        系统启动时自动从此目录加载配置到 `/brain/runtime/config/`

  subdirectories:
    pattern: ./{category}/
    examples:
      telegram:
        path: ./telegram/
        files:
          - bot_token.env
          - api_credentials.json

      futu:
        path: ./futu/
        files:
          - rsa_private.pem       # 权限 600
          - api_config.env

      database:
        path: ./database/
        files:
          - postgres.env
          - connection_strings.yaml

      firebase:
        path: ./firebase/
        files:
          - service_account.json

      agents:
        path: ./agents/
        files:
          - llm_tokens.env
          - researcher_api_keys.env

  file_naming:
    conventions:
      - "使用小写字母和下划线"
      - "环境变量用 .env 后缀"
      - "JSON 配置用 .json 后缀"
      - "证书/密钥用标准后缀 (.pem, .key, .crt)"

    examples:
      good:
        - "bot_token.env"
        - "rsa_private.pem"
        - "api_credentials.json"
      bad:
        - "BotToken.ENV"
        - "RSA-PRIVATE.pem"
        - "api_credentials.txt"

# ============================================================
# 运行时配置层：/brain/runtime/config/
# ============================================================
runtime_layer_structure:
  root: /brain/runtime/config/

  files:
    global_env:
      name: .env
      description: 合并后的全局环境变量（从所有 secrets 加载）
      format: |
        # Auto-generated at: 2026-02-13 10:30:45 UTC
        # Source: /brain/secrets/
        # DO NOT EDIT MANUALLY - will be overwritten on restart

        # === Telegram ===
        TELEGRAM_BOT_TOKEN=110201543:AAHdqTcvCH1vGWJxfSeofSAs0K5PALDsaw
        TELEGRAM_API_ID=12345

        # === Futu ===
        FUTU_HOST=127.0.0.1
        FUTU_PORT=11111
        FUTU_RSA_KEY_PATH=/brain/secrets/futu/rsa_private.pem

        # === Database ===
        POSTGRES_DSN=postgresql://user:pass@localhost:5432/dbname

        # === Firebase ===
        GOOGLE_APPLICATION_CREDENTIALS=/brain/secrets/firebase/service_account.json

    metadata:
      name: sources.yaml
      description: 记录每个环境变量的来源，用于追溯和调试
      format: |
        # Config Sources - Generated at 2026-02-13 10:30:45 UTC

        TELEGRAM_BOT_TOKEN:
          source: /brain/secrets/telegram/bot_token.env
          category: telegram
          loaded_at: "2026-02-13T10:30:45Z"

        FUTU_HOST:
          source: /brain/secrets/futu/api_config.env
          category: futu
          loaded_at: "2026-02-13T10:30:45Z"

    timestamp:
      name: loaded_at.txt
      description: 记录配置加载时间
      format: |
        2026-02-13 10:30:45 UTC

    by_service:
      pattern: "{service}.env"
      description: 按服务拆分的配置（可选，便于服务独立加载）
      examples:
        - telegram.env
        - futu.env
        - database.env

  permissions:
    directory: "755"
    env_files: "644"  # 运行时配置可以被所有 agents 读取

  lifecycle:
    creation: "系统启动时由配置加载器生成"
    update: "手动运行配置加载器或重启系统"
    deletion: "可安全删除，重启时自动重建"

# ============================================================
# 初始化加载机制
# ============================================================
initialization:
  trigger_points:
    - event: "系统启动（agentctl start）"
      timing: "启动 agents 之前"
      executor: "agentctl 启动脚本"

    - event: "手动触发"
      timing: "配置更新后"
      executor: "运行 /brain/infrastructure/launch/loader_env_vars.py"

  loading_process:
    step1:
      name: "读取源配置索引"
      action: "解析 /brain/secrets/index.yaml"
      output: "配置分类列表"

    step2:
      name: "扫描所有 .env 文件"
      action: "遍历每个分类目录，读取 *.env 文件"
      validation:
        - "检查文件权限（600/644）"
        - "验证环境变量格式"
        - "检测重复变量定义"

    step3:
      name: "合并环境变量"
      action: "按优先级合并所有环境变量"
      priority_order:
        1: "agents/*"        # Agent 配置优先级最高
        2: "database/*"      # 数据库次之
        3: "telegram/*"
        4: "futu/*"
        5: "firebase/*"
      conflict_resolution: "后加载的覆盖先加载的（按目录字母序）"

    step4:
      name: "生成运行时配置"
      action: "写入 /brain/runtime/config/"
      outputs:
        - .env               # 全局环境变量
        - sources.yaml       # 来源追溯
        - loaded_at.txt      # 时间戳
        - "{service}.env"    # 按服务拆分（可选）

    step5:
      name: "验证配置完整性"
      checks:
        - "必需环境变量是否存在"
        - "文件路径是否有效"
        - "JSON 配置是否可解析"
      on_error: "记录错误到日志，继续加载其他配置"

    step6:
      name: "记录审计日志"
      action: "写入 /brain/runtime/logs/config_audit.jsonl"
      format: |
        {
          "timestamp": "2026-02-13T10:30:45Z",
          "event": "config_loaded",
          "sources_count": 5,
          "env_vars_count": 15,
          "conflicts": [],
          "errors": []
        }

  loader_implementation:
    location: /brain/infrastructure/launch/loader_env_vars.py
    requirements:
      - "读取 YAML 索引"
      - "解析 .env 文件"
      - "合并和去重"
      - "写入运行时配置"
      - "记录审计日志"

    usage:
      manual: |
        # 手动重新加载配置
        /brain/infrastructure/launch/loader_env_vars.py --reload

      automatic: |
        # 在 agentctl 启动脚本中自动调用
        /brain/infrastructure/launch/loader_env_vars.py --reload --quiet

# ============================================================
# 安全规范
# ============================================================
security:
  file_permissions:
    /brain/secrets/:
      directory: "700"        # 仅 owner 可访问
      private_keys: "600"     # .pem, .key
      env_files: "600"        # .env
      json_configs: "600"     # .json（如果包含密钥）
      index_yaml: "644"       # 索引可读

    /brain/runtime/config/:
      directory: "755"        # 所有人可读
      env_files: "644"        # agents 需要读取

  git_management:
    /brain/secrets/:
      tracked:
        - index.yaml
        - .gitignore
        - README.md
      ignored:
        - "*.env"
        - "*.pem"
        - "*.key"
        - "*.json"
        - "*.secret"

    /brain/runtime/config/:
      policy: "整个目录不提交到 git"
      reason: "运行时生成，可重建"

  access_control:
    read_access:
      /brain/secrets/: "仅系统管理员和配置加载器"
      /brain/runtime/config/: "所有 agents 可读"

    write_access:
      /brain/secrets/: "仅系统管理员"
      /brain/runtime/config/: "仅配置加载器"

  logging:
    rules:
      - "不在日志中打印实际密钥值"
      - "仅记录环境变量名称，不记录值"
      - "文件路径可记录"

    example_safe_log: |
      [INFO] Loaded TELEGRAM_BOT_TOKEN from /brain/secrets/telegram/bot_token.env

    example_unsafe_log: |
      [ERROR] Invalid token: 110201543:AAHdqTcvCH1vGWJxfSeofSAs0K5PALDsaw

  backup:
    source_layer:
      policy: "定期备份 /brain/secrets/"
      frequency: "每周一次"
      location: "加密备份存储"
      includes:
        - "所有文件（包括 .env, .pem, .json）"
        - "index.yaml 版本历史"

    runtime_layer:
      policy: "不备份（可重建）"

# ============================================================
# 使用指南
# ============================================================
usage_guide:
  add_new_secret:
    steps:
      - "在 /brain/secrets/{category}/ 下创建文件"
      - "设置正确权限：chmod 600 {file}"
      - "更新 /brain/secrets/index.yaml 添加索引"
      - "重新加载配置：/brain/infrastructure/launch/loader_env_vars.py --reload"
      - "验证：cat /brain/runtime/config/.env | grep {VAR_NAME}"

  update_existing_secret:
    steps:
      - "编辑 /brain/secrets/{category}/{file}"
      - "重新加载配置：/brain/infrastructure/launch/loader_env_vars.py --reload"
      - "重启受影响的服务"

  delete_secret:
    steps:
      - "从 /brain/secrets/{category}/ 删除文件"
      - "更新 /brain/secrets/index.yaml 移除索引"
      - "重新加载配置：/brain/infrastructure/launch/loader_env_vars.py --reload"
      - "验证环境变量已移除"

  debug_config:
    commands:
      check_sources: "cat /brain/runtime/config/sources.yaml"
      check_loaded_time: "cat /brain/runtime/config/loaded_at.txt"
      check_env: "cat /brain/runtime/config/.env"
      check_audit: "tail /brain/runtime/logs/config_audit.jsonl"

# ============================================================
# 与现有系统集成
# ============================================================
integration:
  with_agentctl:
    description: "agentctl 启动时自动加载配置"
    implementation: |
      # 在 /brain/infrastructure/service/service-agentctl/services/launcher.py
      def start_agents():
          # 1. 加载全局配置
          subprocess.run(["/brain/infrastructure/launch/loader_env_vars.py", "--reload"])

          # 2. 加载运行时环境变量
          load_dotenv("/brain/runtime/config/.env")

          # 3. 启动 agents
          ...

  with_docker:
    description: "Docker 容器挂载配置"
    examples:
      mount_secrets: |
        # 直接挂载源配置（只读）
        docker run -d \
          -v /brain/secrets/futu:/secrets/futu:ro \
          -e FUTU_RSA_KEY_PATH=/secrets/futu/rsa_private.pem \
          my-service

      use_runtime_env: |
        # 使用运行时配置
        docker run -d \
          --env-file /brain/runtime/config/.env \
          my-service

  with_agents:
    description: "Agent 读取配置的方式"
    python_example: |
      import os
      from dotenv import load_dotenv

      # Agent 启动时加载
      load_dotenv("/brain/runtime/config/.env")

      # 使用环境变量
      bot_token = os.getenv("TELEGRAM_BOT_TOKEN")
      futu_host = os.getenv("FUTU_HOST")

# ============================================================
# 迁移指南
# ============================================================
migration:
  from_scattered_env_files:
    description: "从各个项目分散的 .env 迁移到双层架构"
    steps:
      1:
        action: "创建 /brain/secrets/ 目录结构"
        command: |
          mkdir -p /brain/secrets/{telegram,futu,database,firebase,agents}
          chmod 700 /brain/secrets

      2:
        action: "复制现有 .env 文件到对应分类"
        example: |
          cp /brain/groups/org/xkquant/projects/telegram-api/.env \
             /brain/secrets/telegram/bot_token.env

      3:
        action: "创建 index.yaml"
        command: |
          vim /brain/secrets/index.yaml  # 按模板填写

      4:
        action: "首次加载配置"
        command: |
          /brain/infrastructure/launch/loader_env_vars.py --reload

      5:
        action: "验证运行时配置"
        command: |
          cat /brain/runtime/config/.env
          cat /brain/runtime/config/sources.yaml

      6:
        action: "更新 agentctl 集成加载逻辑"

      7:
        action: "删除旧的分散 .env 文件（可选）"

# ============================================================
# 监控和维护
# ============================================================
monitoring:
  health_checks:
    - name: "配置完整性检查"
      frequency: "每次启动"
      script: "/brain/infrastructure/launch/loader_env_vars.py --validate"
      alerts:
        - "必需环境变量缺失"
        - "配置文件权限错误"
        - "源配置和运行时配置不一致"

    - name: "源配置备份状态"
      frequency: "每周"
      check: "最后备份时间 < 7 天"

  audit_logging:
    location: /brain/runtime/logs/config_audit.jsonl
    retention: "90 天"
    events:
      - config_loaded
      - config_validation_failed
      - secret_added
      - secret_updated
      - secret_deleted

# ============================================================
# 常见问题
# ============================================================
faq:
  q1:
    question: "为什么不直接用 /brain/secrets/ 作为运行时配置？"
    answer: |
      1. 安全性：secrets 应该 700 权限，但 agents 需要读取配置
      2. 灵活性：运行时可以合并多个源、按服务拆分
      3. 可追溯性：记录配置来源和加载时间
      4. 解耦：源配置和运行时配置生命周期独立

  q2:
    question: "配置更新后需要重启所有服务吗？"
    answer: |
      取决于服务实现：
      - 如果服务启动时读取环境变量：需要重启
      - 如果服务支持热加载配置：可以不重启
      - 建议：配置更新后重启受影响的服务

  q3:
    question: "/brain/runtime/config/ 被删除怎么办？"
    answer: |
      没关系，重新运行加载器即可：
      /brain/infrastructure/launch/loader_env_vars.py --reload

      或者重启系统（agentctl 会自动加载）

  q4:
    question: "如何处理配置冲突（同一环境变量在多个文件定义）？"
    answer: |
      按优先级加载（见 initialization.loading_process.step3）
      后加载的覆盖先加载的，冲突会记录在 sources.yaml 和审计日志

  q5:
    question: "某个 Agent 需要特殊配置怎么办？"
    answer: |
      方案 1：在 /brain/secrets/agents/{agent_name}.env 定义
      方案 2：在 Agent 的 CLAUDE.md 中引用特定环境变量
      方案 3：生成独立的 /brain/runtime/config/{agent_name}.env

# ============================================================
# 实施检查清单
# ============================================================
implementation_checklist:
  - "[ ] 创建 /brain/secrets/ 目录结构"
  - "[ ] 创建 /brain/secrets/index.yaml"
  - "[ ] 创建 /brain/secrets/.gitignore"
  - "[ ] 创建 /brain/secrets/README.md"
  - "[ ] 设置目录权限：chmod 700 /brain/secrets"
  - "[ ] 迁移现有 .env 文件到对应分类"
  - "[ ] 实现配置加载器：/brain/infrastructure/launch/loader_env_vars.py"
  - "[ ] 集成到 agentctl 启动流程"
  - "[ ] 测试配置加载和合并逻辑"
  - "[ ] 验证运行时配置生成正确"
  - "[ ] 更新 /brain/base/spec/index.yaml 添加索引"
  - "[ ] 文档化使用流程（README）"
  - "[ ] 设置自动备份计划"

# ============================================================
# 版本历史
# ============================================================
version_history:
  v1.0:
    date: "2026-02-13"
    changes:
      - "初始版本"
      - "定义双层架构"
      - "规范目录结构"
      - "定义加载机制"
      - "安全和权限规范"
