        - Edit
        - Grep
        - Glob
      warn_message: "⚠️ 必须优先使用索引系统 (G-KVCACHE-FIRST)\n\n当前操作: {operation}\n目标文件: {file_path}\n\
        \n❌ 禁止行为：\n- 盲目使用 Read/Grep/Glob 搜索文档\n- 直接猜测文件路径\n\n✅ 正确流程：\n1. 查找文档时：\n\
        \   - 读取 /brain/base/{domain}/registry.yaml\n   - 在 quick_lookup 中搜索关键词\n\
        \   - 获取文档 ID 和路径后再读取\n2. 创建文件时：\n   - 读取相关 index.yaml 了解目录结构\n   - 避免重复或冲突\n\
        \n索引文件：\n- /brain/base/spec/registry.yaml (SPEC 域, 35 文档, 71 关键词)\n- /brain/base/workflow/registry.yaml\
        \ (WORKFLOW 域)\n- /brain/base/knowledge/registry.yaml (KNOWLEDGE 域)\n- /brain/base/evolution/registry.yaml\
        \ (EVOLUTION 域)\n- /brain/base/index.yaml (全局索引)\n\n参考：/brain/base/spec/core/lep.yaml\
        \ (G-KVCACHE-FIRST)\n原因：如果设计者都不用索引系统，索引就失效了。\n"
    name: Query Registry Before Read/Write
    rule: '必须优先使用索引系统（registry.yaml）查找文档，禁止盲目搜索。

      - 查找文档时：先读 registry.yaml，在 quick_lookup 中搜索关键词，获取路径后再读取

      - 创建文件时：先查询 index.yaml 了解目录结构，避免重复或冲突

      - 索引系统是设计好的快速定位机制，绕过索引等同于规范失效

      '
  G-GATE-MEMORY-TIMELINE:
    applies_to:
    - write
    - delete
    enforcement:
      block_message: '🚫 Timeline 完整性保护 (G-MEMORY-TIMELINE)


        文件: {file_path}

        操作: {operation}


        timeline.md 是时间线记录，必须保持完整性：


        ❌ 禁止：

        - Write 工具（会覆盖全部内容）

        - echo > timeline.md（覆盖）

        - cat > timeline.md（覆盖）


        ✅ 允许：

        - Edit 工具追加新条目

        - echo >> timeline.md（追加）


        时间线是项目历史记录，不可篡改或删除。


        参考：/brain/base/spec/core/lep.yaml (G-MEMORY-TIMELINE)

        '
      method: python_inline
      priority: HIGH
      rules:
        append_only:
          allowed_operations:
          - Edit (追加新条目)
          - 'Bash: echo >> timeline.md (追加)'
          description: timeline.md 必须只追加，不覆盖
          forbidden_operations:
          - Write (完全覆盖)
          - 'Bash: echo > timeline.md'
          - 'Bash: cat > timeline.md'
      stage: pre_tool_use
      triggers:
        patterns:
        - '**/timeline.md'
        - '**/TIMELINE.md'
        tools:
        - Write
