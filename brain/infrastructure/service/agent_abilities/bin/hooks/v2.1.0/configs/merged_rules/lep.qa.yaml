actions:
  delete:
  - remove
  - truncate
  git:
  - commit
  - push
  - checkout
  - merge
  - rebase
  log:
  - audit
  - trace
  - snapshot
  move:
  - rename
  - relocate
  read:
  - open
  - search
  - summarize
  - analyze
  write:
  - create
  - update
  - append
  - patch
command_mapping:
  delete:
    bash:
    - rm
    - rm -rf
    - rmdir
    - unlink
    - shred
  git:
    bash:
    - git add
    - git commit
    - git push
    - git pull
    - git checkout
    - git merge
    - git rebase
  log:
    target: '**/memory/**/*.jsonl'
  move:
    bash:
    - mv
    - rename
  read:
    bash:
    - cat
    - head
    - tail
    - less
    - grep
    - rg
    - find
    - ls
    - tree
    tool:
    - Read
    - Glob
    - Grep
  write:
    bash:
    - echo >
    - tee
    - sed -i
    - awk
    tool:
    - Write
    - Edit
    - NotebookEdit
gates:
  G-GATE-AGENT-LIFECYCLE:
    allowed:
    - ipc_send(to='brain-agentctl', message='请启动 {agent_name}')
    - ipc_send(to='brain-agentctl', message='请停止 {agent_name}')
    - ipc_send(to='brain-agentctl', message='请重启 {agent_name}')
    - ipc_send(to='brain-agentctl', message='开启自启动 {agent_name}')
    - ipc_send(to='brain-agentctl', message='关闭自启动 {agent_name}')
    applies_to:
    - agent_start
    - agent_stop
    - agent_restart
    - agent_autostart
    enforcement:
      block_message: "\U0001F6AB Agent 生命周期操作被拦截 (G-AGENT-LIFECYCLE)\n\n{message}\n\
        \n❌ 禁止直接使用 tmux 命令操作 agent\n✅ 正确方式：使用 brain-agentctl\n\n示例：\n  agentctl start\
        \ --apply agent_name\n  agentctl stop --apply agent_name\n  agentctl restart\
        \ --apply agent_name\n\n原因：agentctl 启动时会正确配置 MCP，直接用 tmux 会导致配置缺失。\n\n参考：/brain/base/spec/core/lep.yaml\
        \ (G-AGENT-LIFECYCLE)\n"
      method: python_inline
      patterns:
        agent_tmux_operations:
        - message: 检测到 tmux 操作 agent session
          pattern: tmux\s+(kill-session|send-keys|new-session).*(?:agent_|codex_)
        - message: 检测到 tmux 操作 agent session
          pattern: (?:agent_|codex_).*tmux\s+(kill-session|send-keys|new-session)
      priority: CRITICAL
      stage: pre_tool_use
      triggers:
        tools:
        - Bash
    forbidden:
    - tmux send-keys ... /exit | C-c | exit
    - tmux kill-session -t {agent_session}
    - tmux new-session -s {agent_session}
    - kill / kill -9 <agent_pid>
    - 直接在 tmux pane 中启动 claude/codex 命令
    name: Agent Lifecycle via Orchestrator Only
    reason: 'Orchestrator 是 agent 生命周期的唯一管理者，负责：

      1. 写入正确的 .mcp.json（MCP server 路径）

      2. 设置环境变量（BRAIN_AGENT_NAME 等）

      3. 注册 agent 到 daemon

      4. 配置 tmux session 参数（auto-restart 等）

      绕过 orchestrator 会导致 MCP 配置丢失、环境变量缺失、agent 注册状态不一致。

      '
    rule: '所有 Agent 生命周期操作必须且只能通过 brain-agentctl 执行：

      - 启动 (start)

      - 停止 (stop)

      - 重启 (restart)

      - 开启/关闭自启动 (autostart)

      禁止任何 agent 直接操作其他 agent 的 tmux session 或进程。

      '
  G-GATE-APPROVAL-DELEGATION:
    applies_to:
    - write
    - delete
    - move
    - git
    enforcement:
      method: message_routing_validation
      note: 需要 IPC 拦截支持 - 当前为推荐性检查
      priority: MEDIUM
      rules:
        delegate_to_pmo:
          approval_routing:
          - Agent 需要审批 → 发 APPROVAL_REQUEST 给 PMO
          - PMO 决策 → 批准/拒绝/升级给用户
          - 禁止 Agent 直接使用 AskUserQuestion 等待用户
          description: 审批请求应该先发给 PMO
      stage: ipc_message_check
      triggers:
        tools:
        - AskUserQuestion
      warn_message: "\U0001F4A1 建议委派审批给 PMO (G-APPROVAL-DELEGATION)\n\n检测到使用 AskUserQuestion\n\
        \n建议的审批流程：\n1. Agent 发送 APPROVAL_REQUEST 给 group PMO\n2. PMO 评估并决策（批准/拒绝/升级）\n\
        3. 如需用户介入，PMO 通过 frontdesk 转发\n\nIPC 消息示例：\n```python\nipc_send(\n    to=\"\
        agent-system_pmo\",\n    message_type=\"request\",\n    message={\n      \
        \  \"type\": \"APPROVAL_REQUEST\",\n        \"task_id\": \"task-123\",\n \
        \       \"agent\": \"agent-system_architect\",\n        \"action_type\": \"\
        modify_core_spec\",\n        \"target\": \"/brain/base/spec/core/lep.yaml\"\
        ,\n        \"plan_summary\": \"添加新的 gate\",\n        \"risk_level\": \"medium\"\
        \n    }\n)\n```\n\nPMO 响应格式:\n```python\n{\n    \"type\": \"APPROVAL_RESPONSE\"\
        ,\n    \"task_id\": \"task-123\",\n    \"decision\": \"approved\",  # approved\
        \ | rejected | escalated_to_user\n    \"reason\": \"符合规范，批准\"\n}\n```\n\n\
        这是推荐性检查（需要 IPC 集成）。\n\n参考：/brain/base/spec/core/lep.yaml (G-APPROVAL-DELEGATION)\n"
    ipc_message:
      required_fields:
      - task_id
      - agent
      - action_type
      - target
      - plan_summary
      - risk_level
      target: agent_{group}_pmo
      type: APPROVAL_REQUEST
    name: Approval Delegation to PMO
    pmo_response:
      decision_enum:
      - approved
      - rejected
      - escalated_to_user
      fields:
      - task_id
      - decision
      - reason
      type: APPROVAL_RESPONSE
    rule: 'Agent 需要审批时，不直接等待用户，而是发送 APPROVAL_REQUEST 给组内 PMO。

      PMO 是组内操作的全权审批代理：

      - PMO 可自行批准常规操作

      - PMO 可自行拒绝不合规操作

      - PMO 认为需要用户介入时，通过 frontdesk 转发给用户

      - 用户保留最终覆盖权（可随时通过 frontdesk 下达指令）

      '
  G-GATE-ATOMIC:
    applies_to:
    - write
    - delete
    - move
    - git
    enforcement:
      config:
        check_action_details: true
        check_file_list: true
        reject_vague_terms: true
      method: plan_validator
      note: 需要 Plan mode 集成 - 检查 Plan 内容
      priority: HIGH
      rules:
        atomic_requirements:
        - Plan 必须包含具体的文件路径
        - Plan 必须包含具体的修改内容
        - Plan 必须包含验证步骤
        - Plan 不能有模糊描述（'等'、'之类'）
      stage: plan_mode
      warn_message: '⚠️ Plan 原子化要求 (G-ATOMIC)


        Plan 必须具体到文件级别：

        - ✅ 正确: "修改 /brain/base/spec/core/lep.yaml 第 100 行"

        - ❌ 错误: "修改一些配置文件"


        必须包含：

        1. 具体文件路径列表

        2. 每个文件的修改内容

        3. 验证步骤


        这是推荐性检查（需要 Plan mode 集成）。


        参考：/brain/base/spec/core/lep.yaml (G-ATOMIC)

        '
    name: Atomic Plan
    rule: Plan 必须原子化（具体到文件/行号/动作）
  G-GATE-AUDIT:
    applies_to:
    - '*'
    enforcement:
      config:
        block_on_failure: false
        encoding: utf-8
        format: jsonl
        max_entry_size: 10240
      dual_write:
        global: /brain/runtime/logs/agents/global_agent_log_{date}.jsonl
        hooks: /brain/runtime/logs/hooks_audit.jsonl
        project: /brain/groups/{group}/projects/{project}/logs/{date}.jsonl
      log_fields:
        optional:
        - tool_input
        - cwd
        - user
        - session
        - result
        required:
        - timestamp
        - hook_event
        - tool_name
        - agent
      logger: audit_logger
      method: python_logger
      priority: LOW
      redact_fields:
      - password
      - token
      - secret
      - api_key
      - credential
      stage: all
    fields:
    - ts
    - agent
    - session
    - action
    - target
    - result
    format: jsonl
    name: Audit Trail
    rule: 所有操作记录到 JSONL 日志
  G-GATE-CODE-STYLE:
    applies_to:
    - write
    - git
    block: false
    enforcement:
      config:
        block_on_failure: false
        show_warnings: true
      linters:
        c:
        - auto_fix: false
          tool: clang-format
        javascript:
        - auto_fix: false
          tool: prettier
        - auto_fix: false
          tool: eslint
        python:
        - auto_fix: false
          tool: black
        - auto_fix: false
          tool: pylint
      method: linter
      note: 当前为推荐性检查，不强制阻塞
      priority: LOW
      stage: pre_tool_use
      warn_message: 'ℹ️ 代码风格建议 (G-CODE-STYLE)


        建议运行代码格式化工具：

        - Python: black {file_path}

        - JavaScript: prettier --write {file_path}

        - C/C++: clang-format -i {file_path}


        参考：/brain/base/spec/standards/coding/

        '
    name: Code Style
    rule: 代码遵循项目规范
  G-GATE-DB-BACKUP:
    applies_to:
    - write
    - delete
    - move
    enforcement:
      block_message: '🚫 数据库操作需要先备份 (G-DB-BACKUP)


        命令: {command}


        必须先执行备份：

        ```bash

        # PostgreSQL

        pg_dump -Fc dbname > /brain/.archived/db_backup_$(date +%Y%m%d_%H%M%S).dump


        # Redis

        redis-cli SAVE

        cp /var/lib/redis/dump.rdb /brain/.archived/redis_$(date +%Y%m%d_%H%M%S).rdb

        ```


        然后再执行原命令。


        参考：/brain/base/spec/core/lep.yaml (G-DB-BACKUP)

        '
      method: python_inline
      patterns:
        dangerous_operations:
        - message: 检测到 pg_restore 操作
          pattern: pg_restore
        - message: 检测到数据库 DROP 操作
          pattern: psql.*DROP
        - message: 检测到 TRUNCATE 操作
          pattern: psql.*TRUNCATE
        - message: 检测到 DELETE FROM 操作
          pattern: psql.*DELETE\s+FROM
        - message: 检测到 UPDATE 操作
          pattern: psql.*UPDATE.*WHERE
        - message: 检测到 MySQL DROP 操作
          pattern: mysql.*DROP
        - message: 检测到 Redis FLUSHDB 操作
          pattern: redis-cli\s+FLUSHDB
        - message: 检测到 Redis FLUSHALL 操作
          pattern: redis-cli\s+FLUSHALL
      priority: CRITICAL
      stage: pre_tool_use
      triggers:
        tools:
        - Bash
    name: Database Backup First
    rule: 数据库操作前必须先备份
  G-GATE-DB-MIGRATION:
    applies_to:
    - write
    - delete
    - move
    enforcement:
      block_message: '⚠️ 数据库迁移规范 (G-DB-MIGRATION)


        命令: {command}


        原则：新老并存，逐步切换


        禁止：

        - ❌ 直接 DROP TABLE

        - ❌ 直接 ALTER TABLE DROP COLUMN

        - ❌ 不经验证的结构变更


        推荐：

        1. 创建新表 table_v2

        2. 双写模式（写 table + table_v2）

        3. 验证 24h

        4. 切流量到 table_v2

        5. 归档 table


        参考：/brain/base/spec/core/lep.yaml (G-DB-MIGRATION)

        '
      method: python_inline
      patterns:
        migration_commands:
        - message: 检测到 pg_dump 操作
          pattern: pg_dump
        - message: 检测到 pg_restore 操作
          pattern: pg_restore
        - message: 检测到 CREATE TABLE 操作
          pattern: psql.*CREATE\s+TABLE
        - message: 检测到 ALTER TABLE 操作
          pattern: psql.*ALTER\s+TABLE
        - message: 检测到 DROP TABLE 操作
          pattern: psql.*DROP\s+TABLE
        - message: 检测到 alembic upgrade 操作
          pattern: alembic\s+upgrade
        - message: 检测到 django migrate 操作
          pattern: django.*migrate
      priority: HIGH
      stage: pre_tool_use
      triggers:
        tools:
        - Bash
      warn_message: '⚠️ 数据库迁移需要新老并存 (G-DB-MIGRATION)


        {message}


        建议迁移步骤：

        1. 创建新表/列（不删除旧的）

        2. 双写：同时写入新旧表

        3. 验证数据一致性（24-48h）

        4. 切流量到新表

        5. 废弃旧表（保留备份）

        '
    name: Database Migration Parallel
    rule: 数据库迁移必须新老并存，不直接替换
  G-GATE-DEFER:
    applies_to:
    - write
    - delete
    - move
    enforcement:
      method: message_content_validation
      note: 需要 IPC 拦截支持 - 当前为推荐性检查
      priority: MEDIUM
      rules:
        require_ipc_notification:
          description: 延迟任务必须通过 IPC 通知 PMO
          required_message_fields:
          - task
          - trigger_type
          - trigger_condition
          - owner_suggestion
          - context
          target_pmo: agent_{group}_pmo
      stage: ipc_message_check
      triggers:
        keywords:
        - 以后
        - 稍后
        - 待办
        - TODO
        - 延迟
        - 将来
        - 下次
      warn_message: "\U0001F4A1 延迟任务需要通知 PMO (G-DEFER)\n\n检测到延迟任务关键词: {keyword}\n\n\
        如果产生了\"当前不做、以后要做\"的任务，必须：\n1. 发送 IPC 消息给 group PMO\n2. 包含字段: task, trigger_type,\
        \ trigger_condition, owner_suggestion, context\n3. PMO 会记录到 backlog\n\n示例:\n\
        ```python\nipc_send(\n    to=\"agent-system_pmo\",\n    message=\"延迟任务: 优化数据库索引\"\
        ,\n    metadata={\n        \"task\": \"优化数据库索引\",\n        \"trigger_type\"\
        : \"time\",\n        \"trigger_condition\": \"2026-03-01\",\n        \"owner_suggestion\"\
        : \"agent-system_devops\",\n        \"context\": \"当前性能可接受，3月后预计需要优化\"\n \
        \   }\n)\n```\n\n禁止仅口头提及而不发送结构化消息。\n\n这是推荐性检查（需要 IPC 集成）。\n\n参考：/brain/base/spec/core/lep.yaml\
        \ (G-DEFER)\n"
    name: Deferred Task Handoff
    required_fields:
    - task
    - trigger_type
    - trigger_condition
    - owner_suggestion
    - context
    rule: 'Agent 产生"当前不做、以后要做"的延迟任务时，必须通过 IPC 通知对应 PMO：

      - routing: 任务所属 group 的 PMO (agent_{group}_pmo)

      - scope = project 时，先查 project PMO，无则上升到 group PMO

      - PMO 收到后记录到 backlog，设置触发条件

      - 禁止仅口头提及而不发送结构化消息

      '
    trigger_types:
    - time
    - event
    - dependency
  G-GATE-DELETE-BACKUP:
    applies_to:
    - delete
    enforcement:
      method: python_inline
      patterns:
        delete_important_files:
        - message: 删除重要文件（代码/配置）
          pattern: rm\s+(?!.*(?:/tmp/|build/|__pycache__|node_modules|.git/objects)).*\.(?:yaml|yml|py|js|ts|cpp|hpp|c|h|sql|sh|md|json|toml)
        - message: 删除重要目录
          pattern: rm\s+-rf?\s+(?!.*(?:/tmp/|build/|__pycache__|node_modules)).*(?:/brain/|/groups/|/spec/)
      priority: MEDIUM
      stage: pre_tool_use
      triggers:
        tools:
        - Bash
      warn_message: '⚠️ 删除操作需要先备份 (G-DELETE-BACKUP)


        {message}


        建议操作：

        1. 先备份: cp {file_path} /brain/.archived/

        2. 再删除: rm {file_path}


        或使用 git 追踪文件（可通过 git 恢复）


        参考：/brain/base/spec/core/lep.yaml

        '
    exception:
    - /tmp/**
    - build/
    - __pycache__/
    name: Delete with Backup
    rule: 删除前必须先备份
  G-GATE-FILE-ORG:
    applies_to:
    - write
    decision_tree:
      步骤1:
        否: 进入步骤2
        是: 使用 time_based
        问题: 文件是否与时间强相关（日志、日报、归档）？
      步骤2:
        否: 进入步骤3
        是: 使用 business_based
        问题: 文件是否属于特定项目/任务/spec？
      步骤3:
        否: 默认使用 business_based（归入最相关的项目）
        是: 使用 type_based
        问题: 文件是配置、缓存或工具输出吗？
    enforcement:
      block_message: "⚠️ 文件组织规范违规 (G-FILE-ORG)\n\n文件路径: {file_path}\n违规原因: {reason}\n\
        \n建议：\n1. 选择合适的组织模式：\n   - time_based: 日志、日报、归档（runtime/logs/2026/02/13/）\n\
        \   - business_based: 项目产物（groups/org/{group}/projects/{project}/）\n   - type_based:\
        \ 配置、缓存（runtime/config/）\n\n2. 避免：\n   - 顶层文件（/brain/file.txt）\n   - 项目根目录文件（groups/org/xxx/file.pdf）\n\
        \   - 无意义命名（misc/, temp/, other/）\n   - 过深路径（> 10 层）\n\n参考：/brain/base/spec/core/lep.yaml\
        \ (G-FILE-ORG)\n"
      checker: file_org_checker
      method: python_checker
      priority: MEDIUM
      rules:
        max_depth: 10
        no_meaningless_names:
          message: 禁止使用无意义的目录名
          patterns:
          - '**/misc/**'
          - '**/other/**'
          - '**/temp/**'
          - '**/test/**'
          - '**/untitled/**'
          - '**/dump/**'
          - '**/stuff/**'
        no_project_root_files:
          message: 禁止在项目根目录创建文件
          pattern: ^/brain/groups/[^/]+/[^/]+/[^/]+\.(txt|md|yaml|json|py)$
        no_toplevel_files:
          message: 禁止在 /brain/ 顶层创建文件
          pattern: ^/brain/[^/]+\.(txt|md|yaml|json|py|sh)$
      stage: pre_tool_use
      triggers:
        tools:
        - Write
    exceptions:
    - /brain/runtime/tmp/**
    - /brain/**/memory/**
    - /brain/.claude/**
    - /brain/.git/**
    forbidden:
    - '❌ 直接在组根目录创建文件: /brain/output.txt'
    - '❌ 直接在项目根目录创建: groups/org/xkquant/report.pdf'
    - '❌ 使用系统临时目录: /tmp/agent_output.txt（应使用 runtime/tmp/）'
    - '❌ 创建无分类堆积目录: misc/, other/, stuff/, dump/'
    - '❌ 时间格式不规范: 2026-2-3（应为 2026-02-03）'
    - '❌ 路径过深: 超过 10 层嵌套'
    helper: /brain/base/spec/standards/file_organization_helper.py
    hybrid_modes:
      允许:
      - 'business + time: groups/org/xkquant/projects/newsalpha/reports/daily/2026/02/13/'
      - 'business + type: groups/org/brain_system/projects/orchestrator/tests/coverage/'
      - 'type + time: runtime/logs/deployments/2026/02/13/'
      原则:
      - 同一批文件使用相同模式
      - 外层体现主要分类，内层体现次要分类
      - 避免过度嵌套
    implementation:
      Agent职责:
      - 创建文件前选择合适的组织模式
      - 使用 file_organization_helper.py 生成路径
      - 检查目录是否存在，不存在则创建
      - 记录文件创建到审计日志（如启用）
      代码示例: 'from file_organization_helper import organizer, ensure_path

        log = organizer.log_path("agent-system_pmo", "audit")

        ensure_path(log)

        '
      推荐做法:
      - 在 CLAUDE.md 中声明默认组织模式
      - import file_organization_helper 使用 helper 函数
      - 为常见操作定义路径模板
    mandatory_rules:
      命名约定:
      - 目录名使用 snake_case（小写+下划线）
      - 文件名必须具有自描述性（包含 agent名/时间戳/类型）
      - 禁止无意义命名：misc, other, temp, test, untitled
      - 必须包含适当的文件扩展名
      时间格式:
      - 年份: YYYY（四位，如 2026）
      - 月份: MM（两位补零，如 02）
      - 日期: DD（两位补零，如 13）
      - 紧凑格式: YYYY-MM-DD（如 2026-02-13）
      路径构造:
      - 必须包含 base_dir（runtime/, groups/, base/）
      - 禁止直接在 /brain/ 顶层创建文件
      - 禁止直接在项目根目录创建文件（如 groups/org/xkquant/report.pdf）
      - 路径深度建议 ≤ 5 层，最多不超过 10 层
    name: File Organization Standard
    organization_modes:
      business_based:
        描述: 按项目/组/任务分类，适合项目产物
        示例:
        - groups/org/xkquant/projects/newsalpha/reports/incident_002.md
        - groups/org/brain_system/tasks/BS-TASK-005/deliverables/report.md
        - groups/org/brain_system/spec/BS-012-hooks-build/S3_design.yaml
        路径模板:
          project: groups/{org}/{group}/projects/{project_id}/{category}/{filename}
          spec: groups/{org}/{group}/spec/{spec_id}/{filename}
          task: groups/{org}/{group}/tasks/{task_id}/{category}/{filename}
        适用场景:
        - 项目输出
        - 任务产物
        - spec文件
        - 组织产出
      time_based:
        描述: 按时间分类，适合时序敏感的数据
        示例:
        - runtime/logs/2026/02/13/agent-system_pmo.log
        - runtime/logs/2026-02-13/deployment.log
        - memory/archive/2026/02/session_20260213.jsonl
        路径模板:
          compact: '{base_dir}/{YYYY-MM-DD}/{filename}'
          daily: '{base_dir}/{YYYY}/{MM}/{DD}/{filename}'
        适用场景:
        - 日志文件
        - 时序数据
        - 归档数据
        - 临时文件
      type_based:
        描述: 按文件类型/功能分类，适合配置和工具文件
        示例:
        - runtime/config/mcp/agent-system_frontdesk.mcp.json
        - runtime/cache/pip/wheels/
        - runtime/build/binaries/brain_ipc
        路径模板:
          build: runtime/build/{artifact_type}/{filename}
          cache: runtime/cache/{cache_type}/{filename}
          config: runtime/config/{subsystem}/{filename}
        适用场景:
        - 配置文件
        - 缓存文件
        - 构建产物
        - 工具输出
    rule: '所有新文件创建必须遵循文件组织规范，避免文件直接堆积在顶级或项目根目录。

      Agent 必须根据文件用途选择三种组织模式之一：time_based, business_based, type_based。

      '
    spec_ref: /brain/base/spec/standards/file_organization.yaml
  G-GATE-IPC-TARGET:
    applies_to:
