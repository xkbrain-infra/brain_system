          - mv.*v1.*v2
          - rm.*v1
          - cp -r.*v1.*v2
          version_files:
          - '**/v1/**'
          - '**/v2/**'
          - '**/version*.yaml'
          - '**/*_v[0-9]+.*'
        tools:
        - Write
        - Edit
        - Bash
    name: Version Upgrade Protocol
    rule: 升级必须版本化，保留回退方案
modes:
  PASS-ALL: 需显式授权，允许超出 scope
  STRICT: 默认，操作限制在 scope 内
