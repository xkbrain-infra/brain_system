# Resource Errors - 资源错误
# 磁盘空间、内存不足问题

category: "resource_errors"
version: "1.0"
last_updated: "2026-01-17"

problems:
  - id: "RES-001"
    category: "resource_errors"
    keywords: ["disk", "space", "full", "no space"]
    error_patterns:
      - "OSError: [Errno 28] No space left on device"
      - "DiskFullError"
    description: "Disk space exhausted"

    solutions:
      - id: "RES-001-SOL-A"
        description: "HALT and notify user - requires disk cleanup"
        confidence: "high"
        risk_level: "high"
        reversible: true
        auto_applicable: false

        steps:
          - "Log current disk usage"
          - "HALT all write operations"
          - "Trigger G-UNRECOVERABLE-ERROR-HALT gate"
          - "Notify user to free disk space"

        expected_outcome: "User frees disk space"

  - id: "RES-002"
    category: "resource_errors"
    keywords: ["memory", "oom", "out of memory"]
    error_patterns:
      - "MemoryError"
      - "OutOfMemoryError"
      - "Killed"
    description: "Out of memory error"

    solutions:
      - id: "RES-002-SOL-A"
        description: "Reduce batch size and process in smaller chunks"
        confidence: "high"
        risk_level: "low"
        reversible: true

        steps:
          - "Reduce batch size by 50%"
          - "Process data in chunks"
          - "Add garbage collection between chunks"
          - "Retry with smaller batches"

        code_example: |
          import gc

          def process_in_chunks(data, chunk_size):
              for i in range(0, len(data), chunk_size):
                  chunk = data[i:i+chunk_size]
                  process_chunk(chunk)
                  gc.collect()  # Force garbage collection

        expected_outcome: "Processing completes without OOM"
