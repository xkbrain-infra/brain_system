id: BS-025-ISS003
title: orchestrator 未按角色分配任务，QA agent 完全闲置
discovered_at: "2026-02-22"
discovered_by: system-tmp_claude
stage: S6
severity: high
description: |
  S6 执行期间，orchestrator 将所有开发和测试任务都分配给了 agent_bs025_dev，
  agent_bs025_qa（codex）从未被使用，停留在初始提示符上（0% context）。
  
  实际情况：
  - dev 执行了 Wave 1-4 的开发 + 单元测试（18 个测试全绿）
  - qa 完全闲置，未收到任何任务
  - dev 自己写代码自己测试，违背了"开发与测试分离"原则
  
  根因：orchestrator 分配任务时不检查 agent.role，只看谁在线/谁空闲。
  这是 BS-025-ISS002（角色无差异化）的直接后果。
impact: |
  1. 测试由开发者自己执行，缺乏独立验证（S7 验收质量存疑）
  2. QA agent 资源浪费（codex 启动了但未使用）
  3. 违反 project.yaml S6 中"dev 完成 → review/ → qa review"的流程
resolution: ""
resolved_at: ""
resolved_by: ""
base_upgrade_candidate: true
base_upgrade_detail: |
  project.yaml S6 task_manager 的任务分配规则需要强化：
  1. 开发任务（coding）只分配给 role=developer 的 agent
  2. 测试/review 任务只分配给 role=qa 的 agent
  3. 基础设施任务只分配给 role=devops 的 agent
  4. orchestrator 分配前必须检查 task.required_role == agent.role
