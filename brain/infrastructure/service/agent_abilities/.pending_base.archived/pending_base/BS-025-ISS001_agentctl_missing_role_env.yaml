id: BS-025-ISS001
title: agentctl add 不自动注入 BRAIN_AGENT_ROLE 环境变量
discovered_at: "2026-02-22"
discovered_by: system-tmp_claude
stage: S6
severity: high
description: |
  agentctl add 创建新 agent 时，export_cmd 只注入 BRAIN_AGENT_NAME，
  不注入 BRAIN_AGENT_ROLE。导致 hook 系统无法识别 agent 角色，
  将其当作 default 角色处理，拦截合法操作（如 devops 写 /brain/infrastructure/）。
  所有通过 agentctl add 创建的 agent 都会遇到此问题。
impact: |
  agent_bs025_devops 被 hook G-SCOP 误拦截，无法写 requirements.txt、
  supervisord.conf 等文件，导致 T1 阻塞。需要手动修改 registry 添加
  BRAIN_AGENT_ROLE 后重启 agent 才能恢复。
resolution: ""
resolved_at: ""
resolved_by: ""
base_upgrade_candidate: true
base_upgrade_detail: |
  agentctl add 命令的 agent 注册逻辑需要修复：
  在 export_cmd 中同时注入 BRAIN_AGENT_NAME 和 BRAIN_AGENT_ROLE（从 --role 参数取值）。
