agents_registry:
  version: '2.2'
  updated: '2026-03-10'
group_meta:
  brain:
    type: coding
    description: Brain core management group
  system:
    type: coding
    description: Brain system operations group
groups:
  brain:
  - name: agent-brain_manager
    description: Brain manager (resident)
    role: manager
    scope: group
    group: brain
    path: /xkagent_infra/brain/agents/agent-brain_manager
    tmux_session: agent-brain_manager
    desired_state: running
    status: active
    required: false
  - name: agent-brain_dev
    description: brain 的 dev Agent
    role: dev
    scope: group
    group: brain
    path: /xkagent_infra/brain/agents/agent-brain_dev
    tmux_session: agent-brain_dev
    required: false
    desired_state: running
    status: active
  - name: agent-brain_frontdesk
    description: Brain 前台接待 Agent
    role: frontdesk
    scope: group
    group: brain
    path: /xkagent_infra/brain/agents/agent-brain_frontdesk
    tmux_session: agent-brain_frontdesk
    required: false
    desired_state: running
    status: active
  - name: tmp-agent-doubao
    description: 临时 Doubao Seed 2.0 Pro 测试 Agent
    role: dev
    scope: group
    group: brain
    path: /xkagent_infra/brain/agents/tmp-agent-doubao
    agent_type: bytedance
    model: doubao-seed-2-0-pro
    agent_model: doubao-seed-2-0-pro
    transport_mode: proxy
    tmux_session: tmp-agent-doubao
    required: false
    desired_state: running
    status: active
    env:
      IS_SANDBOX: "1"
  - name: agent-brain_codex_foos
    description: brain 的 dev Agent
    role: dev
    scope: group
    group: brain
    path: /xkagent_infra/brain/agents/agent-brain_codex_foos
    agent_type: openai
    agent_cli: claude
    agent_model: openai/gpt-5.4
    cli_type: claude
    model: openai/gpt-5.4
    transport_mode: proxy
    tmux_session: agent-brain_codex_foos
    required: false
    desired_state: running
    status: active
  system:
  - name: agent-system_pmo
    description: System PMO (resident)
    role: pmo
    scope: group
    group: system
    path: /xkagent_infra/groups/system/agents/agent-system_pmo
    tmux_session: agent-system_pmo
    desired_state: running
    status: active
    required: false
  - name: agent-system_devops
    description: System devops (resident)
    role: devops
    scope: group
    group: system
    path: /xkagent_infra/groups/system/agents/agent-system_devops
    tmux_session: agent-system_devops
    desired_state: running
    status: active
    required: false
  - name: agent-system_dashboard_architect
    description: system 的 custom Agent
    role: custom
    scope: group
    group: system
    path: /xkagent_infra/groups/system/agents/agent-system_dashboard_architect
    agent_type: claude
    agent_model: Sonnet
    model: Sonnet
    transport_mode: proxy
    tmux_session: agent-system_dashboard_architect
    required: false
    desired_state: running
    status: active
  - name: agent-system_dashboard_test_engineer
    description: system 的 custom Agent
    role: custom
    scope: group
    group: system
    path: /xkagent_infra/groups/system/agents/agent-system_dashboard_test_engineer
    agent_type: codex
    agent_model: gpt-5.3-codex
    model: gpt-5.3-codex
    transport_mode: proxy
    tmux_session: agent-system_dashboard_test_engineer
