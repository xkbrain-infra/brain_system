agents_registry:
  updated: '2026-04-04'
  version: '2.2'
group_meta:
  brain:
    description: Brain core management group
    type: coding
  system:
    description: Brain system operations group
    type: coding
groups:
  brain:
  - agent_model: minimax/minimax-m2.7
    agent_type: minimax
    description: Brain manager (resident)
    desired_state: running
    group: brain
    hooks:
    - pre_tool_use
    - post_tool_use
    model: minimax/minimax-m2.7
    name: agent-brain_manager
    path: /xkagent_infra/brain/agents/agent-brain_manager
    required: false
    role: manager
    scope: group
    status: active
    tmux_session: agent-brain_manager
    transport_mode: proxy
  - agent_model: minimax/minimax-m2.7
    agent_type: minimax
    description: Brain 前台接待 Agent
    desired_state: running
    group: brain
    model: minimax/minimax-m2.7
    name: agent-brain_frontdesk
    path: /xkagent_infra/brain/agents/agent-brain_frontdesk
    required: false
    role: frontdesk
    scope: group
    status: active
    tmux_session: agent-brain_frontdesk
    transport_mode: proxy
  - agent_model: minimax/minimax-m2.7
    agent_type: minimax
    capabilities:
    - deployment
    - infrastructure
    - monitoring
    - troubleshooting
    description: brain 的 devops Agent
    desired_state: running
    group: brain
    hooks:
    - pre_tool_use
    - session_start
    model: minimax/minimax-m2.7
    name: agent-brain_devops
    path: /xkagent_infra/brain/agents/agent-brain_devops
    required: false
    role: devops
    scope: group
    status: active
    tags:
    - '#devops'
    - '#ops'
    - '#infra'
    tmux_session: agent-brain_devops
    transport_mode: proxy
  - agent_model: minimax/minimax-m2.7
    agent_type: minimax
    capabilities:
    - project_management
    - task_coordination
    - progress_tracking
    - resource_allocation
    - risk_assessment
    description: brain 的 pmo Agent
    desired_state: running
    group: brain
    hooks:
    - pre_tool_use
    - session_start
    model: minimax/minimax-m2.7
    name: agent-brain_pmo
    path: /xkagent_infra/brain/agents/agent-brain_pmo
    required: false
    role: pmo
    scope: group
    status: active
    tags:
    - '#pmo'
    - '#coordinator'
    - '#manager'
    tmux_session: agent-brain_pmo
    transport_mode: proxy
  - agent_model: minimax-m2.7
    agent_type: minimax
    cwd: /xkagent_infra/brain/agents/agent_brain_dash-001_host_auditor
    description: brain 的 auditor Agent
    desired_state: running
    env:
      BRAIN_TRANSPORT_MODE: proxy
    group: brain
    hooks:
    - pre_tool_use
    - session_start
    model: minimax-m2.7
    name: agent_brain_dash-001_host_auditor
    path: /xkagent_infra/brain/agents/agent_brain_dash-001_host_auditor
    required: false
    role: auditor
    run_as_user: root
    scope: group
    status: active
    tmux_session: agent_brain_dash-001_host_auditor
    transport_mode: proxy
  - name: agent-brain_workflow_monitor
    description: brain 的 monitor Agent
    role: monitor
    scope: group
    group: brain
    path: /xkagent_infra/brain/agents/agent-brain_workflow_monitor
    agent_type: claude
    agent_model: claude-sonnet-4.6
    model: claude-sonnet-4.6
    transport_mode: proxy
    tmux_session: agent-brain_workflow_monitor
    cwd: /xkagent_infra/brain/agents/agent-brain_workflow_monitor
    env:
      IS_SANDBOX: 1
      BRAIN_TRANSPORT_MODE: proxy
    hooks:
    - pre_tool_use
    - session_start
    required: false
    desired_state: running
    status: active
  - name: agent-brain_nginx_config
    description: brain 的 config Agent
    role: config
    scope: group
    group: brain
    path: /xkagent_infra/brain/agents/agent-brain_nginx_config
    agent_type: claude
    agent_model: claude-sonnet-4.6
    model: claude-sonnet-4.6
    transport_mode: proxy
    tmux_session: agent-brain_nginx_config
    cwd: /xkagent_infra/brain/agents/agent-brain_nginx_config
    env:
      IS_SANDBOX: 1
      BRAIN_TRANSPORT_MODE: proxy
    hooks:
    - pre_tool_use
    - session_start
    required: false
    desired_state: running
    status: active
  system: []
services:
  infrastructure:
  - binary: /xkagent_infra/brain/infrastructure/service/brain_task_manager/bin/brain_task_manager
    config: /xkagent_infra/brain/infrastructure/config/brain_task_manager/brain_task_manager.json
    depends_on: []
    description: Task/Spec SSOT service - 任务状态机、Spec生命周期、项目依赖管理
    health:
      endpoint: http://localhost:8091/health
      interval_s: 30
      timeout_s: 5
    ipc_name: service-brain_task_manager
    language: cpp
    log_stderr: /xkagent_infra/runtime/logs/brain_task_manager_error.log
    log_stdout: /xkagent_infra/runtime/logs/brain_task_manager.log
    managed_by: supervisord
    name: service-brain_task_manager
    port: 8091
    recovery_level: 0
    status: active
    tags:
    - infrastructure
    - task-management
    - ssot
    version: v1.0.0
  - depends_on: []
    description: 定时任务调度服务
    health:
      endpoint: http://localhost:8090/health
      interval_s: 30
      timeout_s: 5
    ipc_name: service-brain_timer
    managed_by: supervisord
    name: service-brain_timer
    recovery_level: 0
    status: active
    tags:
    - infrastructure
    - scheduler
  - depends_on: []
    description: Agent 生命周期管理与编排服务
    ipc_name: service-agentctl
    managed_by: supervisord
    name: service-agentctl
    recovery_level: 0
    status: active
    tags:
    - infrastructure
    - orchestration
  - binary: /xkagent_infra/brain/infrastructure/service/brain_dashboard/bin/brain_dashboard
    config: null
    depends_on: []
    description: XKBrain Infra Dashboard - 统一后台管理系统
    health:
      endpoint: http://localhost:8080/health
      interval_s: 30
      timeout_s: 5
    ipc_name: service-brain_dashboard
    language: python
    log_stderr: /xkagent_infra/runtime/logs/brain_dashboard_error.log
    log_stdout: /xkagent_infra/runtime/logs/brain_dashboard.log
    managed_by: supervisord
    name: service-brain_dashboard
    port: 8080
    recovery_level: 1
    status: active
    tags:
    - infrastructure
    - dashboard
    - web-ui
    - monitoring
    version: v1.0.0
