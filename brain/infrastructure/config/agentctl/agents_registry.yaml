agents_registry:
  version: '2.2'
  updated: '2026-03-10'
group_meta:
  brain:
    type: coding
    description: Brain core management group
  system:
    type: coding
    description: Brain system operations group
groups:
  brain:
  - name: agent-brain_manager
    description: Brain manager (resident)
    role: manager
    scope: group
    group: brain
    path: /xkagent_infra/groups/brain/agents/agent-brain_manager
    tmux_session: agent-brain_manager
    desired_state: running
    status: active
    required: false
  - name: agent-brain_dev
    description: brain 的 dev Agent
    role: dev
    scope: group
    group: brain
    path: /xkagent_infra/groups/brain/agents/agent-brain_dev
    tmux_session: agent-brain_dev
    required: false
    desired_state: running
    status: active
  - name: agent-brain_frontdesk
    description: Brain 前台接待 Agent
    role: frontdesk
    scope: group
    group: brain
    path: /xkagent_infra/groups/brain/agents/agent-brain_frontdesk
    tmux_session: agent-brain_frontdesk
    required: false
    desired_state: running
    status: active
  - name: tmp-agent-gemini-cli
    description: brain 的 dev Agent
    role: dev
    scope: group
    group: brain
    path: /xkagent_infra/groups/brain/agents/tmp-agent-gemini-cli
    tmux_session: tmp-agent-gemini-cli
    required: false
    desired_state: stopped
    status: active
  - name: tmp-agent-review-kimi
    description: brain 的 reviewer Agent
    role: reviewer
    scope: group
    group: brain
    path: /xkagent_infra/groups/brain/agents/tmp-agent-review-kimi
    agent_type: alibaba
    agent_cli: claude
    agent_model: kimi-k2.5
    cli_type: claude
    model: kimi-k2.5
    transport_mode: proxy
    tmux_session: tmp-agent-review-kimi
    required: false
    desired_state: running
    status: active
  - name: tmp-agent-review-claude-sonnet
    description: brain 的 reviewer Agent
    role: reviewer
    scope: group
    group: brain
    path: /xkagent_infra/groups/brain/agents/tmp-agent-review-claude-sonnet
    agent_type: copilot
    agent_cli: claude
    agent_model: claude-sonnet-4.6
    cli_type: claude
    model: claude-sonnet-4.6
    transport_mode: proxy
    tmux_session: tmp-agent-review-claude-sonnet
    required: false
    desired_state: running
    status: active
  - name: tmp-agent-review-gemini
    description: brain 的 reviewer Agent
    role: reviewer
    scope: group
    group: brain
    path: /xkagent_infra/groups/brain/agents/tmp-agent-review-gemini
    agent_type: copilot
    agent_cli: claude
    agent_model: gemini-3.1-pro-preview
    cli_type: claude
    model: gemini-3.1-pro-preview
    transport_mode: proxy
    tmux_session: tmp-agent-review-gemini
    required: false
    desired_state: running
    status: active
  - name: tmp-agent-review-minimax
    description: brain 的 reviewer Agent
    role: reviewer
    scope: group
    group: brain
    path: /xkagent_infra/groups/brain/agents/tmp-agent-review-minimax
    agent_type: minimax
    agent_cli: claude
    agent_model: MiniMax-M2.5
    cli_type: claude
    model: MiniMax-M2.5
    transport_mode: proxy
    tmux_session: tmp-agent-review-minimax
    required: false
    desired_state: running
    status: active
  system:
  - name: agent-system_pmo
    description: System PMO (resident)
    role: pmo
    scope: group
    group: system
    path: /xkagent_infra/groups/system/agents/agent-system_pmo
    tmux_session: agent-system_pmo
    desired_state: running
    status: active
    required: false
  - name: agent-system_devops
    description: System devops (resident)
    role: devops
    scope: group
    group: system
    path: /xkagent_infra/groups/system/agents/agent-system_devops
    tmux_session: agent-system_devops
    desired_state: running
    status: active
    required: false
services:
  infrastructure:
  - name: service-brain_task_manager
    description: Task/Spec SSOT service - 任务状态机、Spec生命周期、项目依赖管理
    managed_by: supervisord
    status: active
    health:
      endpoint: http://localhost:8091/health
      interval_s: 30
      timeout_s: 5
    recovery_level: 0
    depends_on: []
    binary: /xkagent_infra/brain/infrastructure/service/brain_task_manager/bin/brain_task_manager
    config: /xkagent_infra/brain/infrastructure/config/brain_task_manager/brain_task_manager.json
    log_stdout: /xkagent_infra/brain/runtime/logs/brain_task_manager.log
    log_stderr: /xkagent_infra/brain/runtime/logs/brain_task_manager_error.log
    port: 8091
    ipc_name: service-brain_task_manager
    version: v0.1.0
    language: cpp
    tags:
    - infrastructure
    - task-management
    - ssot
  - name: service-brain_timer
    description: 定时任务调度服务
    managed_by: supervisord
    status: active
    health:
      endpoint: http://localhost:8090/health
      interval_s: 30
      timeout_s: 5
    recovery_level: 0
    depends_on: []
    ipc_name: service-brain_timer
    tags:
    - infrastructure
    - scheduler
  - name: service-agentctl
    description: Agent 生命周期管理与编排服务
    managed_by: supervisord
    status: active
    recovery_level: 0
    depends_on: []
    ipc_name: service-agentctl
    tags:
    - infrastructure
    - orchestration
  - name: service-brain_dashboard
    description: XKBrain Infra Dashboard - 统一后台管理系统
    managed_by: supervisord
    status: active
    health:
      endpoint: http://localhost:8080/health
      interval_s: 30
      timeout_s: 5
    recovery_level: 1
    depends_on: []
    binary: /xkagent_infra/brain/infrastructure/service/brain_dashboard/bin/brain_dashboard
    config: null
    log_stdout: /brain/runtime/logs/brain_dashboard.log
    log_stderr: /brain/runtime/logs/brain_dashboard_error.log
    port: 8080
    ipc_name: service-brain_dashboard
    version: v2.0.0
    language: python
    tags:
    - infrastructure
    - dashboard
    - web-ui
    - monitoring
