# Brain Gateway Service Configuration for supervisord
# BS-019 brain_gateway v0.1.0

[program:brain_gateway]
command=/brain/infrastructure/service/brain_gateway/releases/v0.1.0/bin/brain_gateway --config /brain/infrastructure/service/brain_gateway/config/brain_gateway.json
directory=/brain/infrastructure/service/brain_gateway
autostart=true
autorestart=true
startsecs=5
stopasgroup=true
killasgroup=true
stdout_logfile=/xkagent_infra/runtime/logs/brain_gateway.log
stderr_logfile=/xkagent_infra/runtime/logs/brain_gateway_error.log
