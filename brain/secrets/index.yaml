# Brain Global Secrets Index
id: SECRETS-GLOBAL
version: "2.1"
last_updated: "2026-03-02"
description: |
  全局配置索引 - 按业务分类组织
  启动时由 /brain/infrastructure/launch/loader_env_vars.py 读取

categories:
  # ============================================================
  # Broker - 经纪商
  # ============================================================
  broker/futu:
    description: "富途证券 API 配置"
    path: "./broker/futu/"
    files:
      - name: "api_config.env"
        description: "FUTU API 连接配置"
        permissions: "600"
        env_vars:
          - FUTU_USER_ID
          - FUTU_ACCOUNT_ID
          - FUTU_OPEND_HOST
          - FUTU_OPEND_PORT
          - FUTU_RSA_KEY_PATH

      - name: "rsa_private.pem"
        description: "RSA 私钥"
        permissions: "600"
        env_vars: []

  # ============================================================
  # IM - 即时通讯
  # ============================================================
  IM/telegram:
    description: "Telegram Bot 配置"
    path: "./IM/telegram/"
    files:
      - name: "bot_token.env"
        description: "Telegram Bot Token 和 Chat ID"
        permissions: "600"
        env_vars:
          - TELEGRAM_BOT_TOKEN
          - TELEGRAM_CHAT_ID

  # ============================================================
  # XKQuant - 业务相关
  # ============================================================
  xkquant/postgres:
    description: "XKQuant PostgreSQL 数据库配置"
    path: "./xkquant/postgres/"
    files:
      - name: "postgres.env"
        description: "PostgreSQL 和 Realtime DB 配置"
        permissions: "600"
        env_vars:
          - POSTGRES_USER
          - POSTGRES_PASSWORD
          - POSTGRES_DB
          - REALTIME_DB_HOST
          - REALTIME_DB_PORT
          - REALTIME_DB_NAME
          - REALTIME_DB_USER
          - REALTIME_DB_PASSWORD

  xkquant/clickhouse:
    description: "NewsAlpha ClickHouse 数据库配置"
    path: "./xkquant/clickhouse/"
    files:
      - name: "clickhouse.env"
        description: "ClickHouse 用户和密码"
        permissions: "600"
        env_vars:
          - NEWSALPHA_CLICKHOUSE_USER
          - NEWSALPHA_CLICKHOUSE_PASSWORD

  # ============================================================
  # Brain - 平台能力
  # ============================================================
  brain/google_api:
    description: "Brain Google API OAuth 配置"
    path: "./brain/google_api/"
    files:
      - name: "credentials.json"
        description: "OAuth 客户端凭据 (client_id, client_secret)"
        permissions: "600"
        env_vars: []

      - name: "token.json"
        description: "用户授权令牌"
        permissions: "600"
        env_vars: []

  # ============================================================
  # Google - 云服务
  # ============================================================
  google/oauth:
    description: "Google OAuth 2.0 凭据（Drive, Docs, Sheets）"
    path: "./google/oauth/"
    files:
      - name: "credentials.json"
        description: "OAuth 客户端凭据"
        permissions: "600"
        usage: "Google MCP 服务器"
        env_vars: []

      - name: "token.json"
        description: "用户授权令牌"
        permissions: "600"
        usage: "Google MCP 服务器"
        env_vars: []

  # ============================================================
  # System - 系统级配置
  # ============================================================
  system/agents:
    description: "Agent 专用配置（LLM tokens, API keys）"
    path: "./system/agents/"
    files:
      - name: "llm_tokens.env"
        description: "LLM API tokens（Kimi, MiniMax, OpenAI 等）"
        permissions: "600"
        env_vars:
          - KIMI_API_KEY
          - KIMI_API_BASE
          - KIMI_MODEL
          - MINIMAX_API_KEY
          - MINIMAX_GROUP_ID
          - MINIMAX_API_BASE
          - MINIMAX_MODEL
          # 预留其他模型
          # - OPENAI_API_KEY
          # - ANTHROPIC_API_KEY

  system/github:
    description: "GitHub 组织级配置（PAT + Organization）"
    path: "./system/github/"
    files:
      - name: "github.env"
        description: "GitHub 访问令牌与组织标识"
        permissions: "600"
        env_vars:
          - GITHUB_TOKEN
          - GITHUB_ORG

# ============================================================
# 业务分类说明
# ============================================================
business_categories:
  brain:
    description: "Brain 平台能力"
    subcategories:
      - google_api: "Brain Google API 凭据"

  broker:
    description: "经纪商相关配置"
    subcategories:
      - futu: "富途证券"
      # - ib: "盈透证券（预留）"

  IM:
    description: "即时通讯服务"
    subcategories:
      - telegram: "Telegram Bot"
      # - slack: "Slack（预留）"

  xkquant:
    description: "XKQuant 业务相关"
    subcategories:
      - postgres: "PostgreSQL 数据库"
      - clickhouse: "ClickHouse 数据库"
      # - redis: "Redis（预留）"

  google:
    description: "Google 云服务"
    subcategories:
      - oauth: "OAuth 2.0 认证"
      # - service_account: "服务账号（预留）"

  system:
    description: "系统级配置"
    subcategories:
      - agents: "Agent LLM API 配置"
      - github: "GitHub 组织配置"
      - monitoring: "监控配置（预留）"

# ============================================================
# 使用说明
# ============================================================
usage:
  add_new_category:
    - "在此文件添加 category 定义"
    - "创建对应目录: mkdir -p /brain/secrets/{category}/{subcategory}"
    - "添加配置文件到该目录"
    - "设置正确权限: chmod 600 {file}"
    - "重新加载配置: /brain/infrastructure/launch/loader_env_vars.py --reload"

  security:
    - "所有敏感文件权限必须是 600"
    - "目录权限: chmod 700 /brain/secrets/{category}"
    - "实际密钥文件不提交到 git（见 .gitignore）"
    - "仅此索引文件提交到 git"
