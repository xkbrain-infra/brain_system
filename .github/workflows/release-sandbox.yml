name: Build and Release Sandbox Images

on:
  workflow_dispatch:
    inputs:
      brain_version:
        description: 'Brain System version to use'
        required: true
        default: '2.1.0'
  push:
    tags:
      - 'sandbox-v[0-9]+.[0-9]+.[0-9]+*'
    paths:
      - 'groups/brain/platform/sandbox/**'

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository_owner }}/brain-sandbox

jobs:
  build-sandbox-base:
    name: Build Sandbox Base Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Determine Brain version
        run: |
          if [ "${{ github.event.inputs.brain_version }}" != "" ]; then
            echo "BRAIN_VERSION=${{ github.event.inputs.brain_version }}" >> $GITHUB_ENV
          else
            echo "BRAIN_VERSION=$(cat groups/brain/platform/release/VERSION | grep VERSION= | cut -d= -f2)" >> $GITHUB_ENV
          fi

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-base
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=,suffix=,format=short

      - name: Build and push Sandbox Base
        uses: docker/build-push-action@v5
        with:
          context: groups/brain/platform/sandbox/base
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            BRAIN_VERSION=${{ env.BRAIN_VERSION }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-sandbox-variants:
    name: Build Sandbox Variants
    runs-on: ubuntu-latest
    needs: build-sandbox-base
    strategy:
      matrix:
        variant: [dev, test, staging, audit]
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Determine versions
        run: |
          if [ "${{ github.event.inputs.brain_version }}" != "" ]; then
            echo "BRAIN_VERSION=${{ github.event.inputs.brain_version }}" >> $GITHUB_ENV
          else
            echo "BRAIN_VERSION=$(cat groups/brain/platform/release/VERSION | grep VERSION= | cut -d= -f2)" >> $GITHUB_ENV
          fi
          echo "SANDBOX_VERSION=$(cat groups/brain/platform/sandbox/${{ matrix.variant }}/Dockerfile | grep SANDBOX_VERSION= | cut -d= -f2 | tr -d '\"')" >> $GITHUB_ENV

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-${{ matrix.variant }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=,suffix=,format=short

      - name: Build and push ${{ matrix.variant }}
        uses: docker/build-push-action@v5
        with:
          context: groups/brain/platform/sandbox/${{ matrix.variant }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            BRAIN_VERSION=${{ env.BRAIN_VERSION }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
