name: Release Brain System

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+*'
    paths:
      - 'brain/**'
      - 'groups/brain/platform/release/**'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g., 2.1.0)'
        required: true
        default: '2.1.0'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/brain-system

jobs:
  release:
    name: Build and Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version
        id: version
        run: |
          if [ "${{ github.event.inputs.version }}" != "" ]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            # 从 tag 提取版本号
            VERSION=${GITHUB_REF#refs/tags/v}
          fi
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "version=$VERSION" >> $GITHUB_ENV

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: groups/brain/platform/release/configs/Dockerfile.release
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VERSION=${{ steps.version.outputs.VERSION }}
            BUILD_DATE=${{ github.event.head_commit.timestamp }}
            BUILD_COMMIT=${{ github.sha }}
            BUILD_BRANCH=${{ github.ref_name }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          name: Brain System ${{ steps.version.outputs.VERSION }}
          body: |
            ## Brain System ${{ steps.version.outputs.VERSION }}

            ### Docker Images
            ```bash
            # Pull the image
            docker pull ghcr.io/${{ github.repository_owner }}/brain-system:${{ steps.version.outputs.VERSION }}

            # Or use with sandbox
            export BRAIN_VERSION=${{ steps.version.outputs.VERSION }}
            ```

            ### Changes
            See [CHANGELOG.md](CHANGELOG.md) for details.
          generate_release_notes: true

      - name: Update release manifest
        run: |
          cat > release-manifest-${{ steps.version.outputs.VERSION }}.yaml << EOF
          release:
            name: brain-system
            version: ${{ steps.version.outputs.VERSION }}
            date: $(date -u +"%Y-%m-%dT%H:%M:%SZ")
            commit: ${{ github.sha }}
            branch: ${{ github.ref_name }}
            images:
              - ghcr.io/${{ github.repository_owner }}/brain-system:${{ steps.version.outputs.VERSION }}
              - ghcr.io/${{ github.repository_owner }}/brain-system:latest
          EOF
          cat release-manifest-${{ steps.version.outputs.VERSION }}.yaml
