name: Nightly Build

on:
  schedule:
    - cron: '0 2 * * *'  # 每天凌晨 2 点
  workflow_dispatch:

env:
  REGISTRY: ghcr.io

jobs:
  build-nightly:
    name: Nightly Build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Get version
        run: |
          BASE_VERSION=$(cat groups/brain/platform/release/VERSION | grep VERSION= | cut -d= -f2)
          DATE=$(date +%Y%m%d)
          echo "VERSION=${BASE_VERSION}-nightly.${DATE}" >> $GITHUB_ENV
          echo "BASE_VERSION=$BASE_VERSION" >> $GITHUB_ENV

      - name: Build and push nightly Brain System
        uses: docker/build-push-action@v5
        with:
          context: .
          file: groups/brain/platform/release/configs/Dockerfile.release
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/brain-system:nightly
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/brain-system:${{ env.VERSION }}
          build-args: |
            VERSION=${{ env.VERSION }}
            BUILD_DATE=${{ github.event.head_commit.timestamp }}
            BUILD_COMMIT=${{ github.sha }}
            BUILD_BRANCH=${{ github.ref_name }}
          cache-from: type=gha

      - name: Build and push nightly Sandbox Base
        uses: docker/build-push-action@v5
        with:
          context: groups/brain/platform/sandbox/base
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/brain-sandbox-base:nightly
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/brain-sandbox-base:${{ env.VERSION }}
          build-args: |
            BRAIN_VERSION=${{ env.VERSION }}
          cache-from: type=gha

      - name: Notify on failure
        if: failure()
        uses: slackapi/slack-github-action@v1
        with:
          payload: |
            {
              "text": "Brain System Nightly Build Failed!\nCommit: ${{ github.sha }}\nBranch: ${{ github.ref_name }}"
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
